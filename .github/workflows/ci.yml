name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend · pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # 2026-04-30 (Codex round-15 P2): include the [workbench]
          # extra so the report_bundle regression suite (matplotlib +
          # scipy) collects on CI. Without this the 17 tests under
          # ui/backend/tests/test_report_bundle.py only run via the
          # local dogfood smoke loop, leaving CI blind to renderer
          # regressions in the Step 5 multi-figure pipeline.
          pip install -e ".[dev,workbench]"

      - name: Gold YAML schema validator gate
        run: |
          python scripts/validate_gold_standards.py \
            --schema knowledge/schemas/gold_standard_schema.json \
            --gold-dir knowledge/gold_standards

      - name: PLANE_OF SSOT byte-identical check (ADR-002 §2.2)
        run: python scripts/gen_importlinter.py --check

      - name: Four-plane import contract (ADR-001)
        run: lint-imports

      - name: Run pytest
        env:
          EXECUTOR_MODE: mock
        run: |
          # tests/ is the engine + knowledge + report-engine lane.
          # ui/backend/tests/test_report_bundle.py adds the matplotlib
          # report-bundle regressions (Codex round-15 P2): the file
          # lives outside testpaths but is explicit-included so the
          # 17 renderer tests run on every PR.
          python -m pytest tests/ ui/backend/tests/test_report_bundle.py -q

      # ADR-002 §5 W4 dogfood window 2026-04-25 → 2026-05-09:
      # Re-run pytest with the runtime guard installed in WARN mode so any
      # forbidden import emits a structured JSON line WITHOUT failing the
      # build. The .jsonl artifacts feed plane_guard_rollback_eval.py for
      # the §2.4 14-day rolling-window trigger. continue-on-error=true
      # keeps PRs green during dogfood; W4 hard-fail toggle PR (target
      # ≤ 2026-05-11) flips this to required-passing once the dogfood
      # signal review confirms zero new violations.
      - name: Plane-guard WARN-mode dogfood (ADR-002 §5 · non-blocking)
        if: always()
        continue-on-error: true
        env:
          EXECUTOR_MODE: mock
          CFD_HARNESS_PLANE_GUARD: warn
        run: |
          mkdir -p reports/plane_guard
          python -m pytest tests/ ui/backend/tests/test_report_bundle.py -q --no-header -p no:cacheprovider \
            -o "log_cli=true" -o "log_cli_level=WARNING" \
            2>&1 | tee reports/plane_guard/ci_warn_pytest.log
          python scripts/plane_guard_rollback_eval.py \
            --log-path reports/plane_guard/fixture_frame_confusion.jsonl \
            || true

      - name: Upload plane-guard dogfood artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plane-guard-dogfood-${{ github.sha }}
          path: |
            reports/plane_guard/*.jsonl
            reports/plane_guard/*.log
          if-no-files-found: ignore
          retention-days: 30

  frontend-build:
    name: Frontend · tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
