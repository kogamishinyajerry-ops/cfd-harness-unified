name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend · pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Gold YAML schema validator gate
        run: |
          python scripts/validate_gold_standards.py \
            --schema knowledge/schemas/gold_standard_schema.json \
            --gold-dir knowledge/gold_standards

      - name: PLANE_OF SSOT byte-identical check (ADR-002 §2.2)
        run: python scripts/gen_importlinter.py --check

      - name: Four-plane import contract (ADR-001)
        run: lint-imports

      - name: Run pytest
        env:
          EXECUTOR_MODE: mock
        run: |
          python -m pytest tests/ -q

  frontend-build:
    name: Frontend · tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
