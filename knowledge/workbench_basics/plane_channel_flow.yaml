# Workbench Basics · Fully Developed Plane Channel Flow
#
# Authoring sources:
#   - whitelist.yaml line 177 (case spec)
#   - knowledge/gold_standards/plane_channel_flow.yaml physics_contract
#   - src/foam_agent_adapter.py:3496 _generate_steady_internal_channel
#     (geometry: x∈[-15,15], y∈[-0.5,0.5], D=1)
#
# CONTRACT HONESTY: physics_contract status = INCOMPATIBLE_WITH_LITERATURE_
# DISGUISED_AS_COMPATIBLE. Adapter runs icoFoam laminar at Re_bulk=5600
# but Moser DNS u+ profile requires turbulent flow. Workbench must show
# this incompatibility — we surface it as a hint rather than render the
# case as "passing" (Codex meeting anti-pattern: "把报告页伪装成工作台").

case_id: plane_channel_flow
display_name: "Fully Developed Plane Channel Flow"
display_name_zh: "完全发展平面通道流"
canonical_ref: "Kim/Moser 1987/1999 Re_τ=180 DNS"

dimension: 2

geometry:
  shape: rectangle
  bbox:
    x_min: -15.0
    x_max: 15.0
    y_min: -0.5
    y_max: 0.5
    z_min: -0.5
    z_max: 0.5
  characteristic_length:
    name: D
    value: 1.0
    unit: m
    description_zh: "通道全高 D=1 m，半高 h=D/2；流向长度 30D（前后各 15D）保证完全发展"

patches:
  - id: inlet
    role: inlet
    location: left
    label_zh: "入口"
    label_en: "Inlet"
    description_zh: "fixedValue U=(1, 0, 0) m/s, zeroGradient p"

  - id: outlet
    role: outlet
    location: right
    label_zh: "出口"
    label_en: "Outlet"
    description_zh: "fixedValue p=0（参考压力），zeroGradient U"

  - id: walls_top
    role: wall
    location: top
    label_zh: "上壁"
    label_en: "Top wall"
    description_zh: "noSlip；OpenFOAM 中与 walls_bottom 合并为单一 patch 'walls'"

  - id: walls_bottom
    role: wall
    location: bottom
    label_zh: "下壁"
    label_en: "Bottom wall"
    description_zh: "noSlip；OpenFOAM 中与 walls_top 合并为单一 patch 'walls'"

  - id: frontAndBack
    role: empty
    location: front_back
    label_zh: "前后边界（2D empty）"
    label_en: "Front/back (2D empty)"

boundary_conditions:
  - field: U
    quantity: velocity
    units: "m/s"
    per_patch:
      inlet:
        type: fixedValue
        value: [1.0, 0.0, 0.0]
        display_zh: "U_bulk=(1, 0, 0)"
      outlet:
        type: zeroGradient
        display_zh: "∂U/∂n = 0"
      walls_top:
        type: noSlip
        display_zh: "U = (0, 0, 0)"
      walls_bottom:
        type: noSlip
        display_zh: "U = (0, 0, 0)"
      frontAndBack:
        type: empty
        display_zh: "—"

  - field: p
    quantity: kinematic_pressure
    units: "m^2/s^2"
    per_patch:
      inlet:
        type: zeroGradient
        display_zh: "∂p/∂n = 0"
      outlet:
        type: fixedValue
        value: 0.0
        display_zh: "p = 0"
      walls_top:
        type: zeroGradient
        display_zh: "∂p/∂n = 0"
      walls_bottom:
        type: zeroGradient
        display_zh: "∂p/∂n = 0"
      frontAndBack:
        type: empty
        display_zh: "—"

materials:
  - id: channel_fluid
    label_zh: "通道流体"
    label_en: "Channel fluid"
    properties:
      - symbol: "ρ"
        name: density
        value: 1.0
        unit: "kg/m³"
        note_zh: "incompressible 求解器中 ρ 不进方程"
      - symbol: "ν"
        name: kinematic_viscosity
        value: 1.78571e-4
        unit: "m²/s"
        note_zh: "ν = 1/Re_bulk = 1/5600（U_bulk=1, D=1）"

derived:
  - symbol: Re_bulk
    name: bulk_Reynolds_number
    value: 5600
    formula: "Re_bulk = U_bulk·D/ν"
    note_zh: "通过 ν 设定，对应名义 Re_τ=180"
  - symbol: Re_τ
    name: friction_Reynolds_number
    value: 180
    formula: "Re_τ = u_τ·h/ν（来自 Moser 1999 DNS 名义值）"
    note_zh: "金标准基于湍流 DNS；当前 adapter 为层流求解，此值为期望而非测得"

solver:
  name: icoFoam
  family: incompressible
  steady_state: false
  laminar: true
  display_zh: "icoFoam（瞬态 PISO，层流，无湍流模型）"
  reasoning_zh: "求解器选择与 Moser 湍流 DNS 金标准不匹配——层流 Poiseuille 解 ≠ 湍流 log-law。物理对照见 hints。"

hints:
  geometry_zh: "30:1 流向超长保证下游完全发展；上下壁合并为单一 OpenFOAM patch 'walls'"
  driver_zh: "压差驱动：左入口固定速度 + 右出口固定压力 → 形成 Poiseuille 抛物剖面"
  physical_intuition_zh: "⚠ 已知不一致：layout 看似 DNS Re_τ=180 通道，但 icoFoam 层流给出 Poiseuille 抛物速度，无法复现 u+/y+ 对数律。Re_τ=180 应配 LES/DNS 求解，待 Phase 9 路由"
