    description: "INCOMPATIBLE — laminar icoFoam cannot produce DNS turbulent profile"
    ref_value:
      - y: 0.0
        u: 0.0
      - y: 0.25
        u: 0.75
      - y: 0.5
        u: 1.0
      - y: 0.75
