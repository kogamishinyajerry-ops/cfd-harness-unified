schema_version: 2
case_id: turbulent_flat_plate
source: "Blasius 1908 / Schlichting Boundary Layer Theory (7th ed.) Ch.7"
literature_doi: "10.1007/978-3-662-52919-5"
note: >
  REGIME CORRECTION (Gate Q-new Case 4 · Path A, 2026-04-20): case_id retained
  for stability but the physics is now LAMINAR Blasius, not turbulent Spalding.
  Re=50000, plate_length=1.0m → Re_x=25000 at x=0.5, Re_x=50000 at x=1.0. Both
  deep in laminar regime (transition ~Re_x=3e5–5e5). Blasius similarity solution:
  Cf = 0.664/√Re_x. At x=0.5m: 0.00420. At x=1.0m: 0.00297.
  Previous gold (0.0076 via Prandtl 1/7-power Spalding fit) was physically
  incorrect — the 1/7-law is validated for turbulent BL (Re_x ≳ 5e5), not here.
  See DEC-V61-006 + docs/whitelist_audit.md §5.2.
physics_contract:
  geometry_assumption: "Flat plate with zero-pressure-gradient external flow; x measured from leading edge; thin 2D slice (empty side patches) with a single wall-normal direction carrying the boundary layer"
  reference_correlation_context: "ref_value 0.00420 at x=0.5m uses the Blasius laminar similarity solution Cf=0.664/√Re_x evaluated at Re_x=25000. Blasius is the exact self-similar solution of the Prandtl BL equations under ZPG with no-slip wall; it is exact for laminar flow at all Re_x below transition. Adapter runs simpleFoam with turbulenceProperties laminar; no wall-function model is active."
  physics_precondition:
    - condition: "Flow is LAMINAR at x_target (not turbulent or transitional) — Blasius similarity valid"
      satisfied_by_current_adapter: true
      evidence_ref: "whitelist declares turbulence_model: laminar per DEC-V61-006; adapter instantiates turbulenceProperties simulationType laminar (no k/ω/ε transport equations solved). Re_x ≤ 50000 is well below transition."
    - condition: "Wall-cell gradient extraction uses interior cells (wall-cell skip), so τ_w is computed on the first-second interior-cell Δu/Δy rather than the possibly-degenerate wall-cell itself"
      satisfied_by_current_adapter: true
      evidence_ref: "src/foam_agent_adapter.py:6870-6879 _compute_wall_gradient — rejects if len(interior_samples)<2; uses (c0,u0)(c1,u1) for delta"
    - condition: "Mesh BL resolution sufficient for laminar Blasius profile at Re_x=25000–50000 — at least 20 cells across δ_99 with wall grading"
      satisfied_by_current_adapter: true
      evidence_ref: ".planning/STATE.md records turbulent_flat_plate mesh at 80 y-cells with 4:1 wall grading. Blasius δ_99=5·√(ν·x/U); at U=1, ν=1/50000, x=0.5: δ_99=0.0224m. 80 cells over H=1.0 with 4:1 grading → ~50 cells within y<0.0224, well-resolved."
    - condition: "Spalding-fallback branch is INACTIVE under laminar contract — extraction must be clean, no formula substitution"
      satisfied_by_current_adapter: partial
      evidence_ref: "src/foam_agent_adapter.py Spalding-fallback is still present in code (line ~6924). Under laminar BL and mesh-resolved extraction the measured Cf should be <0.01 organically, never triggering fallback. If fallback does fire it now indicates a genuine extraction failure (not a regime mismatch). Follow-up audit: add an assertion that extractor fallback did NOT fire when contract is laminar."
  contract_status: "SATISFIED_UNDER_LAMINAR_CONTRACT — Blasius is the exact analytical solution for the declared physics. Residual uncertainty is numerical (mesh resolution + schemes) and should fit within the 10% tolerance. Any deviation >10% now unambiguously indicates an adapter or mesh bug, not a regime-mismatch hazard."
  precondition_last_reviewed: "2026-04-20 (DEC-V61-006 B-class gold remediation · Gate Q-new Case 4 Path A)"
observables:
  # ---------------------------------------------------------------
  # Back-compat scalar (DEC-V61-006 Path A · single anchor at x=0.5)
  # Keeps existing fixtures and the legacy single-scalar comparator
  # path working unchanged. Tier remains the original implicit gate;
  # DEC-V61-063 keeps this as a soft-graded back-compat anchor while
  # the 3 new HARD_GATED observables below carry the Type II verdict.
  # ---------------------------------------------------------------
  - name: cf_skin_friction
    description: local skin-friction coefficient at x=0.5m (Blasius laminar similarity for Re=50000, plate_length=1.0m, Re_x=25000)
    ref_value: 0.00420
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.10
  # ---------------------------------------------------------------
  # DEC-V61-063 Type II HARD_GATED observables (3 categories)
  # Reference: Blasius laminar similarity Cf = 0.664/√Re_x with
  # δ_99 = 5·√(ν·x/U_∞), evaluated at U_∞=1, ν=1/50000=2e-5.
  # Tolerance 10% mirrors the back-compat scalar; tighter tiers will
  # come post-Stage B once live-run noise is characterized.
  # ---------------------------------------------------------------
  - name: cf_x_profile_points
    description: streamwise Cf(x) profile at x ∈ {0.5, 1.0} (Blasius laminar similarity)
    gate_status: HARD_GATED
    ref_value:
      - x: 0.5
        Cf: 0.00420
      - x: 1.0
        Cf: 0.00297
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.10
  # Codex R1 F1 fix (2026-04-25): gate on the *measured* mean K, not the
  # constant canonical K. The canonical_K is hard-coded 0.664 in the
  # extractor — a hard-gate against it is tautological and cannot detect
  # a broken similarity solution. mean_K is the average of K_x = Cf·√Re_x
  # across the actually-extracted profile points and DOES go off-target
  # if Spalding fallback fires at any sampled x. Codex reproduced the
  # false-pass under the old observable name on 2026-04-25.
  - name: cf_blasius_invariant_mean_K
    description: measured Blasius invariant K_x = Cf · √Re_x averaged across sampled x ≥ 0.25 — Blasius similarity gives 0.664
    gate_status: HARD_GATED
    ref_value: 0.664
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.10
  - name: delta_99_x_profile
    description: BL thickness δ_99(x) at x ∈ {0.5, 1.0} (Blasius reference 5·√(ν·x/U_∞))
    gate_status: HARD_GATED
    ref_value:
      - x: 0.5
        value: 0.01581
      - x: 1.0
        value: 0.02236
    unit: m
    tolerance:
      mode: relative
      value: 0.10
