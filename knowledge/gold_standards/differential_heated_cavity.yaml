schema_version: 2
case_id: differential_heated_cavity
source: "de Vahl Davis 1983"
literature_doi: "10.1002/fld.1650030305"
physics_contract:
  geometry_assumption: "Square 2D cavity (AR=1), opposing vertical walls at T_hot and T_cold, adiabatic top/bottom walls, Boussinesq approximation"
  reference_correlation_context: "REGIME CORRECTION (Gate Q-new Case 6 · Path P-2, 2026-04-20): downgraded from Ra=1e10 to Ra=1e6, the canonical de Vahl Davis 1983 benchmark. At Ra=1e6, Pr=0.71, AR=1.0: Nu_avg(hot wall) = 8.800 (de Vahl Davis 1983 Table IV, referenced by >40 subsequent studies all within ±0.2%). The Ra=1e6 regime has BL thickness δ/L ~ Ra^(-0.25) ≈ 0.032, requiring only 5-10 cells inside the BL per wall — comfortably resolvable on adapter's 40-80-cell wall-normal mesh."
  physics_precondition:
    - condition: "Mesh resolves the thermal boundary layer at target Ra=1e6"
      satisfied_by_current_adapter: true
      evidence_ref: "At Ra=1e6, δ_T/L ≈ 0.032 → 5-10 BL cells at 40-80 wall-normal cells is sufficient. Adapter mesh per STATE.md: 80 y-cells with wall grading, comfortably within resolution requirements. Compare to the previous Ra=1e10 requirement (~1000 wall-normal cells) which was infeasible."
    - condition: "Solver supports buoyancy-driven flow with Boussinesq density coupling at Ra=1e6 (laminar steady-convective regime)"
      satisfied_by_current_adapter: true
      evidence_ref: "buoyantBoussinesqSimpleFoam (or equivalent) with laminar turbulence model per whitelist DEC-V61-006. Ra=1e6 is well below turbulent onset (~Ra=1.5e8), so laminar+SIMPLE steady is the canonical configuration."
    - condition: "Extractor methodology (mean-over-y wall-adjacent gradient) aligns with gold ref_value definition (wall-averaged hot-wall Nu)"
      satisfied_by_current_adapter: true
      evidence_ref: "EX-1-008 commit 60952b6 landed the mean-over-y refactor; behavior unchanged by Ra downgrade."
  contract_status: >
    SATISFIED — Ra=1e6 downgrade (Path P-2) simultaneously closes three prior
    open issues: (1) mesh-resolution precondition (~1000 cells infeasible →
    40-80 cells sufficient); (2) gold-reference accuracy (de Vahl Davis Nu=8.800
    is unambiguous benchmark, vs. the contested Nu=30@Ra=1e10 value); (3) Q-1
    hard-floor from DEC-ADWM-004 FUSE closes with this same edit. The
    measurement gap between adapter and gold is now a simple mesh/scheme
    convergence question, not a correctness question.
  precondition_last_reviewed: "2026-04-20 (DEC-V61-006 B-class gold remediation · Gate Q-new Case 6 Path P-2 · closes Q-1)"
note: >
  Historical Ra=1e10 configuration (Nu=30 gold, never-resolved mesh) is
  retired by DEC-V61-006. Recovery requires git revert -m 1 of PR #6 merge.
  Phase 7 legacy Docker cache warning below still applies to adapter behaviour:

  Docker E2E (Phase 7, 2026-04-16) crashed at "Starting time loop" with
  "Unknown function type cellCentre" before iteration. The adapter code was
  already corrected to use writeCellCentres (line 4422). The Docker run used
  an older cached adapter version. Rerunning with current adapter should resolve.
observables:
  # ─── HEADLINE GATE ──────────────────────────────────────────────
  - name: nusselt_number
    description: wall-averaged Nusselt number for the hot wall at Ra = 1e6 (de Vahl Davis 1983 benchmark)
    ref_value: 8.8
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.10
    gate_status: HARD_GATED
    family: wall_gradient_derived
    extractor: src.foam_agent_adapter._extract_nc_nusselt
    role: HEADLINE
    source_table: "de Vahl Davis 1983 Table IV"

  # ─── DEC-V61-057 Stage C · multi-dim observable expansion ───────
  # Added per intake §3 + §C: 3 HARD_GATED + 1 PROVISIONAL_ADVISORY.
  # Tolerances per intake §B (B.1 7%, B.2 5%, B.3 8%).

  - name: nusselt_max
    description: peak local Nusselt along the hot wall at y/L ≈ 0.0378 (de Vahl Davis 1983 Table III)
    ref_value: 17.925
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.07
    gate_status: HARD_GATED
    family: wall_gradient_derived
    extractor: src.dhc_extractors.extract_nu_max
    role: SAME_SURFACE_CROSS_CHECK
    source_table: "de Vahl Davis 1983 Table III"

  - name: u_max_centerline_v
    description: peak |u_x| sampled along the x=L/2 vertical mid-plane, non-dim u·L/α (de Vahl Davis 1983 Table II Run 4)
    ref_value: 64.63
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
    gate_status: HARD_GATED
    family: interior_velocity_profile
    extractor: src.dhc_extractors.extract_u_max_vertical
    role: INDEPENDENT_CROSS_CHECK
    source_table: "de Vahl Davis 1983 Table II Run 4"

  - name: v_max_centerline_h
    description: peak |u_y| sampled along the y=L/2 horizontal mid-plane, non-dim v·L/α (de Vahl Davis 1983 Table II Run 4)
    ref_value: 219.36
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
    gate_status: HARD_GATED
    family: interior_velocity_profile
    extractor: src.dhc_extractors.extract_v_max_horizontal
    role: INDEPENDENT_CROSS_CHECK
    source_table: "de Vahl Davis 1983 Table II Run 4"

  - name: psi_max_center
    description: peak |ψ| via trapezoidal ∫ u_x dy reconstruction, non-dim ψ_raw/α (de Vahl Davis 1983 Table I Run 4)
    ref_value: 16.750
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.08
    gate_status: PROVISIONAL_ADVISORY
    family: stream_function_derived
    extractor: src.dhc_extractors.extract_psi_max
    role: ADVISORY_RECONSTRUCTION
    source_table: "de Vahl Davis 1983 Table I Run 4"
    advisory_rationale: |
      ψ is reconstructed by cumulative trapezoidal ∫_0^y u_x dy with the
      no-slip bottom-wall BC. Closure residual at the top wall (which
      should be 0 by mass conservation) measures the integration noise
      floor. The extractor demotes the value from HARD_GATED to
      PROVISIONAL_ADVISORY when closure_residual_max_nondim /
      |PSI_MAX_GOLD_NONDIM| ≥ 0.01 (1 %). PROVISIONAL_ADVISORY observables
      are reported by the comparator but are NOT counted toward the
      pass-fraction overall verdict.
