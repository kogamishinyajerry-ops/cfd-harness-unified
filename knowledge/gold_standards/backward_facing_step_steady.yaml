schema_version: 2
case_id: backward_facing_step_steady
legacy_case_id: backward_facing_step
legacy_source_file: knowledge/gold_standards/backward_facing_step.yaml
source: "Driver & Seegmiller 1985, AIAA J."
literature_doi: "10.2514/3.9086"
physics_contract:
  geometry_assumption: "Backward-facing step with step height H=1, inlet upstream length -1, outlet at x=8 (domain x∈[-1,8], y∈[0,3] in step-height units)"
  reference_correlation_context: "Driver & Seegmiller 1985 report Xr/H=6.26±0.2 at Reh≈37500 with k-ε RANS; velocity profiles at reattachment x/H=6 come from the same experimental dataset."
  physics_precondition:
    - condition: "Flow is separated and reattaches inside the measurement domain (reattachment_x < 8·H)"
      satisfied_by_current_adapter: true
      evidence_ref: "whitelist configures domain x∈[-1,8·H]; Xr≈6.26 sits at the interior — reattachment zero-crossing extractor at src/foam_agent_adapter.py:6591-6634 finds it within the sampling range"
    - condition: "Zero-crossing of Ux at y=0.5·H is a valid reattachment proxy (attached flow vs reverse flow bifurcation at mid-height of the step)"
      satisfied_by_current_adapter: true
      evidence_ref: "src/foam_agent_adapter.py:6601-6629 — y_target=0.5, y_tol=0.15, Ux sign-change x1→x2 with linear interpolant; standard BFS post-processing convention"
    - condition: "Mesh resolves the shear layer separating from the step corner enough to produce a physical Ux(x) sign change"
      satisfied_by_current_adapter: true
      evidence_ref: "Phase 7 Wave 2-3 verdict PASS with Xr deviation <10% per whitelist tolerance"
  contract_status: "COMPATIBLE — all preconditions satisfied; clean PASS is physics-valid"
  precondition_last_reviewed: "2026-04-18 (EX-1-005 annotation slice)"
relationships:
  solver_reuse: backward_facing_step
  geometry_similarity:
    reference_case: backward_facing_step
    similarity_type: TOPOLOGICAL
  physics_analogy:
    reference_case: backward_facing_step
    analogy_basis: legacy_alias
    matched_dimensionless_group: Re
observables:
  # ─── HEADLINE GATE ──────────────────────────────────────────────
  - name: reattachment_length
    description: reattachment length normalized by step height (blended Le/Moin/Kim 1997 DNS Re_H=5100 + Driver/Seegmiller 1985 experiment Re_H≈37500 anchor at adapter Re_H=7600 plateau)
    ref_value: 6.26
    unit: Xr/H
    tolerance:
      mode: relative
      value: 0.10
    gate_status: HARD_GATED
    family: wall_shear_separation_topology
    extractor: src.foam_agent_adapter._extract_bfs_reattachment
    role: HEADLINE
    source_table: "Driver & Seegmiller 1985 / Le, Moin & Kim 1997 (blended)"

  # ─── DEC-V61-067 Stage A.3 · Type II multi-dim observable expansion ─
  # 2 HARD_GATED siblings + 1 PROVISIONAL_ADVISORY spanning 3
  # physically-independent families per Codex F1 rubric (V61-058 R1
  # precedent):
  #   family A (wall_shear_separation_topology)   — reattachment_length (HEADLINE)
  #   family B (pressure_recovery_at_outlet)      — pressure_recovery
  #   family C (shear_layer_recovery_profile)     — velocity_profile_reattachment
  # + 1 PROVISIONAL_ADVISORY (cd_mean) — partial-tautology with primary
  #   wall-shear signal (V61-066 R1 F#3 precedent).

  - name: pressure_recovery
    description: static pressure coefficient at inlet (x/H=-10) and outlet (x/H=30) plus the streamwise rise (Le/Moin/Kim 1997 DNS Re_H=5100)
    ref_value:
      inlet: -0.90
      outlet: 0.10
      delta: 1.00
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.10
    gate_status: HARD_GATED
    family: pressure_recovery_at_outlet
    extractor: src.bfs_extractors.extract_pressure_recovery
    role: PROFILE_QUALITATIVE
    source_table: "Le, Moin & Kim 1997 J. Fluid Mech."
    note: |
      Independent of wall-shear measurement: a working reattachment_length
      gate does NOT automatically imply pressure_recovery is correct.
      This observable detects integrated-momentum-flux errors driven by
      the BFS expansion ratio (ER=1.125) and inlet BL state.

  - name: velocity_profile_reattachment
    description: streamwise velocity at x/H=6.0, y/H ∈ {0.5, 1.0, 2.0}, normalized by U_bulk (Le/Moin/Kim 1997 DNS Re_H=5100, post-reattachment recovery layer)
    ref_value:
      - x_H: 6.0
        y_H: 0.5
        u_Ubulk: 0.40
      - x_H: 6.0
        y_H: 1.0
        u_Ubulk: 0.85
      - x_H: 6.0
        y_H: 2.0
        u_Ubulk: 1.05
    tolerance:
      mode: relative
      value: 0.10
    gate_status: HARD_GATED
    family: shear_layer_recovery_profile
    extractor: src.bfs_extractors.extract_velocity_profile_at_x
    role: PROFILE_QUALITATIVE
    source_table: "Le, Moin & Kim 1997 J. Fluid Mech. Table at x/H=6"
    note: |
      Independent of bulk wall shear: a κ-ε / k-ω SST model can match
      reattachment_length (a topological observable) while mis-predicting
      the shear-layer recovery rate. The 3-point profile at x/H=6 isolates
      the post-reattachment u(y) shape, sensitive to mixing.

  - name: cd_mean
    description: mean |Cf| over the downstream lower_wall (V61-067 SAME_RUN_CROSS_CHECK on the wall-shear field that drives reattachment_length)
    ref_value: 2.08
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.10
    gate_status: PROVISIONAL_ADVISORY  # R1 F#3-style downgrade — same wall-shear field as primary
    family: integrated_wall_shear_cross_check
    extractor: src.bfs_extractors.extract_cd_mean
    role: SAME_RUN_CROSS_CHECK
    source_table: "Le, Moin & Kim 1997 (placeholder anchor — see advisory_rationale)"
    advisory_rationale: |
      Codex F1 partial-tautology (V61-066 R1 F#3 precedent): cd_mean is a
      reduction of the SAME wallShearStress field that drives the primary
      reattachment_length gate (different reduction operator: mean |Cf|
      vs first sign-change x). Even though the EXTRACTOR is independent
      (extract_cd_mean reads tau_x directly), the GATE is a
      SAME_RUN_CROSS_CHECK restatement of the same wall-shear signal.
      Downgraded to PROVISIONAL_ADVISORY: reported by the comparator,
      NOT counted toward the pass-fraction.

      Additional caveat: ref_value 2.08 is a legacy placeholder from the
      multi-doc backward_facing_step.yaml; the cited Le/Moin/Kim 1997 DNS
      paper does not report a "cd_mean" scalar. Adapter extraction is
      mean |Cf| over the downstream floor, order-of-magnitude ~10⁻³ to
      10⁻² for kOmegaSST at Re_H=7600 — divergence from 2.08 is expected
      and absorbed by PROVISIONAL_ADVISORY status.
