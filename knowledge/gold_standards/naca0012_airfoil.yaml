schema_version: 2
case_id: naca0012_airfoil
source: "Thomas 1979 / Lada & Gostling 2007"
literature_doi: "10.1017/S0001924000001169"
note: >
  Phase 7 Docker E2E (simpleFoam + kOmegaSST, Re=3e6) diverged with NaN pressure
  after 17892s. Root cause: GAMG p solver relTol 0.01 too tight; missing p URF;
  omega URFs 0.7 too aggressive for high-Re external flow. Fix in adapter:
  (1) p GAMG relTol 0.05 + p URF 0.2; (2) U/k/omega equations URF 0.5 each.
  Current adapter fvSolution needs these corrections.
observables:
  - name: pressure_coefficient
    description: pressure coefficient distribution along the NACA 0012 chord
    ref_value:
      - x: 0.0
        Cp: 1.0
      - x: 0.1
        Cp: -0.3
      - x: 0.3
        Cp: -0.5
      - x: 0.5
        Cp: -0.2
      - x: 0.7
        Cp: 0.0
      - x: 1.0
        Cp: 0.2
    tolerance:
      mode: relative
      value: 0.20
