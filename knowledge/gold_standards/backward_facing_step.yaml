# Gold Standard — Backward-Facing Step
# Corroborating literature:
#   - Le, Moin & Kim 1997, J. Fluid Mech. 330, 349-374 — DNS at Re_H=5100
#     with expansion ratio 1.2, reports Xr/H=6.28.
#   - Driver & Seegmiller 1985, AIAA J. 23(2), 163-171 — experiment at
#     Re_H≈37500 fully-turbulent, reports Xr/H=6.26.
#   - Armaly et al. 1983, J. Fluid Mech. 127, 473-496 — laminar→
#     transitional experimental envelope.
#
# Anchor choice (DEC-V61-046 round-3 R2-M2, 2026-04-23):
#   The whitelist runs this case at Re_H=7600 (bulk-velocity/step-height
#   Reynolds number), in the post-transition regime where both literature
#   anchors above (5100 DNS, 37500 experiment) bracket the plateau within
#   the declared 10% tolerance. The stored reference_values[].value=6.26
#   is retained for whitelist continuity — it is within 0.3% of the
#   Le/Moin/Kim 6.28 and matches the Driver & Seegmiller experimental
#   number exactly, which is how the harness started. It is therefore a
#   BLENDED engineering anchor rather than a pure Le/Moin/Kim number.
#   The comparator's 10% tolerance absorbs the 0.02 literature spread
#   without papering over the real sensitivity: the post-transition
#   plateau is "weakly Re-sensitive", not a tight <2% claim, and the
#   remaining drift depends on expansion ratio, inlet BL state, and 2D/3D
#   effects that the adapter's 2D-empty patch treatment does not model.
# Expansion ratio 1.125, incompressible, steady.
# INTERNAL flow over a backward-facing step.

physics_contract:
  geometry_assumption: "Backward-facing step (canonical 3-block mesh, DEC-V61-052): step height H=1, inlet channel height=8·H, full downstream channel height=9·H (expansion ratio ER=H_channel/H_inlet=9/8=1.125 per Driver & Seegmiller 1985). 2D with empty front/back (SIMPLE_GRID adapter path). Upstream L_up=10·H, downstream L_down=30·H. Pre-DEC-V61-052 this YAML line incorrectly claimed channel_height=1.125·H, which under the single-block adapter of that era produced a flat channel with no step — the geometry_assumption text is now corrected to match the canonical ER=1.125 convention that the rewritten adapter emits."
  reference_correlation_context: "The stored reference_values[].value=6.26 is a blended engineering anchor (see header block). Le/Moin/Kim 1997 DNS at Re_H=5100 reports 6.28; Driver & Seegmiller 1985 experiment at Re_H≈37500 reports 6.26; both bracket the post-transition plateau at our whitelist Re_H=7600 well inside the 10% tolerance band. The anchor is cited as Le/Moin/Kim because their DNS is the closer-regime literature; the 0.02 numerical offset vs the stored 6.26 is treated as within-tolerance rather than as a pure-DNS claim. No tight <2% sensitivity claim is made — the plateau is qualitative, and the residual drift depends on expansion ratio (1.2 DNS vs 1.125 adapter), inlet BL state, and the 2D-empty-patch simplification of the adapter path."
  physics_precondition:
    - condition: "Re_H sits in the post-transition regime where Xr/H is weakly Re-sensitive (7600 adapter vs 5100 reference, drift absorbed by 10% tolerance)"
      satisfied_by_current_adapter: partial
      evidence_ref: "src/foam_agent_adapter.py:1178-1184 — nu=1/Re=1/7600 with U_bulk=1. Regime argument documented in yaml header lines 6-13; accepted under Gate Q-4 Path A. The regime match is qualitative-plateau, not a 2% quantified tolerance."
    - condition: "Turbulence model adequate for transitional/turbulent separated flow (adapter uses RANS k-omega SST against a DNS reference)"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-052 round 2c: default RAS model is now kOmegaSST (selected via TaskSpec.boundary_conditions.turbulence_model, default 'kOmegaSST'). SST's F1/F2 blending — k-ω near the wall, k-ε in the free stream — captures the separated shear layer substantially better than standard k-ε on BFS. Measured improvement on the same mesh: kEpsilon → Xr/H=3.99 (-36.3% miss), kOmegaSST + x-graded mesh → Xr/H=5.64 (-9.9% miss, inside 10% tolerance). kEpsilon remains available as a wrong_model diagnostic."
    - condition: "Mesh resolves reattachment region + shear layer at declared 36000 cells"
      satisfied_by_current_adapter: partial
      evidence_ref: "DEC-V61-052 adapter: 3-block topology produces 7360 cells (ncx_A=40, ncy_A=16, ncx_B=120, ncy_B1=40, ncy_B2=16) on the quick-run fixture. B1 near-floor dy=0.025 gives first-cell y+≈5 (Spalding blending wall function handles it) and recirculation bubble spans ~16 cells laterally, ~40 vertically. G3/G4/G5 gate battery now all clean. YAML's 36000-cell aspiration stands for the authoritative mesh; the 7360-cell fixture is a known-undersampled-but-stable quick-run. Mesh independence study deferred to a follow-up DEC."
    - condition: "Residual convergence reaches attestor A4/A5/A6 thresholds"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-052 Batch B + round 2d: 1500-iter simpleFoam run under bounded-upwind + SIMPLEC + Spalding wall fn + kOmegaSST. Residual plateau: Ux 6.42e-6 → 6.41e-6 across t=1400→1500 (+0.1% per 100 iters). Uy 1.10e-4, continuity sum_local=1.30e-7, sum_global=~1e-9. Two-fixture Xr stability: t=1000 fixture → 5.642, t=1500 fixture → 5.647 (+0.09% drift over 500 iters). G3/G4/G5 gate battery all clean. Supersedes the pre-DEC-V61-052 ATTEST_HAZARD caused by the single-block generator diverging k/ε to 1e+30."
  contract_status: "SATISFIED — DEC-V61-052 closed all four defects V61-051 exposed (flat channel with no step; k/ε to 1e+30; misaligned Xr probe; no wall-shear measurement). The rewritten 3-block mesh produces a real BFS field (15154 pts, 0 points in step void, |U|_max=1.04·U_bulk). Round 3 (Codex r2 #1) landed the authoritative wall-shear Xr extractor: read `lower_wall` face tau_x from the allPatches VTK, find the pos→neg sign change (OpenFOAM's convention for -tau_xy on a floor where reversed flow → positive), interpolate to the zero crossing. Current fixture yields Xr/H = 5.647 via `reattachment_method: wall_shear_tau_x_zero_crossing`. Round 2a near-wall Ux proxy (Xr/H=5.647 via `near_wall_tau_x_proxy_via_Ux`) remains as a cross-check and agrees to the 4th digit. Round 2c flipped the default RAS model from kEpsilon (Xr/H=3.99, -36.3% miss) to kOmegaSST + x-graded mesh (simpleGrading 0.25 near the step corner), bringing Xr/H to 5.647 — -9.8% vs Driver 1985 = 6.26, INSIDE the 10% tolerance band. Round 2d raised endTime to 1500 and demonstrated two-fixture Xr stability across t=1000/1500 (drift +0.09%) + Ux residual plateau at t=1400→1500 (+0.1% per 100 iters). Round 2b added a structured preflight scalar-contract gate that cannot be evaded by status renaming. Solver: simpleFoam, kOmegaSST + SIMPLEC + bounded-linearUpwind + Spalding wall function, final continuity sum_local=1.30e-7 on 7360 cells. kEpsilon remains available as a `wrong_model` diagnostic via boundary_conditions.turbulence_model override. Geometry, solver convergence, and headline scalar all pass."
  precondition_last_reviewed: "2026-04-23 (DEC-V61-052 Batch B · multi-block mesh + hardened solver config)"

