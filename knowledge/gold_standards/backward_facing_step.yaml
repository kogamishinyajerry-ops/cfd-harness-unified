# Gold Standard — Backward-Facing Step
# Based on Driver & Seegmiller 1985, AIAA J. 23(1), 163-165
# Re = 7600 (based on step height H and inlet bulk velocity),
# expansion ratio 1.125, incompressible, steady
# INTERNAL flow over a backward-facing step

quantity: reattachment_length
reference_values:
  - value: 6.26
    unit: Xr/H
    description: "reattachment length normalized by step height H"
tolerance: 0.10
source: "Driver & Seegmiller 1985, AIAA J."
literature_doi: "10.2514/3.9086"
mesh_info:
  cells: 36000
  type: structured
solver_info:
  name: simpleFoam
  schemes: SIMPLE
case_info:
  id: backward_facing_step
  Re: 7600
  flow_type: INTERNAL
  geometry_type: BACKWARD_FACING_STEP
  steady_state: STEADY
  expansion_ratio: 1.125

