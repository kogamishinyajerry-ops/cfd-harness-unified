# Gold Standard — Fully Developed Plane Channel Flow (DNS)
# Based on Kim et al. 1987 / Moser et al. 1999
# Re_tau = 180 (based on friction velocity),
# 2D channel flow, DNS (direct numerical simulation)
# STEADY simulation (time-averaged)

quantity: u_mean_profile
reference_values:
  - y_plus: 0.0
    u_plus: 0.0
    description: "no-slip boundary at wall"
  - y_plus: 5.0
    u_plus: 5.4
    description: "near-wall point (Kim 1987 DNS)"
  - y_plus: 30.0
    u_plus: 13.5
    description: "log-law region: (1/0.41)·ln(30)+5.2 = 13.49 ≈ 13.5 (Moser 1999 Re_τ=180 DNS). Gate Q-new Case 8 Path A, DEC-V61-006. Previous 14.5 was ~7% high."
  - y_plus: 100.0
    u_plus: 22.8
    description: "channel center (Kim 1987 DNS) — NOTE: 22.8 looks anomalous vs log-law ~16.4 and Moser centerline ~18.3; out of audit §5.2 scope, queued for follow-up"
tolerance: 0.05
source: "Kim et al. 1987 / Moser et al. 1999"
literature_doi: "10.1017/S0022112087000892"
mesh_info:
  cells: 4000
  type: structured
solver_info:
  name: icoFoam
  schemes: PISO
case_info:
  id: plane_channel_flow
  Re_tau: 180
  flow_type: INTERNAL
  geometry_type: BODY_IN_CHANNEL
  steady_state: STEADY
  half_channel_height: 1.0
