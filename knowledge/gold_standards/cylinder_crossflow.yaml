schema_version: 2
case_id: cylinder_crossflow
legacy_case_id: circular_cylinder_wake
legacy_source_file: knowledge/gold_standards/circular_cylinder_wake.yaml
source: "Williamson 1996, Annu. Rev. Fluid Mech."
literature_doi: "10.1146/annurev.fl.28.010196.002421"
physics_contract:
  geometry_assumption: "2D cylinder in freestream, diameter D=1.0 (whitelist default) or 0.1 (adapter _generate_body_in_channel inner setup), centred at x=0, y=0 with upstream/downstream channel of sufficient length to not confine the wake."
  reference_correlation_context: "Williamson 1996 reports St≈0.164, Cd≈1.33, Cl_rms≈0.048 for Re=100 laminar Karman shedding from a 2D cylinder. Centerline u/U_inf deficits at x/D=1..5 are from the same dataset."
  physics_precondition:
    - condition: "Flow is 2D laminar at Re=100 (unambiguously in laminar shedding regime 40 < Re < ~180)"
      satisfied_by_current_adapter: true
      evidence_ref: "whitelist declares Re=100 + pimpleFoam (transient); _generate_body_in_channel mesh 40000 cells structured."
    - condition: "Transient solution runs long enough to capture multiple shedding cycles AND time-average removes start-up transients."
      satisfied_by_current_adapter: partially
      evidence_ref: "no explicit window control in the adapter; whitelist runtime assumed sufficient."
      consequence_if_unsatisfied: "St and Cd estimates from too-short windows converge slowly; PASS outcome still likely at Re=100 due to the next precondition's safety net."
    - condition: "Strouhal extractor reflects solver physics (not a hardcoded canonical value)."
      satisfied_by_current_adapter: false
      evidence_ref: "src/foam_agent_adapter.py:6766-6774 — canonical_st=0.165 if 50<=Re<=200 else None; key_quantities['strouhal_number']=canonical_st."
      consequence_if_unsatisfied: "PASS on the strouhal_number observable alone proves nothing about solver output at the whitelist Re=100 point. The supplementary pressure_coefficient_rms_near_cylinder IS derived from solver data. cd_mean and cl_rms observables are NOT subject to this hardcoding."
  contract_status: "COMPATIBLE_WITH_SILENT_PASS_HAZARD"
  contract_status_detail: "cd_mean, cl_rms, and u_mean_centerline are physics-faithful comparisons; strouhal_number is a shortcut that should be audited as 'canonical-band shortcut fired' when key_quantities['strouhal_number']==0.165 exactly while Re in [50,200]."
  precondition_last_reviewed: "2026-04-18 (EX-1-005 annotation slice; EX-1-G3 structural promotion)"
relationships:
  solver_reuse: circular_cylinder_wake
  geometry_similarity:
    reference_case: circular_cylinder_wake
    similarity_type: TOPOLOGICAL
  physics_analogy:
    reference_case: circular_cylinder_wake
    analogy_basis: legacy_alias
    matched_dimensionless_group: Re
observables:
  - name: strouhal_number
    description: vortex shedding Strouhal number
    ref_value: 0.164
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
  - name: cd_mean
    description: mean drag coefficient
    ref_value: 1.33
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
  - name: cl_rms
    description: RMS lift coefficient
    ref_value: 0.048
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
  - name: u_mean_centerline
    description: mean centerline wake velocity deficit
    ref_value:
      - x_D: 1.0
        u_Uinf: 0.83
      - x_D: 2.0
        u_Uinf: 0.64
      - x_D: 3.0
        u_Uinf: 0.55
      - x_D: 5.0
        u_Uinf: 0.35
    tolerance:
      mode: relative
      value: 0.05
