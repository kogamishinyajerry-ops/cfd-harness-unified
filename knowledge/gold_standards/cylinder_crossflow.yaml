schema_version: 2
case_id: cylinder_crossflow
legacy_case_id: circular_cylinder_wake
legacy_source_file: knowledge/gold_standards/circular_cylinder_wake.yaml
source: "Williamson 1996, Annu. Rev. Fluid Mech."
literature_doi: "10.1146/annurev.fl.28.010196.002421"
physics_contract:
  # NOTE: cylinder_crossflow.yaml is a LEGACY ALIAS of circular_cylinder_wake.yaml
  # (see `legacy_case_id` above + docs/design/AUTO_VERIFIER_ARCHITECTURE.md).
  # Both files declare the same physics contract; keep in sync. Consolidation
  # into a single gold YAML is a post-V61-053 follow-up DEC (not in scope here).
  # physics_contract block mirrors circular_cylinder_wake.yaml as of DEC-V61-053
  # Batch A (2026-04-23).
  geometry_assumption: "2D cylinder in freestream, D=0.1 m (adapter _generate_body_in_channel). Re=100. Williamson 1996 anchors assume unconfined flow. As of DEC-V61-053 Batch B1 (commits 63c11cb / f1a9cf3), adapter emits L_inlet=10D, L_outlet=20D, H=6D per side → ~8% blockage (was 20% pre-B1). Synced with circular_cylinder_wake.yaml."
  reference_correlation_context: "Williamson 1996 reports St≈0.164, Cd≈1.33, Cl_rms≈0.048 for Re=100 laminar Karman shedding from a 2D cylinder. u_mean_centerline gold values 0.83→0.35 at x/D ∈ {1,2,3,5} are WAKE DEFICIT = (U_inf - u_mean)/U_inf (per the per-observable `description: mean centerline wake velocity deficit`). The gold ref_value key `u_Uinf` is historical mislabeling; Batch B2 resolved via documentation + extractor-self-naming (no rename, retained for backward compat)."
  physics_precondition:
    - condition: "Flow is 2D laminar at Re=100 (unambiguously in laminar shedding regime 40 < Re < ~180)"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-053 Batch B1a (commit 63c11cb): adapter dispatch at src/foam_agent_adapter.py:513-533 now queries whitelist.yaml `turbulence_model: laminar` via _db.get_execution_chain and uses it. kOmegaSST override no longer fires for cylinder."
    - condition: "Domain is large enough that blockage does not bias Cd/St/u_centerline vs Williamson's unconfined anchors."
      satisfied_by_current_adapter: partially
      evidence_ref: "DEC-V61-053 Batch B1a grew L_inlet 2D→10D, L_outlet 8D→20D, H 2.5D→6D. Blockage 20% → ~8%. Mesh scaled (200×100)→(600×240) = 144k cells to preserve dx=dy=0.05D."
      consequence_if_unsatisfied: "Residual 8.3% blockage still above 5% rule-of-thumb — expected +3-5% Cd bias. Round-1 tolerance skirt acknowledged."
      resolution_plan: "RESIDUAL_RISK_CARRIED: 8.3% blockage accepted for this DEC; future follow-up DEC may grow H to 10D for <5% blockage. Synced with circular_cylinder_wake.yaml."
    - condition: "Transient solution runs long enough to capture ≥8 shedding cycles AND time-average removes start-up transients."
      satisfied_by_current_adapter: partially
      evidence_ref: "DEC-V61-041 landed forceCoeffs FO + cylinder_strouhal_fft windowing. No regression since."
    - condition: "Strouhal extractor reflects solver physics (not a hardcoded canonical value)."
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-041 retired canonical_st=0.165 hardcode. src/cylinder_strouhal_fft.emit_strouhal now does FFT on forceCoeffs Cl(t). Cd_mean and Cl_rms from the same trimmed series."
    - condition: "Audit fixture surfaces St as measurement.quantity (not U_max_approx fallback)."
      satisfied_by_current_adapter: false
      evidence_ref: "ui/backend/tests/fixtures/runs/circular_cylinder_wake/audit_real_run_measurement.yaml → measurement.quantity = U_max_approx."
      resolution_plan: "DEC-V61-053 Batch B3 — phase5_audit_run.py emits St as primary."
    - condition: "u_mean_centerline semantics (raw vs deficit) are unambiguously documented AND aligned with extractor output."
      satisfied_by_current_adapter: true
      evidence_ref: "Gold values 0.83→0.35 are wake deficit per observable description field. ref_value key `u_Uinf` retained for backward compat with existing contract-dashboard and e2e-report tests (rename reverted in Batch B2 — blast radius too large). Extractor self-names output keys `deficit_x_over_D_*`; Batch B3 bridges gold↔extractor via x_D lookup."
      resolution_plan: "RESOLVED in Batch B2 (documented; no gold rename). Future DEC may consolidate both YAMLs and rename keys together."
  contract_status: "COMPATIBLE_WITH_SILENT_PASS_HAZARD"
  contract_status_detail: "Canonical_st=0.165 hazard RETIRED in DEC-V61-041. Three NEW hazards documented in physics_precondition (blockage, silent kOmegaSST override, u_mean_centerline deficit-mislabel). DEC-V61-053 Batch B1-B3 resolves all three; contract_status flips to SATISFIED at Batch B3 close. This alias YAML tracks the same status as circular_cylinder_wake.yaml."
  precondition_last_reviewed: "2026-04-23 (DEC-V61-053 Batch A intake integration; synced with circular_cylinder_wake.yaml)"
  reference_probe_coords:
    u_mean_centerline:
      - x_D: 1.0
        y: 0.0
        z: 0.0
      - x_D: 2.0
        y: 0.0
        z: 0.0
      - x_D: 3.0
        y: 0.0
        z: 0.0
      - x_D: 5.0
        y: 0.0
        z: 0.0
relationships:
  solver_reuse: circular_cylinder_wake
  geometry_similarity:
    reference_case: circular_cylinder_wake
    similarity_type: TOPOLOGICAL
  physics_analogy:
    reference_case: circular_cylinder_wake
    analogy_basis: legacy_alias
    matched_dimensionless_group: Re
observables:
  - name: strouhal_number
    description: vortex shedding Strouhal number
    ref_value: 0.164
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
  - name: cd_mean
    description: mean drag coefficient
    ref_value: 1.33
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
  - name: cl_rms
    description: RMS lift coefficient
    ref_value: 0.048
    unit: dimensionless
    tolerance:
      mode: relative
      value: 0.05
  - name: u_mean_centerline
    description: mean centerline wake velocity deficit
    ref_value:
      - x_D: 1.0
        u_Uinf: 0.83
      - x_D: 2.0
        u_Uinf: 0.64
      - x_D: 3.0
        u_Uinf: 0.55
      - x_D: 5.0
        u_Uinf: 0.35
    tolerance:
      mode: relative
      value: 0.05
