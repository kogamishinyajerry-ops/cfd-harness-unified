# primary_vortex_location — DEC-V61-050 batch 3 closure (2026-04-23)
# Ghia 1982 Table III Re=100: primary vortex centre + ψ_min.
# Extracted via 2D-argmin of ψ(x, y) = ∫₀^y U_x dy' on a 129² resampling
# of the audit VTK (see ui/backend/services/psi_extraction.py).
# Tolerances:
#   position_tolerance 0.02 (≈ ±2 grid cells on 129² — Ghia's own
#       grid spacing was 1/128 ≈ 0.0078, so one-cell quantization plus
#       finite-grid truncation comfortably fits within 0.02).
#   psi_tolerance 0.05 (5% on |ψ_min| — same tolerance as u/v centerlines).
quantity: primary_vortex_location
