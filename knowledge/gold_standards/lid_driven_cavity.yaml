# secondary_vortices — DEC-V61-050 batch 4 closure (2026-04-23)
# Ghia 1982 Table III Re=100: BL (bottom-left) and BR (bottom-right)
# counter-rotating corner eddies. Both have ψ > 0 because they
# rotate opposite to the clockwise primary vortex (ψ < 0).
#
# Extraction windows (normalized, supplied to find_vortex_core):
#   BL: x ∈ [0, 0.25], y ∈ [0, 0.25], mode='max' → ψ_max = BL_ψ
#   BR: x ∈ [0.75, 1], y ∈ [0, 0.25], mode='max' → ψ_max = BR_ψ
#   TL eddy does NOT exist at Re=100 (emerges only at Re≥1000).
#
# Tolerances:
#   position 0.02 (same as primary — ±2 grid cells on 129²)
#   psi 0.10 — RELAXED from primary's 0.05 because corner eddies
#     are an order of magnitude more mesh-sensitive than the primary
#     vortex (their ψ strength is 5-6 orders of magnitude smaller;
#     any truncation error in ψ field is amplified when divided by
#     1e-6 ψ_gold). Smoke test on the 20260421T082340Z fixture shows
#     5.7% BL / 3.0% BR error — both within 10%.
quantity: secondary_vortices
reference_values:
  - name: BL
    x: 0.0313
    y: 0.0391
    psi: 1.74877e-6
    x_window_norm: [0.0, 0.25]
    y_window_norm: [0.0, 0.25]
    mode: max
    description: "bottom-left corner eddy"
  - name: BR
    x: 0.9453
    y: 0.0625
    psi: 1.25374e-5
    x_window_norm: [0.75, 1.0]
    y_window_norm: [0.0, 0.25]
    mode: max
    description: "bottom-right corner eddy"
position_tolerance: 0.02
psi_tolerance: 0.10  # Relaxed from 0.05 — corner eddies are mesh-sensitive.
