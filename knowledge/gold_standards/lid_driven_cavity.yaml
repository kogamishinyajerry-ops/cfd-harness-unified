# Gold Standard — Lid-Driven Cavity
# Based on Ghia, Ghia & Shin 1982, J. Comput. Phys. 47, 387-411 — Table I.
# Re = 100, square cavity, lid-driven top wall (u=1.0), all other walls no-slip (u=0).
# Steady-state, incompressible, structured grid.
#
# Q-5 Path A closure (2026-04-21, DEC-V61-030):
#   The prior u_centerline reference_values claimed Ghia 1982 authorship
#   but did NOT match the paper (old gold: u=+0.025 at y=0.5; Ghia actual:
#   -0.20581). Values were synthesized in Phase 0 (commit fc21f47d) without
#   cross-verifying the source. Phase 5a real-solver run first surfaced the
#   mismatch; Phase 5b confirmed simpleFoam produces genuine Ghia physics.
#   These values are now interpolated from Ghia 1982 Table I (Re=100 column)
#   to the harness's uniform 17-point y grid.
#
# Ghia 1982 Table I native (non-uniform) y points for Re=100:
#   0.0000  u=0.00000            | 0.5000  u=-0.20581 (matches target)
#   0.0547  u=-0.03717           | 0.6172  u=-0.13641
#   0.0625  u=-0.04192 (matches) | 0.7344  u=+0.00332 (u crosses zero)
#   0.0703  u=-0.04775           | 0.8516  u=+0.23151
#   0.1016  u=-0.06434           | 0.9531  u=+0.68717
#   0.1719  u=-0.10150           | 0.9609  u=+0.73722
#   0.2813  u=-0.15662           | 0.9688  u=+0.78871
#   0.4531  u=-0.21090 (min)     | 0.9766  u=+0.84123
#                                | 1.0000  u=+1.00000 (lid BC)
#
# v_centerline closure 2026-04-23 (DEC-V61-050 batch 1):
#   Prior v_centerline block was Ghia Table II data mislabelled by axis
#   ("y" instead of "x") with arbitrary-looking values that did not match
#   Ghia at either y-index or x-index. Replaced with Ghia's native 17
#   non-uniform x points + exact Table II v values (no interpolation so
#   the 0.2344→0.5 gap does not get linearly filled). Post-hoc measured
#   v sampled from the existing 20260421T082340Z VTK via pyvista
#   interpolation on y=0.05 line; no simpleFoam re-run needed for the
#   fixture. precondition #4 now satisfied_by_current_adapter=true.
#
# primary_vortex_location closure 2026-04-23 (DEC-V61-050 batch 3):
#   Replaced the prior mis-aligned block (x=0.5000, y=0.7650, icoFoam)
#   with Ghia Table III Re=100: x=0.6172, y=0.7344, ψ_min=-0.103423.
#   Wired a 2D-argmin-of-ψ extractor via psi_extraction.py (integrates
#   ψ = ∫₀^y U_x dy' on a 129² resampling of the existing VTK, finds
#   the interior minimum). Smoke-test matches Ghia exactly in (x, y)
#   and to 0.23% on ψ_min. precondition #5 flipped to satisfied.
#
# Secondary vortices closure 2026-04-23 (DEC-V61-050 batch 4):
#   Added a secondary_vortices doc below with Ghia Table III Re=100:
#     BL: (0.0313, 0.0391, ψ=+1.749e-6)
#     BR: (0.9453, 0.0625, ψ=+1.254e-5)
#     TL does not exist at Re=100 (appears only at Re≥1000).
#   Extractor: psi_extraction.find_vortex_core(mode='max', x_window=,
#   y_window=) on the same 129² ψ grid used by the primary vortex.
#   Relaxed tolerance (10% vs primary's 5%) because corner eddies
#   are finite-grid sensitive by an order of magnitude more than the
#   main vortex. contract_status → FULLY_SATISFIED_ALL_4_GHIA_TABLES.

physics_contract:
  geometry_assumption: "Square cavity, L=0.1 m (convertToMeters=0.1), top lid at fixedValue U=(U_lid,0,0) with U_lid=1.0 m/s; other walls no-slip; front/back empty (2D). Re=U·L/ν with ν=1e-3 gives Re=100 matching Ghia Table I."
  reference_correlation_context: "Ghia, Ghia & Shin 1982, J. Comput. Phys. 47, 387-411 — Table I Re=100 column is the canonical reference for 2D lid-driven square-cavity flow. u_centerline reference values below are Ghia Table I interpolated to the harness's 17-point uniform y grid (DEC-V61-030 Q-5 Path A closure, 2026-04-21)."
  physics_precondition:
    - condition: "Flow is laminar at Re=100 (Re well below any cavity-transition regime ~7500)"
      satisfied_by_current_adapter: true
      evidence_ref: "src/foam_agent_adapter.py:810 writes constant/turbulenceProperties simulationType laminar; no RAS model active."
    - condition: "Steady-state SIMPLE converged to machine-zero residuals for u_centerline extraction"
      satisfied_by_current_adapter: true
      evidence_ref: ".planning/STATE.md:1279 — lid_driven_cavity ATTEST_PASS, gates []; convergence attestor A1..A6 all green on current fixtures."
    - condition: "u_centerline reference values are Ghia 1982 Table I indexed by y (this observable only)"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-030 Path A (2026-04-21) re-interpolated Ghia Table I to the 17-point y grid; verified against Ghia native points documented in YAML header lines 15-24."
    - condition: "v_centerline reference values match Ghia 1982 Table II v(x) along the geometric horizontal centreline"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-050 batch 1 (2026-04-23) replaced the prior mislabelled block with Ghia Table II Re=100 native 17-point non-uniform x grid + exact v values (cross-verified against scripts/flow-field-gen/generate_contours.py:103-110 which had encoded the same values for the literature-reference visualization since DEC-V61-007). Measured v extracted from existing 20260421T082340Z VTK via pyvista interpolation on y=0.05 (physical y=0.005·0.1m = 0.005m, normalized y=0.5·L); no simpleFoam re-run needed — the underlying audit field is the same. See reports/phase5_fields/lid_driven_cavity/20260421T082340Z/postProcessing/sets/1024/vCenterline_U.xy and vCenterlineGold_U.xy."
    - condition: "primary_vortex_location matches Ghia 1982 Re=100 primary vortex centre (0.6172, 0.7344) and ψ_min = -0.103423"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-050 batch 3 (2026-04-23) replaced the prior mis-aligned block (x=0.5000, y=0.7650, icoFoam, 64800 cells) with Ghia 1982 Table III Re=100 values (x=0.6172, y=0.7344, ψ_min=-0.103423) and wired a 2D-argmin-of-ψ extractor via ui/backend/services/psi_extraction.py (integrates ψ = ∫₀^y U_x dy' along columns of a 129² pyvista resampling of the existing 20260421T082340Z VTK). Smoke test matches Ghia exactly in (x, y) and within 0.23% on ψ_min — see the psi_extraction __main__ harness. No simpleFoam re-run."
    - condition: "Mesh resolved for Re=100 primary vortex (at least 65×65 uniform)"
      satisfied_by_current_adapter: true
      evidence_ref: "whitelist default grid meets the Ghia high-resolution reference shoulder (Ghia 1982 used 129×129 on a second-order finite-difference stream-function/vorticity solver — historical high-resolution benchmark, not a present-day DNS claim) via comparator tolerance 0.05 absorbing finite-grid truncation; historical audit_real_run + mesh sweep fixtures all PASS on u_centerline."
    - condition: "Secondary vortices BL (bottom-left) and BR (bottom-right) match Ghia 1982 Table III Re=100 corner eddy positions and ψ strengths"
      satisfied_by_current_adapter: true
      evidence_ref: "DEC-V61-050 batch 4 (2026-04-23) added a secondary_vortices gold block with Ghia Table III Re=100 values — BL: (0.0313, 0.0391, ψ=+1.749e-6); BR: (0.9453, 0.0625, ψ=+1.254e-5) — and wired a corner-windowed ψ-argmax extractor via psi_extraction.find_vortex_core(mode='max'). Smoke test on the existing 20260421T082340Z VTK: BL meas=(0.0312, 0.0391, ψ=+1.649e-6) → 5.7% ψ error; BR meas=(0.9453, 0.0625, ψ=+1.216e-5) → 3.0% ψ error; both within the 10% psi_tolerance chosen for corner eddies (which are more mesh-sensitive than the primary vortex). TL eddy does not exist at Re=100."
  contract_status: "FULLY_SATISFIED_ALL_4_GHIA_TABLES — u_centerline (Table I), v_centerline (Table II), primary_vortex_location (Table III primary row), and secondary_vortices (Table III BL + BR rows) are all Ghia-faithful and exercised by the audit comparator. DEC-V61-050 closure 2026-04-23: LDC is now validated against every observable Ghia 1982 reports for Re=100."
  precondition_last_reviewed: "2026-04-22 (demo-first convergence round · 10-case physics_contract backfill)"

