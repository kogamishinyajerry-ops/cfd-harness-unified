# Risk-flag canonical registry — enum source-of-truth for CaseProfile.risk_flags[]
# and intake.yaml §4 risk_flags slots.
#
# Authority:  Opus 4.7 Pivot Post-Hoc Review §7 (2026-04-24) — "risk flags
#             属于 intake.yaml schema 的必填字段, 应写进 KNOWLEDGE_OBJECT_MODEL
#             的 CaseProfile 对象定义".
# Gate:       G-6 of Post-Pivot Go/No-Go (docs/governance/PIVOT_CHARTER_2026_04_22.md §4.3a).
# Schema ver: 1 (integer, per VERSION_COMPATIBILITY_POLICY v1.0 §2.1).
# Effective:  2026-04-24.
#
# Each entry is a named risk annotation. CaseProfile.risk_flags[] MUST only
# reference flag_id values that appear in this file's `flags:` list.
# Per-case populated files live at .planning/case_profiles/<case_id>.yaml.
#
# When a flag proves obsolete: do NOT delete. Set status: deprecated + deprecation_since
# + successor (if any). Keeps provenance auditable (per VERSION_COMPATIBILITY_POLICY §5.3).

schema_version: 1
registry_version: "1.0.0"
effective: "2026-04-24"

flags:

  # -- Mandatory v2.0+ template slots (RETRO-V61-053 post-R3 2026-04-24) --

  - flag_id: executable_smoke_test
    severity_default: high
    origin: RETRO-V61-053 post-R3 addendum
    origin_date: "2026-04-24"
    origin_commit: "d3ffc06"
    description: |
      Unit tests exercising generator methods via direct call bypass the
      dispatch-layer where upstream accessors (e.g. self._db.get_execution_chain)
      are evaluated. Codex static review catches logic bugs but cannot catch
      accessor-level bugs without actual runtime execution.
    mitigation_pattern: |
      Before accepting ANY Codex APPROVE on adapter change, run one
      short-duration (<10min wall) end-to-end invocation through the
      dispatch path. Docker-based OpenFOAM smoke test qualifies; or a pytest
      mock that constructs FoamAgentExecutor and calls .execute(task) through
      to blockMesh, not leaf generators.
    applies_to:
      - adapter changes touching dispatch paths
      - new extractor modules
      - new executor method additions

  - flag_id: solver_stability_on_novel_geometry
    severity_default: high
    origin: RETRO-V61-053 post-R3 addendum
    origin_date: "2026-04-24"
    origin_commit: "35f3278"
    description: |
      pimpleFoam / simpleFoam solver stability on a specific mesh + BC
      combination is runtime-emergent. checkMesh can report clean, Codex
      can approve fvSolution static content, and still the solver diverges
      on timestep 1 due to smoother-vs-BC interaction (e.g. GAMG+GaussSeidel
      diverged p on cylinder noSlip Neumann; PCG+DIC required as robust
      fallback).
    mitigation_pattern: |
      (a) Compare fvSolution against closest OF.org tutorial for geometry
          type (cylinder → incompressible/pimpleFoam/laminar/cylinder;
          BFS → incompressible/simpleFoam/pitzDaily).
      (b) If BC type (noSlip / freeSlip / fixedValue) or domain dims change
          vs tutorial, prefer PCG+DIC over GAMG for p-solve as robust default.
      (c) executable_smoke_test catches this immediately.
    applies_to:
      - new case geometry types
      - BC type changes
      - domain dimension changes >10% on any axis

  - flag_id: python_version_parity
    severity_default: med
    origin: RETRO-V61-053 P0 2026-04-24 R2
    origin_date: "2026-04-24"
    description: |
      Python 3.9 (CI / Codex shim default) vs 3.12 (project .venv) have
      different f-string parsers (PEP-701). Nested multi-line f-strings that
      parse under 3.12 can crash 3.9 with SyntaxError.
    mitigation_pattern: |
      MUST run `python3 -m py_compile <all changed .py>` before any Stage A
      commit. Do not rely on .venv-only syntax validation. If forced to
      write a nested conditional containing an f-string, hoist the inner
      string to a separate variable first.
    applies_to:
      - any .py change using nested f-strings
      - any code scheduled to run under Python 3.9 (Codex shim / CI matrix)

  - flag_id: mesh_density_on_domain_change
    severity_default: med
    origin: RETRO-V61-053 P1 2026-04-24 R1
    origin_date: "2026-04-24"
    description: |
      When blockMesh dimensions change by >10% on any axis (dx, dy, cell
      count), risk of "scale cells proportionally" being forgotten and
      resolution coarsening silently. V61-053 Batch B1 grew domain 3× but
      only scaled cells 2×, losing 33% wall resolution.
    mitigation_pattern: |
      Compute and COMMENT in the adapter's blockMesh block:
      dx=dy=<val>D at the cylinder/feature (numerical value). This becomes
      a reviewable assertion — stale dimensions surface immediately.
    applies_to:
      - blockMesh dimension changes
      - domain extent changes
      - mesh refinement studies

  - flag_id: numerical_noise_snr
    severity_default: med
    origin: RETRO-V61-050 2026-04-24 R1
    origin_date: "2026-04-24"
    description: |
      When extraction method has a known numerical floor (e.g.
      psi_wall_closure_residual ≈ 3e-3 for ∫U_x dy' on 129² grid) and a
      gate's gold value can be below that floor (e.g. LDC BL/BR ψ_gold
      ≈ 1e-6), extraction becomes argmax-coincidence, not validated
      physics. Live smoke-test "2/2 PASS" on a noise-floor result is a LURE.
    mitigation_pattern: |
      For every gate, compute and COMMIT: extraction_numerical_floor vs
      |gate_gold_value|. If ratio < 10×, either refuse the gate (move to
      follow-up DEC) or use a different extraction method (Poisson solve
      for ψ, native OpenFOAM FO instead of trapezoidal, etc.). UI must
      render a signal_above_noise flag.
    applies_to:
      - gates with gold values <1e-3
      - integrand-based extractors
      - indirect measurement derivations

  - flag_id: parameter_envelope_precision_ceiling
    severity_default: med
    origin: Opus 4.7 P1-arc verdict 2026-04-25 (RETRO-V61-004 addendum)
    origin_date: "2026-04-25"
    description: |
      A gate's observed deviation is not a new defect but a mechanically-
      predictable consequence of a pre-declared parameter envelope
      (endTime, mesh density, Reynolds clamp, etc.). The solver runs
      correctly; the physics output is known-degraded at the chosen
      resource budget. Triggering this flag means the deviation is a
      precision ceiling, NOT a regression — and the remediation path is
      a parameter bump + re-run, not new code.
    mitigation_pattern: |
      Pre-declaration requirement: flag MUST be set `triggered: true`
      BEFORE the run that will exhibit the deviation, not retroactively
      after seeing the FAIL. Frontmatter must carry:
        triggered_by: <which parameter is the ceiling, e.g. endTime=10s>
        expected_deviation_envelope: <quantified, e.g. St 0.13-0.14 vs 0.165>
        unblock_path: <the exact parameter bump + re-run plan>
      Retroactive application requires explicit Opus verdict (as done
      for DEC-V61-053 attempt-7 post-mortem, Opus 4.7 2026-04-25 verdict).
    applies_to:
      - runs where physics resolution is capped by compute budget
      - FFT / spectral gates with short sampling windows
      - mesh-density-limited integral quantities
      - re-run candidates awaiting parameter-only bump DEC

  # -- DEC-V61-057 Codex round-1 case-specific flags (registered Stage C) --

  - flag_id: ra_aspect_ratio_dispatch_inversion
    severity_default: high
    origin: DEC-V61-057 Codex round-1 F1-HIGH
    origin_date: "2026-04-25"
    origin_commit: "a7b1e58"  # Stage A.1 fix
    description: |
      Adapter natural-convection branch inferred aspect_ratio from a Ra
      threshold heuristic (Ra<1e9 → 2.0 RBC branch; Ra>=1e9 → 1.0 DHC
      branch) even though knowledge/whitelist.yaml carries an explicit
      parameters.aspect_ratio per case. DHC at Ra=1e6 (de Vahl Davis 1983
      benchmark, AR=1.0 square cavity) was therefore trapped on the 2:1
      RBC branch — extracted Nu cannot match gold regardless of mesh.
    mitigation_pattern: |
      Adapter dispatch must consult the whitelist parameters block first
      via _load_whitelist_parameter("aspect_ratio") with
      _normalize_task_name_to_case_id alias resolution. Fallback chain:
      (1) task_spec.boundary_conditions.aspect_ratio,
      (2) whitelist parameters.aspect_ratio (canonical case_id),
      (3) case-id-aware default (DHC=1.0, RBC=2.0).
      Bake DHC=1.0 + RBC=2.0 into tests against any future Ra change.
    applies_to:
      - natural-convection cavity adapter generators
      - whitelist-parameter dispatch fallback chains
      - any case where geometry is shared across multiple Ra regimes

  - flag_id: turbulence_emit_vs_whitelist_mismatch
    severity_default: high
    origin: DEC-V61-057 Codex round-1 F1-HIGH
    origin_date: "2026-04-25"
    origin_commit: "aae2567"  # Stage A.2 fix
    description: |
      Adapter natural-convection branch hard-wrote
      "simulationType RAS / RASModel kOmegaSST" with k/omega initial
      fields regardless of whitelist.cases[].turbulence_model. Whitelist
      sets turbulence_model=laminar for DHC at Ra=1e6 (well below
      turbulent onset at Ra≈1.5e8). Result: solver runs full RAS budget
      for a regime with no turbulence to model — adds dissipation,
      mis-tunes Nu.
    mitigation_pattern: |
      Adapter must consult task_spec.turbulence_model (mapped from
      whitelist) before emitting constant/turbulenceProperties. When
      laminar: emit "simulationType laminar" only; do NOT write k/omega
      initial fields; do NOT add RASModel block. Add unit test that
      asserts case_dir/constant/turbulenceProperties contains
      "simulationType  laminar" for whitelist-laminar cases.
    applies_to:
      - adapter generators for laminar regimes (NC cavities, low-Re flows)
      - cases where whitelist.turbulence_model differs from solver default

  - flag_id: mesh_resolution_at_ra_1e6_marginal
    severity_default: high
    origin: DEC-V61-057 Codex round-1 F1-HIGH
    origin_date: "2026-04-25"
    origin_commit: "2cc2f94"  # Stage A.3 fix
    description: |
      Adapter Ra<1e9 path emitted a uniform 80-cell mesh (no grading).
      At Ra=1e6 the thermal BL thickness δ_T/L ≈ Ra^(-1/4) ≈ 0.032;
      uniform 80 cells gives Δ=0.0125L → 2.56 cells inside the BL,
      below the 5-cell BL minimum used by V61-053 (cylinder) and
      standard NC benchmarks (Hortmann 1990).
    mitigation_pattern: |
      Activate the existing high-Ra grading branch for any DHC case
      regardless of Ra. Use 4:1 wall grading symmetric (smaller cells
      at both walls). blockMesh smoke-check must report
      min(dx, dy)_wall ≤ δ_T/L/5 (= 0.0064L at Ra=1e6); document
      numerical values in adapter comment for future audit.
    applies_to:
      - natural-convection cavities at moderate Ra (1e5 - 1e8)
      - any case where wall-BL resolution governs the headline scalar

  - flag_id: validation_artifact_lineage_drift
    severity_default: high
    origin: DEC-V61-057 Codex round-1 F2-HIGH
    origin_date: "2026-04-25"
    origin_commit: "8f7120b"  # Stage A.4 fix
    description: |
      Three-source split: (1) gold YAML observables[].ref_value;
      (2) auto_verify_report.yaml gold_standard_comparison block (could
      be stale from a prior gold revision); (3) audit fixture
      audit_real_run_measurement.yaml. Different rendering passes
      (templates/partials/gold_standard_ref.md.j2 vs
      results_comparison.md.j2) read from different stages, so a
      single rendered report.md/.html can emit inconsistent ref_values
      across its own tables.
    mitigation_pattern: |
      Require a 3-way invariant check: gold YAML ref_value ==
      auto_verify_report.gold_standard_comparison.observables[].ref_value
      == report.md/html reference cell, byte-identical. After any gold
      bump, regenerate auto_verify_report.yaml from the current schema
      and assert the invariant in CI. Do NOT hand-fix rendered output —
      always fix the source of truth.
    applies_to:
      - any gold-value bump (ref_value, tolerance, or schema_version)
      - cases with hand-authored report.html narrative (incl. DHC pre-A.6)
      - render-engine pipelines reading from cached intermediates

# ===========================================================================
# How to reference from a CaseProfile
# ===========================================================================
# .planning/case_profiles/<case_id>.yaml format:
#
#   case_id: circular_cylinder_wake
#   schema_version: 1
#   last_assessed: "2026-04-24"
#   last_assessed_by: "Claude Code (G-6)"
#   risk_flags:
#     - flag_id: executable_smoke_test    # MUST match registry flags[].flag_id
#       triggered: true
#       justification: "FoamAgentExecutor had self._db accessor bug caught only at live run"
#     - flag_id: solver_stability_on_novel_geometry
#       triggered: true
#       justification: "GAMG+GaussSeidel diverged; PCG+DIC required"
#     - flag_id: python_version_parity
#       triggered: false
#       justification: "No nested f-strings in changed .py"
#
# Unmentioned flag_ids default to triggered=false. Explicit false is for
# flags where an audit considered the flag and actively ruled it out.

# ===========================================================================
# Deprecation policy
# ===========================================================================
# Flags are never deleted. To retire a flag:
#   status: deprecated
#   deprecation_since: YYYY-MM-DD
#   successor: <other_flag_id>  # optional
#   reason: <short text>
#
# CaseProfiles referencing deprecated flags remain valid; lint warns but
# does not fail. Full removal requires separate Opus Gate sign-off.
