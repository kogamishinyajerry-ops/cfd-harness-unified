# Pre-commit hooks for cfd-harness-unified.
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Authority: ADR-001 (four-plane import enforcement, static layer).
# The hook runs the full `.importlinter` contract — not just on staged
# files — because import-linter's dependency graph is repo-global.

repos:
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter · four-plane contract (ADR-001)
        entry: lint-imports
        # `language: python` + additional_dependencies makes the hook
        # self-contained — pre-commit creates an isolated venv with
        # import-linter installed, regardless of the dev shell's PATH.
        # Previously `language: system` required `lint-imports` to be
        # globally installed, which broke `pre-commit install` on
        # fresh dev environments.
        language: python
        additional_dependencies:
          - "import-linter>=2.0"
        pass_filenames: false
        # Per Codex G-5 round 1 Low #4: avoid running on docs-only commits.
        # The contract graph is repo-global so we can't use stale staged files,
        # but we can gate by file touch set — run only when code or contract
        # config actually changes.
        files: ^(src/.*\.py|\.importlinter|pyproject\.toml|\.pre-commit-config\.yaml|\.github/workflows/ci\.yml)$

      # OPS-2026-04-25-001 dual-track isolation guard (warn-not-block).
      # Authority: .planning/ops/2026-04-25_dual_track_plan.md §3 + Notion
      # Opus 4.7 audit 2026-04-25 §3 mandatory amendment. Active through
      # dogfood window 2026-04-25 → 2026-05-19; the script auto-retires
      # after expires date (see scripts/check_track_isolation.py header).
      # Runs at commit-msg stage so the [shared]/[cross-track-ack] tag is
      # readable. Exit 0 always (warn-not-block per Opus §3 recommendation).
      - id: dual-track-isolation
        name: dual-track isolation guard (OPS-2026-04-25-001)
        # `language: python` so pre-commit creates its own python venv —
        # the script is stdlib-only so no additional_dependencies needed.
        # Also self-contained against shells where `python` is not on
        # PATH (macOS has python3, not python).
        entry: python scripts/check_track_isolation.py
        language: python
        stages: [commit-msg]
