# Pre-commit hooks for cfd-harness-unified.
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Authority: ADR-001 (four-plane import enforcement, static layer).
# The hook runs the full `.importlinter` contract — not just on staged
# files — because import-linter's dependency graph is repo-global.

repos:
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter · four-plane contract (ADR-001)
        entry: lint-imports
        # `language: python` + additional_dependencies makes the hook
        # self-contained — pre-commit creates an isolated venv with
        # import-linter installed, regardless of the dev shell's PATH.
        # Previously `language: system` required `lint-imports` to be
        # globally installed, which broke `pre-commit install` on
        # fresh dev environments.
        language: python
        # Pin to project Python (per pyproject.toml requires-python =
        # ">=3.12"). Per Codex audit on 0208929 (R1 LOW): without this
        # the hook env follows whatever interpreter launched pre-commit,
        # which can drift from the project runtime (verified locally
        # the hook passes from a Python 3.9 pre-commit env, but that
        # is fragile against future syntax-version regressions).
        language_version: python3.12
        additional_dependencies:
          - "import-linter>=2.0"
        pass_filenames: false
        # Per Codex G-5 round 1 Low #4: avoid running on docs-only commits.
        # The contract graph is repo-global so we can't use stale staged files,
        # but we can gate by file touch set — run only when code or contract
        # config actually changes.
        files: ^(src/.*\.py|\.importlinter|pyproject\.toml|\.pre-commit-config\.yaml|\.github/workflows/ci\.yml)$

      # OPS-2026-04-25-001 dual-track isolation guard · two-stage v2.
      # Authority: .planning/ops/2026-04-25_dual_track_plan.md §3 v2 +
      # Notion Opus 4.7 audit 2026-04-25T15:10 (block id
      # 29c8696d-84e9-4484-94db-1391f43d0df4) — supersedes the v1 single
      # warn-not-block hook with a graduated severity model:
      #
      #   - pre-commit stage (CORE line A SOLE ∧ line B → BLOCK,
      #     env-escape via CROSS_TRACK_ACK=1)
      #   - commit-msg stage (SHARED line A ∧ line B → BLOCK,
      #     tag-escape via [cross-track-ack: ...] / [shared] / [deps] / [ops])
      #
      # Active through dogfood window 2026-04-25 → 2026-05-19; both
      # scripts auto-retire after expires date (see header docstrings).
      # `language: python` so pre-commit creates an isolated venv — both
      # scripts are stdlib-only so no additional_dependencies needed.
      # Self-contained against shells where `python` is not on PATH
      # (macOS has python3, not python).
      - id: dual-track-isolation-precommit
        name: dual-track isolation guard · pre-commit (OPS-2026-04-25-001 §3 v2)
        entry: python scripts/check_track_isolation.py
        language: python
        language_version: python3.12
        stages: [pre-commit]
        pass_filenames: false
        always_run: true

      - id: dual-track-isolation-msg
        name: dual-track isolation guard · commit-msg (OPS-2026-04-25-001 §3 v2)
        entry: python scripts/check_track_isolation_msg.py
        language: python
        language_version: python3.12
        stages: [commit-msg]

      # Opus 4.7 review 2026-04-25 governance amendment: the workbench
      # rollout shipped 19 commits with 0 Codex-review calls. RETRO-V61-001
      # had Codex-per-risky-PR as a baseline rule, but "risky" is judgment-
      # dependent. This pre-push hook adds a cadence floor — block push
      # at 10 commits without a canonical 'Codex-verified:' trailer.
      # Override: CODEX_CADENCE_OVERRIDE=1 git push (audited via env).
      # Install: pre-commit install --hook-type pre-push
      - id: codex-cadence
        name: Codex-verified cadence floor (Opus 4.7 review 2026-04-25)
        entry: python scripts/check_codex_cadence.py
        language: python
        language_version: python3.12
        stages: [pre-push]
        pass_filenames: false
        always_run: true
