# Pre-commit hooks for cfd-harness-unified.
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Authority: ADR-001 (four-plane import enforcement, static layer).
# The hook runs the full `.importlinter` contract — not just on staged
# files — because import-linter's dependency graph is repo-global.

repos:
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter · four-plane contract (ADR-001)
        entry: lint-imports
        language: system
        pass_filenames: false
        # Per Codex G-5 round 1 Low #4: avoid running on docs-only commits.
        # The contract graph is repo-global so we can't use stale staged files,
        # but we can gate by file touch set — run only when code or contract
        # config actually changes.
        files: ^(src/.*\.py|\.importlinter|pyproject\.toml|\.pre-commit-config\.yaml|\.github/workflows/ci\.yml)$
