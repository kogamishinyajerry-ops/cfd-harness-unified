scope_interpretation_note:
  verdict_c6_says: "src/foam_agent_adapter.py::_generate_differential_heated_cavity"
  actual_function_name: "_generate_natural_convection_cavity"
  justification: |
    There is no `_generate_differential_heated_cavity` function; DHC (Ra>=1e9)
    and rayleigh_benard (Ra=1e6) share the single generator
    `_generate_natural_convection_cavity`. To honor the spirit of C6 while
    leaving the shared Ra=1e6 behavior untouched, the change is guarded by
    `if Ra >= 1e9:` — exclusively targeting the DHC regime the verdict
    authorizes. rayleigh_benard keeps the original 80-uniform mesh with
    grading=1 (bit-identical behavior).

c5_a_priori_nu_prediction:
  predicted_nu_center: 16.1
  predicted_nu_uncertainty: 5.0
  predicted_nu_band: "[11, 21]"
  c5_threshold: 15
  stop_and_regate_if_predicted_below: 15
  clears_c5_threshold: true
  method: |
    Natural convection thermal boundary layer scaling:
      δ_T ≈ L · Ra^(-1/4)
    At Ra=1e10, L=1m → δ_T ≈ 3.162 mm = 0.00316 L.
    Empirical Nu (Dhir 2001 / Paolucci 1989 for Ra=1e10, square cavity) ≈ 30.
    With cells_in_BL ≈ 2, turbulent NC cavity resolution produces ~50-60% of
    Nu_ref on modest grids — predicted Nu ≈ 0.5-0.7 × 30 = 15-21.
    Centre: 16.1 | Uncertainty: ±5 (spanning 11-21).
  grading_derivation: |
    simpleGrading format: ((len_frac cell_frac expansion) (len_frac cell_frac expansion))
    Symmetric wall-packed: ((0.5 0.5 0.1667) (0.5 0.5 6))
      - First half of length (near hot wall): expansion=1/6 → cells concentrate at start
      - Second half of length (near cold wall): expansion=6 → cells concentrate at end
    With nL=256 cells, first-cell size ≈ 0.0013L ≈ 1.3 mm.
    cells_in_BL(Ra=1e10) ≈ 3.16 mm / 1.3 mm ≈ 2.4.
  predicted_vs_baseline:
    baseline_nu_at_80_uniform: 5.85   # measured — EX-1-005 run
    baseline_cells_in_bl: 0.25
    baseline_bl_capture: "none — first cell larger than δ_T"
    target_cells_in_bl: 2-3
    target_bl_capture: "adequate"

