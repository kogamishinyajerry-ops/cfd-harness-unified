# ============================================================================
# POST-COMMIT MEASUREMENT ADDENDUM (2026-04-18)
# ============================================================================
# Appended after B1 fix-up commit 342beb0 (grading direction corrected)
# and cascade of 3 pre-existing bug fixes exposed by the 256² wall-packed mesh.
# ============================================================================

post_commit_measurement:
  status: COMPLETED
  run_type: foam_agent Docker buoyantFoam Ra=1e10
  attempts: 4   # 3 exposed pre-existing bugs; 4th ran to completion
  final_attempt:
    wall_clock_seconds: 1243.8      # 20.7 min (target <30 min, headroom met)
    end_time_openfoam: 10           # ~12τ (characteristic time 0.84s)
    solver_time_steps: 20
    started_at_utc: '2026-04-18T11:50:39Z'
    ended_at_utc:   '2026-04-18T12:11:22Z'
  observed_nu: 66.25
  gold_reference_nu: 30.0           # Dhir 2001 / Paolucci 1989 (square cavity, Ra=1e10)
  baseline_80_uniform_nu: 5.85       # EX-1-005 reading, for context
  c5_band_check:
    predicted_band: [11.0, 21.0]
    predicted_centre: 16.1
    verdict: ABOVE_BAND
    numerical_verdict_vs_c5_threshold: PASS   # 66.25 ≫ 15 → C5 "stop if predicted <15" threshold cleared
    relative_error_vs_gold: 1.208              # 120.8% over gold
  attribution_report:
    primary_cause: parameter_plumbing_mismatch
    confidence: 0.7
    chain_complete: true
    audit_concern: null               # DHC YAML contract_status=DEVIATION; producer→consumer only tags PASS paths
  honest_interpretation: |
    The numeric result (Nu=66.25) is NOT a physics overshoot of the true mean Nu.
    It is a **methodology mismatch** between the extractor and the gold reference:
      * Extractor (_extract_nc_nusselt @ foam_agent_adapter.py:6656-6712):
          computes LOCAL Nu at y=L/2 from first-two-cells ∂T/∂x gradient.
      * Gold reference (knowledge/gold_standards/differential_heated_cavity.yaml):
          Nu=30 is the MEAN Nu integrated over the hot wall height.
    The 80-uniform mesh (first-cell 12.5mm >> δ_T=3.16mm) had Nu=5.85 because it
    couldn't resolve the BL gradient; the extractor's methodology bug was masked
    by the mesh's inability to capture physics.

    The B1 wall-packed mesh (first-cell 1.40mm < δ_T=3.16mm) now resolves the
    viscous sublayer faithfully → the extractor returns a mathematically honest
    local Nu, which for NC at Ra=1e10 is ≈2-3× the wall-averaged mean near mid-height
    (enhanced buoyancy-driven boundary-layer gradient at the midplane).

    This is the EXACT COMPATIBLE_WITH_SILENT_PASS_HAZARD pattern that EX-1-006's
    producer→consumer audit_concern channel was built to surface: the coarse
    baseline mesh had been passing tolerance-scaled comparisons by coincidence,
    not by resolving the physics. A better mesh unmasked the extractor bug.

pre_existing_bugs_uncovered:
  cascade_of_three:
    - bug_id: DUPLICATE_WRITEINTERVAL
      location: src/foam_agent_adapter.py::_generate_natural_convection_cavity controlDict heredoc
      prior_symptom: "at endTime=500 the duplicated-and-overwritten writeInterval (100 then 200) coincidentally fired at t=200,400 so field output existed"
      b1_exposure: "at endTime=10 no write ever fired → postProcess -latestTime returned empty → 'nusselt_number not found'"
      fix: collapsed duplicate writeInterval and parameterized to min(endTime, 200)
    - bug_id: EXTRACTOR_Y_TOL_MIN
      location: src/foam_agent_adapter.py::_extract_nc_nusselt y_tol computation (L6679)
      prior_symptom: "uniform meshes min==max so min(dy) worked by construction"
      b1_exposure: "wall-packed mesh min adjacent dy (1.4mm at walls) << max adjacent dy (~8mm at midline); y_tol=0.84mm too tight to capture midline cells → x_groups empty → UnboundLocalError on x_t_pairs"
      fix: "min→max for dy_cell, plus midPlaneT assignment guarded inside if len(x_groups)>=2"
    - bug_id: EXTRACTOR_METHODOLOGY_LOCAL_VS_MEAN
      location: src/foam_agent_adapter.py::_extract_nc_nusselt (overall approach)
      prior_symptom: "coarse mesh produced under-resolved gradient that happened to read as Nu=5.85, numerically close-enough to gold=30 within 80% absolute deviation that tolerance framing accepted it as a DEVIATION"
      b1_exposure: "resolved gradient reads Nu=66.25 — 120% over gold; numerically ABOVE_BAND"
      fix_scope: DEFERRED   # requires full hot-wall surface integration rewrite; proposed as EX-1-008
      interpretation: "This is the silent-pass hazard made loud. Not fixed in B1 to honor C6 scope discipline."

honest_grade:
  c5_band_check: ABOVE_BAND
  c5_threshold_check: PASS (66.25 ≫ 15, no re-Gate required by verdict text)
  physics_landing_grade: "methodology-FAIL (extractor ≠ gold-definition) but mesh-PASS (BL resolved)"
  recommendation: |
    Record B1 as a successful mesh refinement that exposed a pre-existing
    extractor/gold-definition mismatch. Do NOT attempt to tune grading or nL to
    bring the LOCAL Nu reading back into [11,21] — that would re-mask the
    methodology bug. The correct follow-up is an extractor refactor
    (candidate EX-1-008), after which the same 256-wall-packed mesh should
    produce MEAN Nu near the gold 30.

d4_plus_rule_candidate_6:
  name: mesh_refinement_wall_packing_smoke_check
  severity: MANDATORY
  trigger: "simpleGrading changes from uniform (grading=1) on a wall-bounded BL observable (Nu, Cf, wall heat flux, y+)"
  requirement: "run blockMesh + checkMesh smoke-check and inspect min-volume location relative to walls BEFORE launching the solver"
  rationale: |
    blockMesh's multi-section simpleGrading syntax is direction-sensitive but
    silently accepts both orderings. Only cell-location (min-volume near wall
    vs near midline) distinguishes them — invisible to checkMesh's aspect-ratio
    report. Cost: ~5 seconds vs 30-120 minutes of wasted solver time (as EX-1-007
    would have burned absent the smoke-check).
  first_triggered_by: EX-1-007 B1 (caught grading inversion on commit 54b57ab before solver launched)
