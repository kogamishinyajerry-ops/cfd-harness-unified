learnings:
  - "turbulent_flat_plate's Cf>0.01 Spalding fallback is a genuine silent-pass hazard that the physics_contract schema surfaced — it was hiding in the note field until this slice's evidence enumeration forced a code read. This is the annotation pattern's main long-term value: it converts tacit knowledge in free-text notes into auditable structured claims."
  - "Mid-slice evidence_ref correction (LDC sampling mechanism) is a new audit category. Caught before commit, it is quality control. Caught after commit, it would be a correction_spec. The physics_validity_precheck §preconditions_enumerated §evidence_refs structure is what surfaces these earlier."
  - "Rolling override_rate after n=4 is 0.25 — below all thresholds. The methodology gate triggered by EX-1-002 has done its job: it cost one pivot and produced a schema that now absorbs similar issues without pivoting (turbulent_flat_plate fallback surfaced cleanly as contract_status, not a mid-slice abort)."

