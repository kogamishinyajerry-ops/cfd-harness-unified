design_notes:
  setattr_vs_dataclass_field:
    observation: |
      Verdict has a direct tension: C1 requires audit_concern as 'Optional 新字段形式挂载',
      but next_slice_scope_guardrails denies src/models.py (where AttributionReport lives).
    resolution: |
      Use setattr(report, 'audit_concern', ...) on the returned instance.
      Dataclass is not frozen, so attribute assignment is legal.
      Respects BOTH: models.py unchanged, attr readable as report.audit_concern.
    trade-off: |
      dataclasses.asdict() does not serialize audit_concern (only declared fields).
      Downstream consumers that want YAML/JSON persistence need explicit serialization.
      Promote to first-class AttributionReport field when D5 unfreezes models.py editing.
  circular_cylinder_wake_data_quality_gap:
    observation: |
      circular_cylinder_wake.yaml (COMPATIBLE_WITH_SILENT_PASS_HAZARD) encodes
      physics_contract as structured YAML **comments** on the first of 4 documents,
      not as a structured top-level field. yaml.safe_load therefore cannot read it;
      _resolve_audit_concern returns None for this case even though the verdict
      would be audit-worthy on a clean PASS.
    implication: |
      1/10 whitelist cases (circular_cylinder_wake) is silently skipped by the
      producer→consumer channel. This is a data-format gap introduced in EX-1-005
      (multi-doc YAML preservation constraint), NOT a bug in this slice.
    recommendation: |
      Future EX-1 slice (R-A-metadata-restructure) can convert cylinder_wake's
      comment-form physics_contract to a structured field. Outside current scope.
  test_file_vs_directory:
    observation: |
      Verdict allows 'tests/test_error_attributor/**' as a path pattern, suggesting
      a directory. The pre-existing file is tests/test_error_attributor.py (flat).
    resolution: |
      Appended TestAuditConcern class to the existing file. pytest cannot collect
      both a file and directory at tests/test_error_attributor — a file-vs-dir
      split would be architecturally impossible without moving the existing file.
      No existing test assertions modified (C1 preserved).

