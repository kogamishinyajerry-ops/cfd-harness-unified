learnings:
  - "Second silent-pass hazard surfaced in EX-1-005 (circular_cylinder_wake Strouhal hardcode) via the same mechanism as turbulent_flat_plate in EX-1-004 — forced extractor-code read during physics_validity_precheck evidence enumeration. n=2 similar discoveries confirms this is a repeatable mechanism, not a one-off."
  - "3/10 whitelist cases carry PASS verdicts that are NOT fully physics-backed (turbulent_flat_plate silent-pass, circular_cylinder_wake Strouhal shortcut, axisymmetric_impinging_jet observable-name swap). This is a serious audit finding that was invisible in the Phase 7 PASS-count metric. Future reports should report both a verdict-PASS count AND a contract-status-weighted count."
  - "Mini-review is cheap and valuable at n=5. The rank-by-rank memo §4 audit took minutes and confirmed the annotation still gates behaviour correctly. Recommend keeping the n=5 cadence as a standing non-freezing checkpoint, not a one-time event."
  - "contract_status vocabulary is at 6 values after 10 cases — sub-linear growth suggests the space is saturating. Still recommend deferring enum-ification until a downstream consumer lands (mini-review §3.2)."

