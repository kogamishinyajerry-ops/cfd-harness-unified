slice_title: "R-A-metadata: extend 3 imperfect-verdict gold_standard YAMLs with physics_contract annotation"

# ---------------------------------------------------------------
# What this slice does (and does NOT do)
# ---------------------------------------------------------------
scope_summary: >-
  Adds a top-level `physics_contract` block to 3 gold_standard YAMLs for the
  whitelist cases with imperfect Phase 7 Wave 2-3 verdicts:
    - fully_developed_turbulent_pipe_flow (FAIL, rank 3 R-A target)
    - fully_developed_plane_channel_flow (FAIL, rank 4 R-C target — documented as NOT satisfiable)
    - differential_heated_cavity (PASS_WITH_DEVIATIONS, rank 2 R-E target)
  Each `physics_contract` enumerates geometry_assumption,
  reference_correlation_context, and a list of physics_precondition entries
  with `satisfied_by_current_adapter`, evidence_ref, and consequence_if_unsatisfied.
  Tolerance values and reference observable values are UNCHANGED. No code
  (src/) modified. No whitelist.yaml modified.

explicit_non_scope:
  - "No tolerance change (gold ref_value / tolerance fields untouched)"
  - "No whitelist.yaml relabel (R-A-relabel is a different, higher-scope slice)"
  - "No solver config / adapter mesh constant change"
  - "No comparator or attribution logic change"
  - "No test additions (loader uses .get() with defaults, no behavior change to assert)"

