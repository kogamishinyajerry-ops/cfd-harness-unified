    - "Annotation content must be derivable from existing evidence (memo, STATE.md, whitelist.yaml, known physics) without introducing new unverified claims"
  all_satisfied: true
  evidence_refs:
    - "src/auto_verifier/gold_standard_comparator.py:16 — observables = gold_standard.get('observables', []); reads only 'observables' key"
    - "src/result_comparator.py:33-84 — reads only 'quantity', 'reference_values', 'tolerance', 'id'; no collision with 'physics_contract'"
    - "src/auto_verifier/verifier.py:106,164,203 — all use yaml.safe_load; PyYAML tolerates unknown top-level keys by default"
    - "Full test suite (245/245) passes post-edit, confirming no runtime regression"
