# ---------------------------------------------------------------
# Learnings
# ---------------------------------------------------------------
learnings:
  - "physics_contract as top-level YAML extension is a cheap, high-leverage way to encode tacit gold-standard assumptions. Future error_attributor patterns could read contract_status to auto-classify INCOMPATIBLE vs DEVIATION without re-deriving physics judgment."
  - "The D4+ physics_validity_precheck schema is useful even for non-physics slices (e.g. documentation): the precheck enumerates 'what could silently make this slice wrong' and forces an evidence link for each."
  - "Bundling C1 + C2 + EX-1-003 in one commit (per D4+ verdict C1 blocking rule) prevents a race where a future EX-1 slice could land without the schema in place."

