    diminishing_returns: |
      V61-058→iter1: 2.7× cells → 23 pp Cl@8° gain
      iter1→iter2:   2.2× cells → 5  pp Cl@8° gain
      Linear extrapolation to gate-clear Cl=0.775: ~400k cells with
      same H-grid topology, runtime 60+ min/α (well past §4 budget).
    structural_limitation: |
      H-grid topology has corner singularities at LE/TE that wall
      functions cannot fully resolve. To clear HEADLINE 5% gate
      requires either:
        (a) C-grid topology around the airfoil — block topology
            refactor in `_generate_airfoil_flow`, ~2 weeks of work
        (b) LowRe wall treatment (y+<1) — needs first cell ~5e-6 m,
            which with current 6-block topology would create extreme
            aspect ratios; needs BL block split (architectural change)
        (c) Both (a) and (b) combined — typical industry approach
            for accurate NACA0012 at Re=3e6
  status_at_close: topology_ceiling_documented
  recommended_followup: |
    DEC V61-062 (or later): C-grid + LowRe NACA0012 mesh.
    Inherits V61-058 + V61-061 stack: gold YAML, extractors, Stage E
    driver, sanity/smoke assertions, audit fixture format. Only
    `_generate_airfoil_flow` block topology changes.

