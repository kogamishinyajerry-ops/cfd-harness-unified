# RETRO-V61-053 post-R3 defect addendum (recorded Stage E, 2026-04-25):
defect_addendum:
  category: solver_stability_on_novel_geometry  # RETRO-V61-053 risk_flag
  classification: numerical_under_resolution_NOT_methodology_bug
  evidence:
    methodology_layer_correct:
      - sanity_cl_at_alpha_zero PASS (|Cl| < 0.005)
      - sign_convention_alpha_eight PASS (Cl@α=8° > 0)
      - α-routing produces correct U_inf_vec & lift/drag dirs (B1.1 commit 5bbda96)
      - forceCoeffs/yPlus FOs register at startup (post-fix 2fe31eb)
      - extractor surfaces Cl/Cd/y+ correctly into key_quantities (B2 + Stage C)
      - solver converges with all residuals < 1e-6 in 17–31s wall clock
      - 4 of 5 risk_flags resolved; only `solver_stability_on_novel_geometry` open
    physics_under_prediction:
      Cl_alpha_eight: {value: 0.491, gold: 0.815, rel_under: 0.398}
      Cd_alpha_zero: {value: 0.020, gold: 0.008, rel_over: 1.512}
      slope_dCl_dalpha: {value: 0.061, gold: 0.105, rel_under: 0.416}
    mesh_resolution_diagnostics:
      cell_count: 16000
      airfoil_surface_faces: 120
      y_plus_max: 138.96  # in PASS band [11,500] but high in log-layer
      max_aspect_ratio: 108.35
      max_non_orthogonality_deg: 68.95
      domain_extent_chord: ±5  # likely too small; literature uses ±20
    root_cause_analysis: |
      All three failing gates point to the same physical origin:
      under-resolved boundary layer + wake. With 120 airfoil surface
      faces and y+_max ≈ 139 (high-end of log-law validity), kOmegaSST
      with wall functions systematically under-predicts the
      pressure-side suction peak and over-predicts skin friction.
      Recommended remediation (out-of-scope for V61-058): airfoil
      surface points 120→300, near-wall layer for y+~30, domain
      extent ±5→±20 chord. Estimated runtime impact: 17s → ~5min
      per α at structured-grid kOmegaSST.
  status_at_close: known_limitation_documented
  recommended_followup: |
    Open a follow-up DEC for high-resolution NACA0012 mesh profile
    (proposed: V61-061, scope = mesh refinement only, reuses Stage A
    gold YAML + Stage B extractors + Stage E driver verbatim).
  why_not_fix_in_this_arc: |
    Mesh refinement requires adapter-level changes to
    `_generate_airfoil_flow` mesh generation (not just controlDict),
    plus per-α 5-min runtime that would push past intake §4
    executable_smoke_test budget. The methodology-quality assertions
    (SANITY + sign_convention) PASS; the physics-fidelity gates FAIL
    honestly. Per RETRO-V61-053, this is a documented post-R3
    defect — addendum, not arc retry.

