  - batch: B
    scope: |
      Multi-dim extractors. (B1) Nu_max: extremum over existing wall_gradient
      output. (B2) u_max + v_max: sampleSet + nondim conversion. (B3) psi_max:
      trapezoidal ∫U_x dy reconstruction; report SNR vs gold; demote to
      advisory if SNR<10×. Each extractor: own commit + unit test.
    commit_count_estimate: 4
    atomicity_guard: "B1, B2 (combined), B3, plus B-final integration"
  - batch: C
    scope: |
      Preflight gate wiring + comparator integration. Gold YAML schema_v2
