# ============================================================================
# §1 Classification (F5-M1 hard gate, §3b — NO mid-arc Type change allowed)
# ============================================================================
case_type: I
case_type_rationale: |
  Five scalar gates planned at Ra=1e6, Pr=0.71, AR=1, drawn from de Vahl
  Davis 1983 Tables I, II, III. Across these 5 gates, AT LEAST THREE
  PHYSICALLY-INDEPENDENT FAMILIES exist (Type I requires ≥3 independent
  families):

  Family 1 · WALL-GRADIENT-DERIVED (Nu_avg + Nu_max share extraction surface):
    1. Nu_avg (hot wall)        — HEADLINE GATE — wall-averaged Nusselt, 8.800
                                  (Table III, primary benchmark scalar)
    2. Nu_max (hot wall)        — peak local Nu along hot wall, 17.925 at y/L=0.0378
                                  (Table III). Same field as Nu_avg, different
                                  reduction (max vs mean); SAME-SURFACE
                                  CROSS-CHECK, not a separate physical family.

  Family 2 · INTERIOR-VELOCITY-PROFILE (sampleSet on mid-planes; INDEPENDENT
  surface from wall gradient):
    3. u_max @ x=0.5L vert plane — peak |u(y)| along vertical mid-plane,
                                   nondim u·L/α = 64.63 (Table II).
    4. v_max @ y=0.5L horiz plane — peak |v(x)| along horizontal mid-plane,
                                   nondim v·L/α = 219.36 (Table II).
                                   (u_max and v_max are different sampleSet
                                   probes on different planes; independent.)

  Family 3 · STREAM-FUNCTION-DERIVED (post-process reconstruction; INDEPENDENT
  extraction path, but SEE §3 NOTE: status PROVISIONAL until B3 closure
  residual validates SNR per RETRO-V61-050):
    5. psi_max @ cavity center  — peak stream function, nondim
                                  psi_max·1/α = 16.750 (Table I).

  Independence count: 3 families guaranteed (wall-gradient, interior-profile,
  stream-function); 5 scalar gates planned. Type I requirement (≥3
  independent families) satisfied even if Nu_max collapses into Nu_avg
  cross-check OR ψ demoted to advisory in B3.

  HEADLINE = Nu_avg (load-bearing benchmark scalar; >40 subsequent studies
  cite within ±0.2%). Other 4 are CROSS_CHECK / INDEPENDENT_CROSS_CHECK
  with Nu_max specifically labeled SAME-SURFACE_CROSS_CHECK.

primary_gate_count: 5
case_type_hard_gate_signed: true
headline_gate: nusselt_number  # quantity_id matches gold YAML observables[].name

# ============================================================================
# §2 Reference papers
# ============================================================================
reference_paper:
  primary:
    citation: "de Vahl Davis, G. (1983). Natural convection of air in a square cavity: A bench mark numerical solution. International Journal for Numerical Methods in Fluids, 3(3), 249-264."
    doi: "10.1002/fld.1650030305"
    providing: [Nu_avg, Nu_max, u_max_centerline_v, v_max_centerline_h, psi_max]
  secondary:
    - citation: "Le Quéré, P. (1991). Accurate solutions to the square thermally driven cavity at high Rayleigh number. Computers & Fluids 20, 29-41."
      doi: "10.1016/0045-7930(91)90025-D"
      providing: [cross_check_high_ra_extension, spectral_solution_baseline]
    - citation: "Hortmann, M., Perić, M., & Scheuerer, G. (1990). Finite volume multigrid prediction of laminar natural convection: Bench-mark solutions. Int. J. Numer. Methods Fluids 11, 189-207."
      doi: "10.1002/fld.1650110206"
      providing: [cross_check_grid_convergence_pattern]

# ============================================================================
# §3 Observable scope (hardens against breadth drift / scope creep)
# ============================================================================
# v2 NOTE on registry strictness: §4 risk_flags list 4 case-specific entries
# that are NOT yet present in knowledge/schemas/risk_flag_registry.yaml.
# Per template strictness model, registered flags only apply to the MANDATORY
# v2.0+ slots. Case-specific flags are documented inline here pending
# eventual promotion (deferred until at least 3 cases hit the same flag, to
# avoid premature canonicalization). This deferral is consistent with
# DEC-V61-053's similar slot use (intake_version=2 retained
# `domain_blockage_mismatch` etc. case-locally).
observable_scope:
  in_scope:
    - quantity: nusselt_number  # Nu_avg, hot wall
      tolerance_pct: 5.0  # tightening from current 10.0 — de Vahl Davis Nu=8.800 is well-established; >40 studies within ±0.2%
      extraction_method: |
        Wall-averaged hot-wall Nu via src.wall_gradient.extract_wall_gradient.
        Currently emits via key_quantities. Surface as measurement.value.
      status_pre_DEC: EXTRACTOR_EXISTS
      role: HEADLINE_GATE
      gold_value: 8.800
      gold_source: "de Vahl Davis 1983 Table III, integrated over hot wall"
      gate_status_target: HARD_GATED  # Batch C wires this as comparator-required

    - quantity: nusselt_max
      tolerance_pct: 7.0  # peak is more BL-resolution sensitive than mean
      extraction_method: |
        Peak local Nu along hot wall. Same wall-gradient field as Nu_avg
        but max() rather than mean(). New extractor needed
        (src.dhc_extractors.extract_nusselt_max or equivalent).
      status_pre_DEC: NOT_IMPLEMENTED
      role: SAME_SURFACE_CROSS_CHECK  # F4-MED edit: was INDEPENDENT_CROSS_CHECK; demoted because shares wall-gradient field with Nu_avg
      gold_value: 17.925
      gold_source: "de Vahl Davis 1983 Table III, peak local"
      gate_status_target: HARD_GATED  # extractor is straightforward; Codex-approved-with-comments-clean is feasible

    - quantity: u_max_vertical_midplane
      tolerance_pct: 5.0
      extraction_method: |
        sampleSet line at x=0.5L, y∈[0,L]; extract |u(y)|, take max.
        Nondimensionalize: u_nondim = u_raw · L / α, where α = ν/Pr =
        1.408e-5 m²/s for current adapter (ν=1e-5 m²/s, Pr=0.71).
        New sampleDict line + extractor.
      status_pre_DEC: NOT_IMPLEMENTED
      role: INDEPENDENT_CROSS_CHECK
      gold_value: 64.63  # nondim u·L/α
      gold_source: "de Vahl Davis 1983 Table II, max u along vertical mid-plane"
      gate_status_target: HARD_GATED

    - quantity: v_max_horizontal_midplane
      tolerance_pct: 5.0
      extraction_method: |
        sampleSet line at y=0.5L, x∈[0,L]; extract |v(x)|, take max.
        Nondimensionalize: v_nondim = v_raw · L / α (same α as above).
        New sampleDict line + extractor.
      status_pre_DEC: NOT_IMPLEMENTED
      role: INDEPENDENT_CROSS_CHECK
      gold_value: 219.36  # nondim v·L/α
      gold_source: "de Vahl Davis 1983 Table II, max v along horizontal mid-plane"
      gate_status_target: HARD_GATED

    - quantity: stream_function_max
      tolerance_pct: 8.0  # provisional; widened to absorb reconstruction noise
      extraction_method: |
        F3-HIGH edit (v1→v2): scaling convention NOW EXPLICIT.
        Raw reconstruction: psi_raw(x,y) = ∫₀ʸ u(x, y') dy' (units: m²/s),
        propagated via 2D incompressibility (ψ defined s.t. u=∂ψ/∂y,
        v=-∂ψ/∂x). Reference column for ψ=0 is x=0 wall (no-slip implies
        ψ=const there; pin to 0).
        Nondim: psi_nondim = psi_raw / α (since gold psi_max=16.750 is
        likewise nondim with α — see de Vahl Davis 1983 Table I caption).
        Take psi_max = max(|psi_nondim|) over interior (max usually at
        cavity geometric center).
        Implementation choice: Batch B3 prototypes TRAPEZOIDAL ∫. If
        closure residual at top wall (ψ should also = 0) exceeds 1e-2 of
        psi_max, demote to advisory OR switch to Poisson solve
        ∇²ψ = -ω_z (separate sub-batch).
      status_pre_DEC: NOT_IMPLEMENTED
      role: INDEPENDENT_CROSS_CHECK
      gold_value: 16.750  # nondim psi/α
      gold_source: "de Vahl Davis 1983 Table I, max ψ at cavity center"
      gate_status_target: PROVISIONAL_ADVISORY  # F3-HIGH edit: NOT mandatory until B3 SNR + closure residual validate; Batch C wires as advisory only

  explicitly_out_of_scope:
    - item: "Ra-sweep across {1e3, 1e4, 1e5, 1e6}"
      reason: "DEC-V61-057 targets the Ra=1e6 benchmark only. Ra-sweep was the previous (closed) scope of EX-1-007 + DEC-ADWM-004; reopening dilutes focus."
    - item: "Aspect-ratio sensitivity beyond AR=1"
      reason: "De Vahl Davis 1983 is AR=1 only. Tall (AR=4, 8) cavity benchmarks (Bejan & Tien 1978) are different physics regime."
    - item: "Turbulence model comparison (k-ε vs k-ω SST)"
      reason: "Ra=1e6 is well within laminar regime (turbulent onset ~Ra=1.5e8 per Tilton 2001). Turbulence is NOT in physics, do not configure it."
    - item: "Time-dependent oscillatory regime"
      reason: "Steady solution exists at Ra=1e6; oscillatory onset at ~Ra=1.5e8. Solver is steady SIMPLE; do not enable transient."
    - item: "GCI / Richardson grid-convergence study"
      reason: "Grid-convergence is its own follow-up DEC. Single-grid-with-grading 80-cell (or higher per Batch A mesh upgrade) baseline is the V61-057 deliverable; mesh-pyramid (40/80/160/320) belongs in a separate DEC-V61-XXX_dhc_grid_convergence."

# ============================================================================
# §4 Risk flags (F1-M1 requires ≥1 subjective risk annotation)
# ============================================================================
risk_flags:
  # --- case-specific (registry strictness deferred per §3 NOTE) ---

  - flag: ra_aspect_ratio_dispatch_inversion
    severity: high
    codex_flagged: true  # F1-HIGH cited explicitly
    description: |
      src/foam_agent_adapter.py:2070-2073 currently sets aspect_ratio=2.0
      when Ra<1e9 (i.e. Ra=1e6 path). This is the rayleigh_benard / NC
      Cavity branch. DHC at Ra=1e6 needs aspect_ratio=1.0 (square cavity
      per de Vahl Davis 1983). The whitelist (knowledge/whitelist.yaml:
      155-175) DOES specify parameters.aspect_ratio=1.0 for DHC, but the
      adapter dispatch only inspects task_spec.boundary_conditions —
      whitelist parameters never reach that branch.
      Result: extracted Nu won't match de Vahl Davis irrespective of mesh.
      tests/test_foam_agent_adapter.py:1427-1429 currently encodes
      Ra=1e6 → AR=2.0, locking the wrong default into the test suite.
    mitigation_in_batch: |
      Batch A (2 commits): (a) add adapter dispatch path that consults
      task_spec.parameters.aspect_ratio (or equivalent whitelist channel)
      AND boundary_conditions; default fallback inverted: case_id=='differential_heated_cavity'
      → AR=1.0; case_id=='rayleigh_benard_convection' → AR=2.0. (b) Fix
      tests/test_foam_agent_adapter.py:1428 to use AR=1.0 + add a new
      test asserting DHC dispatches AR=1.0 even when boundary_conditions
      is None (whitelist defaults reach adapter).

  - flag: turbulence_emit_vs_whitelist_mismatch
    severity: high
    codex_flagged: true  # F1-HIGH cited (RAS/kOmegaSST hard-write)
    description: |
      Whitelist sets turbulence_model=laminar for DHC (knowledge/whitelist.yaml:
      167). Adapter natural-convection path emits "simulationType RAS"
      with "RASModel kOmegaSST" + turbulence on (src/foam_agent_adapter.py
      around L2320-2330) regardless of whitelist setting. Result: solver
      runs full RAS budget (k, omega, turbulent fields) for a regime
      where there is no turbulence to model, adding dissipation and
      mis-tuning Nu.
    mitigation_in_batch: |
      Batch A: adapter natural-convection path consults
      task_spec.turbulence_model (mapped from whitelist). When laminar:
      emit simulationType=laminar; do NOT write k/omega initial fields,
      do NOT add kOmegaSST RASModel block. Add unit test asserting that
      DHC case_dir contains 'simulationType  laminar' in
      constant/turbulenceProperties.

  - flag: mesh_resolution_at_ra_1e6_marginal
    severity: high
    codex_flagged: true  # F1-HIGH cited (80² uniform → 2.56 BL cells)
    description: |
      Adapter Ra<1e9 path emits uniform 80-cell mesh (no grading). At
      Ra=1e6, BL thickness δ_T/L ≈ Ra^(-1/4) ≈ 0.032. Uniform 80 cells
      → Δ=0.0125L → 2.56 cells in BL. Below the 5-cell BL minimum used
      by V61-053 (cylinder) and standard NC benchmarks (Hortmann 1990).
      Codex-prescribed fix in F1: graded 80² + 4:1 wall grading, OR
      higher nL (160-cell uniform).
    mitigation_in_batch: |
      Batch A: extend the existing Ra>=1e9 grading branch (lines 2087-2090)
      to also activate for case_id=='differential_heated_cavity' at Ra=1e6.
      Use 4:1 wall grading symmetric (smaller cells at both walls).
      blockMesh smoke-check: report min cell size at wall, verify ≥5
      cells inside δ_T/L=0.032 envelope. Document numerical values in
      adapter comment so future readers can audit.

  - flag: validation_artifact_lineage_drift
    severity: high
    codex_flagged: true  # F2-HIGH cited (auto_verify_report.yaml is stale source)
    description: |
      Three-source split: (1) gold YAML observables[].ref_value=8.8;
      (2) auto_verify_report.yaml (2026-04-18, commit c3a1a4c, pre-
      demotion) gold_standard_comparison.observables[0].ref_value=30.0
      with sim=5.85; (3) audit fixture audit_real_run_measurement.yaml
      (post-demotion) ref=8.8 with actual=11.4. The Jinja templates
      (templates/partials/gold_standard_ref.md.j2 vs
      results_comparison.md.j2) read these from DIFFERENT pipeline
      stages, so a single rendered report.md emits inconsistent ref
      values across its tables. Same in report.html (precondition
      narrative @ §1 still says "ref=30.0 ±15%").
    mitigation_in_batch: |
      Batch A: locate report-engine source-of-truth path. Two-step:
      (i) regenerate auto_verify_report.yaml against current gold YAML
      schema_v2 to wipe the 30.0/5.85 staleness. (ii) Add invariant
      regression test: gold YAML ref_value == auto_verify_report.gold_
      standard_comparison.observables[].ref_value == report.md/html
      reference cell, byte-identical. If renderer reads from a cache,
      audit cache invalidation. Do NOT hand-fix the rendered output —
      fix the source.

  # --- mandatory v2.0+ template slots (per RETRO-V61-053 + RETRO-V61-050) ---

  - flag: python_version_parity
    severity: med
    codex_flagged: false
    description: |
      Python 3.9 (Codex shim) vs 3.12 (.venv) f-string parser differ.
      DHC extractors (Batch B) will involve nested f-strings for
      sampleDict generation — high risk surface.
    mitigation_in_batch: |
      Run `python3 -m py_compile <changed .py>` before each Stage A+
      commit. Hoist nested f-string parts into separate variables.

  - flag: mesh_density_on_domain_change
    severity: med
    codex_flagged: false
    description: |
      Stage-A mesh upgrade (uniform → graded) changes nL semantics. If
      grading misapplied, effective wall cell can be larger than uniform
      base. Lesson from RETRO-V61-053 P1 (cylinder grew domain 3× but
      cells 2×, lost 33% wall resolution).
    mitigation_in_batch: |
      Batch A: compute and COMMENT in adapter blockMesh emit: dx_wall =
      <numerical value>L; verify min(dx, dy)_wall ≤ δ_T/L/5 = 0.0064L.
      blockMesh smoke-check captures actual min cell size into stdout
      log; assert log contains expected min via grep.

  - flag: executable_smoke_test
    severity: high
    codex_flagged: false  # implicit in F1 chain (test bakes wrong AR)
    description: |
      Per RETRO-V61-053 P0: unit tests via direct generator call bypass
      dispatch layer. Need actual OpenFOAM invocation through
      FoamAgentExecutor.execute(task) before accepting Codex APPROVE.
      Test at tests/test_foam_agent_adapter.py:1427-1429 currently
      bakes AR=2.0 for Ra=1e6 — fixing it is part of Batch A, but the
      P0 lesson stands: even after fix, run the full dispatch-path
      smoke test.
    mitigation_in_batch: |
      Stage E: scripts/phase5_audit_run.py differential_heated_cavity
      against attempt-1 with new extractors. Live solver must converge
      and emit all 5 gates (or 4 if ψ demoted). If solver diverges,
      fall back to PCG+DIC for p (V61-053 lesson).

  - flag: solver_stability_on_novel_geometry
    severity: med
    codex_flagged: false
    description: |
      buoyantFoam laminar @ Ra=1e6 is well-established (matches OF tutorial
      heatTransfer/buoyantSimpleFoam/hotRoom topology). Risk lower than
      cylinder which had no equivalent tutorial. Still: AR fix changes
      mesh dimensions; GAMG p-solver may need swap to PCG+DIC.
    mitigation_in_batch: |
      Stage E executable_smoke_test catches this. Pre-emptive fallback
      ready: if p oscillates >3 SIMPLE iters, swap GAMG → PCG+DIC.

  - flag: numerical_noise_snr
    severity: med
    codex_flagged: true  # F3-HIGH cited indirectly (ψ SNR precondition)
    description: |
      Per RETRO-V61-050: extraction methods can have noise floor that
      makes argmax/extremum coincide with noise rather than physics.
      For DHC: psi_max requires reconstruction with closure residual at
      both walls (ψ=0 at x=0 AND x=L); u_max/v_max via sampleSet have
      interpolation noise. ψ-style residual SNR is gating; for the other
      extractors a profile-spread diagnostic is reported but is NOT a
      gate (Codex round-2 F2-MED · DEC-V61-057 Batch B-final).
    mitigation_in_batch: |
      Batch B (post round-2 rename): Nu_max / u_max / v_max return
      {value, profile_spread, peak_to_profile_spread} as non-gating
      diagnostics — the gate trigger remains the comparator's tolerance
      compare. Only ψ_max retains a residual-based SNR gate
      (closure_fraction_of_gold + snr_pass + advisory_status):
      closure residual at top wall (ψ_top - 0) / |psi_max_gold_nondim|
      must be < 0.01; otherwise the extractor flags advisory_status=
      PROVISIONAL_ADVISORY and Batch C does NOT hard-gate on ψ.

