# ============================================================================
# §1 Classification (F5-M1 hard gate, §3b — NO mid-arc Type change allowed)
# ============================================================================
case_type: I
case_type_rationale: |
  Five physically-independent scalar gates available from de Vahl Davis 1983
  Tables I, II, III at Ra=1e6, Pr=0.71, AR=1:

   1. Nu_avg (hot wall)        — HEADLINE GATE — wall-averaged Nusselt, 8.800
                                  (Table III, primary benchmark scalar)
   2. Nu_max (hot wall)        — peak local Nu along hot wall, 17.925 at y=0.0378
                                  (Table III; tests BL resolution)
   3. u_max @ x=0.5 vert plane — peak |u| along vertical mid-plane, 64.63
                                  (Table II; nondim u·L/α)
   4. v_max @ y=0.5 horiz plane — peak |v| along horizontal mid-plane, 219.36
                                  (Table II; nondim v·L/α)
   5. psi_max @ cavity center  — peak stream function, 16.750
                                  (Table I; sole stream-function scalar)

  Independence rubric (per V61-053 plan-review clarification):
    - Nu_avg / Nu_max share wall-temperature-gradient surface but differ by
      operator (mean vs peak); IMPLEMENTATION_NEAR-INDEPENDENT, PHYSICS_INDEPENDENT.
    - u_max and v_max are sampleSet-based on different planes; fully INDEPENDENT.
    - psi_max requires stream-function reconstruction (∫U·n along ψ-isoline);
      INDEPENDENT extraction surface.
    - Total ≥3 INDEPENDENT physical gates → Type I requirement satisfied.

  HEADLINE = Nu_avg (load-bearing benchmark scalar; the one >40 subsequent
  studies cite within ±0.2%). Other 4 are CROSS_CHECK / INDEPENDENT_CROSS_CHECK.

primary_gate_count: 5
case_type_hard_gate_signed: true
headline_gate: nusselt_number  # quantity_id matches gold YAML observables[].name

# ============================================================================
# §2 Reference papers
# ============================================================================
reference_paper:
  primary:
    citation: "de Vahl Davis, G. (1983). Natural convection of air in a square cavity: A bench mark numerical solution. International Journal for Numerical Methods in Fluids, 3(3), 249-264."
    doi: "10.1002/fld.1650030305"
    providing: [Nu_avg, Nu_max, u_max_centerline_v, v_max_centerline_h, psi_max]
  secondary:
    - citation: "Le Quéré, P. (1991). Accurate solutions to the square thermally driven cavity at high Rayleigh number. Computers & Fluids 20, 29-41."
      doi: "10.1016/0045-7930(91)90025-D"
      providing: [cross_check_high_ra_extension, spectral_solution_baseline]
    - citation: "Ampofo, F. & Karayiannis, T.G. (2003). Experimental benchmark data for turbulent natural convection in an air filled square cavity. Int. J. Heat Mass Transfer 46, 3551-3572."
      doi: "10.1016/S0017-9310(03)00147-9"
      providing: [historical_lineage_only_NOT_USED_AT_RA_1E6]
    - citation: "Hortmann, M., Perić, M., & Scheuerer, G. (1990). Finite volume multigrid prediction of laminar natural convection: Bench-mark solutions. Int. J. Numer. Methods Fluids 11, 189-207."
      doi: "10.1002/fld.1650110206"
      providing: [cross_check_grid_convergence_pattern]

# ============================================================================
# §3 Observable scope (hardens against breadth drift / scope creep)
# ============================================================================
observable_scope:
  in_scope:
    - quantity: nusselt_number  # Nu_avg, hot wall
      tolerance_pct: 5.0  # tightening from current 10.0 — de Vahl Davis Nu=8.800 is well-established
      extraction_method: |
        Wall-averaged hot-wall Nu via src.wall_gradient.extract_wall_gradient.
        Currently emits via key_quantities. Surface as measurement.value.
      status_pre_DEC: EXTRACTOR_EXISTS
      role: HEADLINE_GATE
      gold_value: 8.800
      gold_source: "de Vahl Davis 1983 Table III, integrated over hot wall"
    - quantity: nusselt_max
      tolerance_pct: 7.0  # peak is more BL-resolution sensitive than mean
      extraction_method: |
        Peak local Nu along hot wall. Same wall-gradient field as Nu_avg
        but max() rather than mean(). New extractor needed
        (src.dhc_extractors.extract_nusselt_max or similar).
      status_pre_DEC: NOT_IMPLEMENTED
      role: INDEPENDENT_CROSS_CHECK
      gold_value: 17.925
      gold_source: "de Vahl Davis 1983 Table III, max value"
    - quantity: u_max_vertical_midplane
      tolerance_pct: 5.0
      extraction_method: |
        sampleSet line at x=0.5L, y∈[0,L]; extract |u(y)|, take max,
        nondimensionalize as u·L/α. New sampleDict line + extractor.
      status_pre_DEC: NOT_IMPLEMENTED
      role: INDEPENDENT_CROSS_CHECK
      gold_value: 64.63  # nondim
      gold_source: "de Vahl Davis 1983 Table II, max u along vertical mid-plane"
    - quantity: v_max_horizontal_midplane
      tolerance_pct: 5.0
      extraction_method: |
        sampleSet line at y=0.5L, x∈[0,L]; extract |v(x)|, take max,
        nondimensionalize as v·L/α. New sampleDict line + extractor.
      status_pre_DEC: NOT_IMPLEMENTED
      role: INDEPENDENT_CROSS_CHECK
      gold_value: 219.36  # nondim
      gold_source: "de Vahl Davis 1983 Table II, max v along horizontal mid-plane"
    - quantity: stream_function_max
      tolerance_pct: 8.0  # stream function reconstruction is post-process, slightly noisier
      extraction_method: |
        Reconstruct ψ from velocity field via ∫U_x dy along x=0 boundary
        (ψ=0 at wall) then propagate; OR use OpenFOAM's streamFunction FO
        if available. Take max over interior. New extractor.
      status_pre_DEC: NOT_IMPLEMENTED
      role: CROSS_CHECK
      gold_value: 16.750  # nondim
      gold_source: "de Vahl Davis 1983 Table I, max ψ at cavity center"
  explicitly_out_of_scope:
    - item: "Ra-sweep across {1e3, 1e4, 1e5, 1e6}"
      reason: "DEC-V61-057 targets the Ra=1e6 benchmark only. Ra-sweep was the previous (closed) scope of EX-1-007 + DEC-ADWM-004; reopening dilutes focus."
    - item: "Aspect-ratio sensitivity beyond AR=1"
      reason: "De Vahl Davis 1983 is AR=1 only. Tall (AR=4, 8) cavity benchmarks (Bejan & Tien 1978) are different physics regime."
    - item: "Turbulence model comparison (k-ε vs k-ω SST)"
      reason: "Ra=1e6 is well within laminar regime (turbulent onset ~Ra=1.5e8 per Tilton 2001). Turbulence is NOT in physics, do not configure it."
    - item: "Time-dependent oscillatory regime"
      reason: "Steady solution exists at Ra=1e6; oscillatory onset at ~Ra=1.5e8. Solver is steady SIMPLE; do not enable transient."
    - item: "GCI / Richardson grid-convergence study"
      reason: "Grid-convergence is its own follow-up DEC. Single-grid 80-cell baseline is the V61-057 deliverable; mesh-pyramid (40/80/160/320) belongs in a separate DEC-V61-XXX_dhc_grid_convergence."

# ============================================================================
# §4 Risk flags (F1-M1 requires ≥1 subjective risk annotation)
# ============================================================================
risk_flags:
  # --- case-specific ---
  - flag: ra_aspect_ratio_dispatch_inversion
    severity: high
    codex_flagged: false
    description: |
      src/foam_agent_adapter.py:2070-2075 currently sets aspect_ratio=2.0 when
      Ra<1e9 (i.e. Ra=1e6 path). This is the Rayleigh-Bénard / NC Cavity
      branch. DHC at Ra=1e6 needs aspect_ratio=1.0 (square cavity per de
      Vahl Davis 1983). Without explicit boundary_conditions.aspect_ratio=1.0
      in the whitelist, the adapter generates a 2:1 rectangle, not a square.
      Result: extracted Nu won't match de Vahl Davis irrespective of mesh.
    mitigation_in_batch: |
      Batch A: verify whitelist_cases/differential_heated_cavity passes
      aspect_ratio=1.0 explicitly. If absent, add. Add adapter assertion
      that case_id=differential_heated_cavity → aspect_ratio==1.0
      (inverted from rayleigh_benard which gets ar=2.0).

  - flag: extractor_emit_path_inconsistency
    severity: high
    codex_flagged: false
    description: |
      Audit fixture says actual=11.368 vs gold=8.8 (29% over) but report.md
      "Results vs Reference" table shows ref=30, actual=5.85, FAIL. Two
      different gold sources — the report-engine pipeline reads from a
      stale cache or different YAML schema branch. This is a P0 reporting
      bug independent of physics: same case shows two contradictory verdicts.
    mitigation_in_batch: |
      Batch A: identify which renderer path emits the "ref=30" line. Audit
      reports/case_*/report.md generators against current gold_standards/
      schema_version=2 path. If a v1-schema fallback is leaking through,
      remove or reroute. Add regression test: `nusselt_number ref` cell
      must equal observables[].ref_value byte-identically.

  - flag: stream_function_postprocess_choice
    severity: med
    codex_flagged: false
    description: |
      OpenFOAM has no built-in 2D stream-function FO equivalent to ParaView's
      stream tracer. Two reconstruction options: (a) trapezoidal ∫U_x dy
      along x=0 col, propagate via incompressibility; (b) Poisson solve
      ∇²ψ = -ω_z. Option (a) is simpler but accumulates trapezoidal error
      O(Δy²); Option (b) needs solver setup. RETRO-V61-050 (numerical_noise_snr)
      flagged that ψ extraction can drop below physically-meaningful SNR.
    mitigation_in_batch: |
      Batch B: prototype option (a) trapezoidal first; report extraction
      noise floor vs |ψ_max_gold|=16.75. Ratio must be ≥10× per
      RETRO-V61-050 mitigation. If <10×, switch to option (b) Poisson
      solve OR demote stream_function_max to advisory (not gated).

  - flag: nondimensionalization_unit_mismatch
    severity: med
    codex_flagged: false
    description: |
      de Vahl Davis 1983 Table II reports velocities as u·L/α (Peclet-like
      nondim). Adapter currently emits raw |u| in m/s. Comparator must
      multiply by L/α before comparison. L is read from boundary_conditions
      (after Batch A fix); α = ν/Pr = 1e-5/0.71 = 1.408e-5. Mistake here =
      O(10⁵) error, not just bias.
    mitigation_in_batch: |
      Batch B: extractor for u_max/v_max emits both raw and nondim values
      explicitly; comparator gates against nondim only. Unit-test the
      conversion: u_raw=0.005 m/s @ L=1, α=1.408e-5 → u_nondim=355 (in
      ballpark of gold 64-219).

  # --- mandatory v2.0+ slots ---

  - flag: python_version_parity
    severity: med
    codex_flagged: false
    description: |
      Python 3.9 (Codex shim) vs 3.12 (.venv) f-string parser differ.
      DHC extractors will involve nested f-strings for sampleDict
      generation — high risk surface.
    mitigation_in_batch: |
      Run `python3 -m py_compile <changed .py>` before each Stage A+ commit.
      Hoist nested f-string parts into separate variables.

  - flag: mesh_density_on_domain_change
    severity: low
    codex_flagged: false
    description: |
      DHC current mesh nL=max(80*L, 40)=80 cells per axis @ AR=1. If
      Batch A fixes aspect_ratio dispatch, cell count will recompute;
      need to verify mesh quality (checkMesh) and not silently coarsen.
    mitigation_in_batch: |
      Batch A: assert nL_x and nL_y both = 80 for AR=1; comment in
      blockMesh emit so future readers see the absolute number.

  - flag: executable_smoke_test
    severity: high
    codex_flagged: false
    description: |
      Per RETRO-V61-053 P0: unit tests via direct generator call bypass
      dispatch layer. Need actual OpenFOAM invocation through
      FoamAgentExecutor.execute(task) before accepting Codex APPROVE.
    mitigation_in_batch: |
      Stage E: scripts/phase5_audit_run.py differential_heated_cavity
      against attempt-1 with new extractors. Live solver must converge
      and emit all 5 gates. If solver.diverges, fall back to PCG+DIC for
      p (V61-053 lesson).

  - flag: solver_stability_on_novel_geometry
    severity: med
    codex_flagged: false
    description: |
      buoyantFoam laminar @ Ra=1e6 is well-established (matches OF tutorial
      heatTransfer/buoyantSimpleFoam/hotRoom topology). Risk lower than
      cylinder which had no equivalent tutorial. Still: if Batch A geometry
      fix changes mesh size, GAMG p-solver may need swap to PCG+DIC.
    mitigation_in_batch: |
      Stage E executable_smoke_test catches this. Pre-emptive fallback
      ready: if p oscillates >3 SIMPLE iters, swap GAMG → PCG+DIC.

  - flag: numerical_noise_snr
    severity: med
    codex_flagged: false
    description: |
      Per RETRO-V61-050: extraction methods can have noise floor that
      makes argmax/extremum coincide with noise rather than physics.
      For DHC, psi_max requires reconstruction; u_max/v_max require
      sampleSet which has interpolation noise. Each extractor must
      report noise_floor vs |gold_value| ratio.
    mitigation_in_batch: |
      Batch B: each new extractor returns {value, numerical_floor,
      signal_above_noise_ratio}. UI surfaces SNR < 10× as a warning
      flag (not auto-FAIL but visible).

