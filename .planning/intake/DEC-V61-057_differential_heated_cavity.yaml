      over all 5 observables. Single commit.
    commit_count_estimate: 1
    atomicity_guard: "All 5 observables + tolerances land in same commit (atomic schema bump)"
  - batch: D
    scope: |
      Compare-tab 5-scalar anchor cards + audit fixture regen + report.md
