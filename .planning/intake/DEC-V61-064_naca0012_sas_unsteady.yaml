# DEC-V61-064 · NACA0012 kOmegaSSTSAS (Scale-Adaptive URAS) transient simulation
# Intake v1 · Stage 0 · 2026-04-26
# Predecessor V61-063 closed at architectural_ceiling_reached on steady RANS
# (4 ceilings established: mesh, topology, wall functions, turbulence model
# class).
#
# Per RETRO-V61-063 followup: PRIMARY is full LES, SECONDARY is SAS hybrid.
# V61-064 takes SECONDARY first because: (a) LES on V61-061 H-grid (96k, RANS-
# resolved) likely needs much finer mesh — separate arc; (b) SAS is the cheapest
# transient option that still tests the unsteady-physics axis; (c) if SAS fails
# decisively, V61-065 commits to full LES with proper mesh design.

dec_id: DEC-V61-064
title: NACA0012 kOmegaSSTSAS transient · close steady-RANS ceiling via unsteady physics axis · methodology v2.2 first-apply
case_id: naca0012_airfoil
predecessor: DEC-V61-063
predecessor_chain: [DEC-V61-058, DEC-V61-061, DEC-V61-062, DEC-V61-063]
methodology_version: "v2.2 (first-apply, post-V61-053+057+058+061+062+063 + RETRO-V61-063 amendments)"
case_type: II  # inherited from V61-058
autonomous_governance: true

# §1 Scope (in/out)
scope:
  in:
    - "Switch turbulence model in `_generate_airfoil_flow` from kOmegaSST → kOmegaSSTSAS (OF10 RAS module, scale-adaptive URAS — verified at /opt/openfoam10/src/MomentumTransportModels/momentumTransportModels/RAS/kOmegaSSTSAS)"
    - "Switch solver: simpleFoam (steady) → pimpleFoam (transient PISO+SIMPLE)"
    - "Solver dispatcher (FoamAgentExecutor) AIRFOIL branch updated to route to pimpleFoam for kOmegaSSTSAS model selection"
    - "controlDict transient block: deltaT computed from Co (CFL) target; endTime ~10 chord-flow-throughs (10·chord/U_inf = 10s); writeInterval at write-window cadence"
    - "fvSchemes ddtSchemes default: steadyState → backward (2nd-order implicit) for transient"
    - "fvSolution: SIMPLE block → PIMPLE block (nOuterCorrectors=1, nCorrectors=2)"
    - "forceCoeffs FO time-averaging window: writeStart=5s (after 5-chord initial transient), accumulate to endTime=10s for 5-chord time-average"
    - "Force-coefficient extractor (`compute_cl_cd`): reuse final-time-row reduction (last force coeffs are time-averaged at end of writeWindow)"
    - "Mesh: V61-061 H-grid 96k cells UNCHANGED (per RETRO-V61-063 v2.2 amendment 3 — single-axis change at a time)"
    - "Wall functions: V61-061 baseline (nutkWallFunction + kqRWallFunction) UNCHANGED"
    - "Turbulence intensity: revert to V61-058+V61-061 default Tu=0.5% (intermediate between V61-063 iter1 0.18% and iter2 1.0%; SAS doesn't have transition formula sensitivity)"
    - "Re-run Stage E sweep at α∈{0,4,8}° using cloned scripts/dec_v61_064_live_runs.py"
    - "Verify V61-058 hard gates: Cl@α=8°≈0.815 (5%), Cd@α=0°≈0.008 (15%), dCl/dα≈0.105/deg (10%)"
    - "Verify smoke + sanity: |Cl@α=0°|<0.005, sign convention Cl@α=+8°>0"
  out:
    - "Mesh changes (V61-061 H-grid LOCKED — per RETRO-V61-063 single-axis)"
    - "Gold YAML hard-gate value changes (locked since V61-058 A1)"
    - "Extractor logic core (forceCoeffs final-time-row already produces time-averaged value when applied to PIMPLE output)"
    - "Audit fixture format (Stage D regenerates from new run)"
    - "New gates / new observables (no transient-specific observables; reuse RANS gates on time-averaged values)"
    - "γ-Re_θt fields (V61-063 wired but not used here; SAS subsumes transition modeling internally)"
    - "Full LES (deferred to V61-065 if V61-064 SAS also fails)"
    - "Stall regime / finite-AR / compressibility / 3D effects"
    - "Other case meshes (V61-064 touches only `_generate_airfoil_flow` + dispatcher route)"

