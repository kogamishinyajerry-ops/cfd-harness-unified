    role: HEADLINE_PRIMARY_SCALAR
    target: 0.815
    tolerance: 0.05
    source: "Ladson 1988 NASA TM-4074 §3.2 Tab.1 Re=3e6"
    v61_058_actual: 0.491   # 40% under
    v61_061_actual: 0.677   # 17% under
    v61_062_actual: NaN     # diverged
    v61_063_actual: 0.6763  # 17% under (no improvement vs V61-061)
  - id: drag_coefficient_alpha_zero
    role: SAME_RUN_CROSS_CHECK
    target: 0.0080
    tolerance: 0.15
    source: "Ladson 1988 same"
    v61_058_actual: 0.0201
    v61_061_actual: 0.0126
    v61_062_actual: NaN
    v61_063_actual: 0.01270
  - id: lift_slope_dCl_dalpha_linear_regime
    role: QUALITATIVE_GATE
    target: 0.105
    tolerance: 0.10
    source: "Ladson 1988 + Abbott 1959 cross-check"
