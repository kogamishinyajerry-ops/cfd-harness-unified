smoke_assertions:
  - "α=+8° → Cl > 0 strictly (time-averaged)"
  - "α=0° → |Cl| < 0.005 (time-averaged; transient symmetry-breaking expected to wash out over 5-chord average)"

advisory:
  y_plus_max:
    band: [11, 500]
    target: ~30  # log-layer wall-function sweet spot (UNCHANGED from V61-061/V61-063)

# §3 Technical hypothesis
hypothesis: |
  V61-058 → V61-061 → V61-062 → V61-063 progression decisively established
  the steady RANS k-ω SST framework ceiling at Cl@α=8°=0.677 across:
  (1) mesh density (V61-058 16k → V61-061 96k: closed 23 pp, plateaued)
  (2) topology (V61-062 C-grid: NaN-diverged before completing)
  (3) wall function regime (V61-062 LowRe + iter4 hybrid: ceiling)
  (4) turbulence model class within steady RANS (V61-063 kOmegaSSTLM γ-Re_θt
      with Tu sweep 5.5×: 0% Cl@α=8 movement)

  Hypothesis: the missing physics axis is *unsteadiness*. NACA0012 at α=8° in
  the Ladson 1988 wind tunnel may have small-scale vortex shedding / BL
  unsteadiness on the suction side that steady RANS time-averages incorrectly
  (over-predicts BL turbulence dissipation → under-predicts pressure recovery
  → under-predicts Cl). kOmegaSSTSAS scale-adaptive URAS detects detached/
  unsteady regions and switches to LES-like behavior, potentially capturing
  this physics.

  Risk acknowledgment: V61-061's H-grid is RANS-resolved (96k cells, y+~30,
  designed for wall-modeled steady RANS). SAS in detached regions wants to
  produce LES-like content but on a mesh that can't resolve it — the model
  may degenerate to standard kOmegaSST in this regime, producing Cl@α=8 ≈ 0.677
  again (V61-063 outcome). This is the SECONDARY recommendation precisely because
  of this risk; if it fails, V61-065 commits to full LES with proper mesh.

  Expected outcomes (pre-registered):
  - Cl@α=8° within 5%: PASS (low likelihood ~10%)
  - Cl@α=8° improvement vs V61-061 by ≥5 pp: medium likelihood ~30%
  - Cl@α=8° identical to V61-061/V61-063 (~0.677): high likelihood ~60% — confirms ceiling
  - Cl@α=8° worse than V61-061: low likelihood ~15% (numerical instability of transient + RANS-mesh mismatch)

  Note: convergence here is qualitatively different from steady RANS. We
  monitor time-averaged Cl/Cd over 5-chord-flow-throughs after 5-chord initial
  transient. If Cl oscillates with bounded amplitude around mean, that's
  physical vortex shedding (gold). If Cl drifts unboundedly, it's NaN
  divergence (architectural_ceiling_reached early termination).

# §4 Wall-clock budget
runtime_budget:
  per_alpha_target_s: 7200   # 2 hours
  per_alpha_max_s: 18000     # 5 hours hard ceiling
  total_sweep_target_s: 21600  # 6 hours for 3-α sweep
  iteration_max_count: 4    # per RETRO-V61-062 L5
  early_termination: "k bounding event with k_max > 1e6 → hard early-termination per RETRO-V61-062 v2.1 amendment 3; SAS-specific: any unbounded Cl drift past iteration N=2000 with rolling-window stddev > 5× signal magnitude"

# §5 Codex budget + self-pass-rate calibration
codex_budget_rounds: 0  # autonomous closeout per V61-061+V61-062+V61-063 precedent
external_gate_self_estimated_pass_rate: 0.10
# Per RETRO-V61-063 anchor at ≤0.20 for prior-ceiling geometry arcs.
# V61-064 estimated 0.10 (at the floor) because:
# - V61-061→V61-063 establishes Cl@α=8°=0.677 as the steady-RANS ceiling
# - SAS on RANS-resolved mesh is well-known to underperform full LES
# - Most likely outcome: SAS converges to same Cl ≈ 0.677 → null result confirming ceiling
# - PASS requires actual unsteady physics being captured AND that physics
#   actually moving the time-averaged Cl by ≥17%; this is a strong claim
external_gate_self_estimated_pass_rate_4iter: 0.30
# 4-iter estimate: iter1 SAS baseline; iter2 might tweak deltaT/Co or
# averaging window; iter3+iter4 likely diminishing returns. If iter1 shows
# Cl@α=8 unchanged from steady RANS, declare ceiling at 2/4 (per RETRO-V61-063
# L5 — 2-iter ceiling judgment as parallel to 4-iter exhaustion).

# §6 Risk flags (per RETRO-V61-063 v2.2 amendment 3 — single-axis principle)
risk_flags:
  - id: solver_class_change_steady_to_transient  # NEW for V61-064
    note: "Multi-axis change: turbulence model + solver + controlDict + fvSchemes + fvSolution + extractor handling. RETRO-V61-063 v2.2 amendment 3 wanted single-axis but SAS REQUIRES transient — these are linked, not independent. All changes are co-located in `_generate_airfoil_flow` + `execute()` dispatch; intake §1 explicitly enumerates the linked changes."
    mitigation: "Stage A test: assert pimpleFoam dispatched, ddtScheme=backward, PIMPLE block in fvSolution, kOmegaSSTSAS in turbulenceProperties. Live-run smoke at α=0° before launching full sweep — catches divergence early."
  - id: ras_mesh_for_unsteady  # NEW for V61-064
    note: "V61-061 H-grid is RANS-resolved (96k cells, y+~30). SAS in detached regions wants LES-like content; on this mesh SAS may degenerate to standard kOmegaSST. Expected outcome: similar Cl to V61-061/V61-063."
    mitigation: "Pre-register null-result expectation in §5 (60% likelihood). If SAS degenerates to RANS, it's confirmation of ceiling — informative for V61-065 LES decision."
  - id: time_averaging_window_sufficiency  # NEW for V61-064
    note: "5-chord-flow-through averaging window after 5-chord transient. May be too short if vortex shedding period is long. NACA0012 at α=8° has small-scale TE shedding; 5-chord averaging should capture statistical convergence."
    mitigation: "writeInterval set to small window; can analyze instantaneous samples to verify mean has converged within budget."
  - id: cfl_choice_for_pimplefoam  # NEW for V61-064
    note: "deltaT controls CFL (Co). Too large → divergence; too small → wasted compute. Default Co~1 for pimpleFoam stability."
    mitigation: "Co target = 5 (PIMPLE allows higher Co than PISO via outer corrector iteration). deltaT auto-computed from Co * dx_min / |U|. dx_min from V61-061 mesh ~5e-4 m (BL first cell), Umax~1 m/s → deltaT ~ 2.5e-3s. endTime=10s → ~4000 timesteps. Reasonable budget."
  - id: solver_stability_on_novel_geometry
    note: "OPEN from V61-053/V61-058/V61-061/V61-062/V61-063. Solver stability for kOmegaSSTSAS+pimpleFoam on V61-061 mesh is the V61-064-specific gate."
  - id: regression_on_v61_058_test_class
    note: "TestNACA0012MultiDim's 40 unit tests must continue to pass — they test extractor + α-routing logic, not turbulence model or solver. Synthetic fixtures don't depend on real solver invocation."

# §7 Stages
stages:
  - id: A
    scope: |
      Multi-axis but linked change to `_generate_airfoil_flow` + dispatcher:
      - constant/turbulenceProperties: RASModel kOmegaSST → kOmegaSSTSAS
      - solver routing in execute(): airfoil simpleFoam → pimpleFoam
      - system/controlDict: transient block (deltaT, runTime/writeInterval)
      - system/fvSchemes: ddtSchemes default backward
      - system/fvSolution: SIMPLE block → PIMPLE block
      - forceCoeffs FO: writeControl runTime; writeInterval at samplePeriod
      - 0/k, 0/omega, 0/U, 0/p, 0/nut: same as V61-061 baseline (no new fields needed for SAS)
      Tests: assert turbulenceProperties contains kOmegaSSTSAS, controlDict has
      deltaT and runTime (not stopAt endTime alone), fvSchemes ddtSchemes=backward,
      fvSolution PIMPLE block.
    commit_count_estimate: 1-2
    iteration_ceiling: 1
  - id: E
    scope: "Live OpenFOAM sweep at α∈{0,4,8}° using cloned scripts/dec_v61_064_live_runs.py. 5-chord initial transient + 5-chord time-averaging window. Iterate if any HARD gate FAILs OR solver diverges."
    commit_count_estimate: 2-4
    iteration_ceiling: 4  # per RETRO-V61-062 L5 + RETRO-V61-063 L5

