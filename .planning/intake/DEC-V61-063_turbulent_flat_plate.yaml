# ============================================================================
# §1 Case classification
# ============================================================================
case_type: II
case_type_rationale: |
  1 primary scalar (Cf @ x=1.0, headline) + 3 derived gates:
    - Cf(x) profile at x ∈ {0.25, 0.5, 0.75, 1.0} — Blasius scaling test
    - Cf · √Re_x invariant scalar (= 0.664 for laminar Blasius;
      a single number that pins down the entire similarity curve)
    - δ_99(x) boundary-layer thickness — secondary observable
      (Blasius: δ_99 ≈ 5·√(ν·x/U) → 0.0224 m at x=0.5, 0.0316 m at x=1.0)

  Rationale for Type II (not Type I): the existing whitelist already
  has 2 gold points (x=0.5 and x=1.0) and the laminar Blasius
  similarity solution is a 1D curve along Re_x. A single-scalar
  Type I would lose the per-x scaling signal and accept an extractor
  that gets x=0.5 right by coincidence while drifting at x=1.0
  (or vice versa). Multi-x sampling + the Cf·√Re_x invariant make
  the "extractor returns Blasius value at one x but uses the wrong
  formula at others" failure mode catchable.

primary_gate: cf_skin_friction_x1
primary_gate_count: 4  # 1 primary + 3 secondary
secondary_gates:
  - id: cf_x_profile
    name: Cf(x) profile at 4 sampling points
    spec: |
      Sample local Cf at x ∈ {0.25, 0.5, 0.75, 1.0} via the existing
      _extract_flat_plate_cf wall-gradient method. Compare against
      Blasius gold per point at the case-tolerance band (10%
      relative). Profile gate FAILs if any single point is outside
      tolerance.
    blasius_gold_values:
      - {x: 0.25, Cf: 0.00594}  # 0.664 / √12500
      - {x: 0.50, Cf: 0.00420}  # 0.664 / √25000
      - {x: 0.75, Cf: 0.00343}  # 0.664 / √37500
      - {x: 1.00, Cf: 0.00297}  # 0.664 / √50000

  - id: cf_blasius_invariant
    name: Cf · √Re_x invariant
    spec: |
      Compute K_x = Cf(x) · √Re_x at each sampled x. Per Blasius
      similarity, K is a constant = 0.664 independent of x. Report
      mean(K) ± std(K). If std/mean > tolerance (5% relative), the
      profile is NOT collapsing onto the Blasius similarity curve,
      indicating a non-similarity flow pattern (transition,
      pressure-gradient effect, mesh artifact).
    blasius_gold_value: 0.664
    invariant_tolerance: 0.05  # 5% on std/mean ratio (tighter than per-point Cf)

  - id: delta_99_x_profile
    name: δ_99(x) boundary-layer thickness profile
    spec: |
      Extract δ_99 (the y at which u/U_∞ = 0.99) at x ∈ {0.5, 1.0}.
      Compare to Blasius δ_99(x) = 5 · √(ν·x/U_∞). Fail if relative
      error exceeds tolerance. This is a derived observable that
      catches mesh-resolution issues (under-resolved BL → stretched
      δ_99 / over-coalesced δ_99 gradients).
    blasius_gold_values:
      - {x: 0.50, delta_99: 0.02236}  # 5·√(2e-5·0.5/1) = 0.02236 m
      - {x: 1.00, delta_99: 0.03162}  # 5·√(2e-5·1.0/1) = 0.03162 m
    tolerance: 0.20  # 20% relative — δ_99 inherently noisier than Cf

# ============================================================================
# §2 Adapter / extractor / fixture surface area
# ============================================================================
adapter_touch_points:
  - file: src/foam_agent_adapter.py
    method: _extract_flat_plate_cf  # currently single-x at x=0.5
    change_kind: extend
    spec: |
      Generalize from "extract Cf at x_target=0.5 only" to "extract
      Cf at x ∈ {0.25, 0.5, 0.75, 1.0}" returning a list of (x, Cf)
      tuples in key_quantities["cf_x_profile"]. Preserve the existing
      key_quantities["cf_skin_friction"] (single scalar at x=0.5)
      for back-compat with prior fixtures + Cylinder/LDC/etc. tests
      that don't use the new profile.

      A.4-style flag: emit `cf_extractor_path = "wall_gradient_v1"`
      so audit packages distinguish wall-gradient extraction from
      any future Spalding-fallback or correlation-based path. The
      Spalding fallback path (line ~9595) MUST remain disabled
      under laminar contract (it can fire only when wall-gradient
      extraction itself fails).

  - file: src/flat_plate_extractors.py  # NEW MODULE (mirrors src/plane_channel_extractors.py)
    change_kind: new
    spec: |
      Holds the secondary-observable computations:
        - compute_blasius_invariant(cf_x_pairs) → (mean_K, std_K, K_per_x)
        - compute_delta_99_at_x(u_line_pairs, U_inf, x) → δ_99
        - canonicalize_turbulence_model(declared) → "laminar" / camelCase RANS
      Following the V61-059 plane_channel_extractors.py pattern with
      conservative SNR floor (max(spacings)) per V61-059 R2 F4.

  - file: knowledge/gold_standards/turbulent_flat_plate.yaml
    change_kind: extend
    spec: |
      Add 3 new HARD_GATED observables: cf_x_profile,
      cf_blasius_invariant, delta_99_x_profile. The existing
      cf_skin_friction observable @ x=0.5 stays as a soft-graded
      back-compat anchor. schema_version stays at 2.

  - file: ui/backend/tests/fixtures/runs/turbulent_flat_plate/audit_real_run_measurement.yaml
    change_kind: extend
    spec: |
      Auto-regen via phase5_audit_run.py at Stage B. Existing
      commit_sha: 547002a fixture is pre-DEC-V61-063; expect a
      complete refresh.

  - file: tests/test_flat_plate_extractors.py  # NEW
    change_kind: new
    spec: |
      Unit tests for src/flat_plate_extractors.py: invariant
      reproduces 0.664 from synthetic Blasius-like data, δ_99
      reader handles raw OpenFOAM .xy line-sample output, fail-
      closed on degenerate inputs (empty profile, all-zero u, etc.).
      ~15-20 tests target.

