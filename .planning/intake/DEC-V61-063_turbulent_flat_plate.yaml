# ============================================================================
# §6 Risk register (intake-level, ranked)
# ============================================================================
risk_flags:
  - id: cf_extractor_x_aliasing
    severity: HIGH
    description: |
      Current _extract_flat_plate_cf at line 9538 uses a single
      x_target=0.5 with x_tol from min(unique_x_spacing). Generalizing
      to multi-x sampling needs the same tol per x but different
      neighbour windows. Risk: x=0.25 might be below the inlet
      developed region (or hit a refinement seam) and return
      degenerate Cf.
    mitigation: |
      Add a Stage A explicit guard: if a sampled x has fewer than
      N_min interior cells (default 5), raise FlatPlateExtractorError
      and let the comparator emit MISSING_TARGET_QUANTITY rather
      than a silent fallback.

  - id: openfoam_version_emitter_api_drift
    severity: HIGH  # promoted from RETRO-V61-053 addendum + V61-059 evidence (3 hits)
    description: |
      V61-059 surfaced 3 distinct OpenFOAM 10 emitter API drift hits
      (turbulenceProperties → momentumTransport, icoFoam needing
      pisoFoam to register a momentumTransportModel, sets-FO file
      naming change). Flat plate uses simpleFoam laminar — does the
      same API drift apply? simpleFoam DOES register
      momentumTransport, so the V61-059 wallShearStress-FO crash
      pattern likely doesn't recur, but the constant/momentumTransport
      filename and the line-sample naming are still in scope.
    mitigation: |
      Stage B executable smoke test with the live OpenFOAM container
      will surface any drift. Pre-emptive Stage A.0: instrument
      the case dir generation to write `constant/momentumTransport`
      (not turbulenceProperties) and verify with one quick smoke run
      BEFORE batching A.1 forward.

  - id: spalding_fallback_silent_fire
    severity: MED
    description: |
      The Spalding-fallback branch in _extract_flat_plate_cf
      (line ~9595) is a turbulent-regime safety-net that should
      NEVER fire under laminar Blasius. If it does fire silently
      and emits a "valid" Cf, the multi-x profile will look correct
      while actually using a wrong physical model.
    mitigation: |
      Add an assertion: if cf_extractor_path == "wall_gradient_v1"
      and any sampled x triggered Spalding fallback, the extractor
      raises rather than emitting a mixed-source profile. Audit
      package will see "extractor failure" instead of "silent
      regime drift".

  - id: blasius_invariant_extreme_sensitivity_to_inlet_drift
    severity: MED
    description: |
      Cf · √Re_x = 0.664 is a tight invariant that sets a 5% std/mean
      tolerance (vs 10% per-point). Any inlet-velocity drift, any
      slight x_origin offset, or any mesh-induced acceleration near
      the inlet will spoil the invariant before spoiling the per-x
      Cf points (which are individually within their own 10% band).
    mitigation: |
      Stage A.3 should compute the invariant only for x ≥ 0.25
      (skipping the inlet-sensitive region). Document this clearly
      in the extractor comment.

  - id: stage_b_runtime_budget
    severity: LOW  # simpleFoam steady state should converge in <5min wall
    description: |
      Per V61-059 lessons, Stage B runtime budget should be
      verified at intake time. simpleFoam laminar @ Re=50000 on
      ncy=80 mesh is mass-equation-dominated, not transient. SIMPLE
      iteration should converge in 200-500 iterations (~3-5 min wall
      on the cfd-openfoam container).
    mitigation: |
      Existing controlDict at the case has standard endTime/
      iteration caps. No tuning needed at intake; revisit only if
      Stage B exposes a runtime issue.

