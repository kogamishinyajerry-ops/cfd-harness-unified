estimated_pass_rate_rationale: |
  Higher than V61-059's 0.40 because:
    - The existing _extract_flat_plate_cf is well-trodden (no new
      function-object machinery; uses cell-center wall-gradient
      already validated for x=0.5 in prior fixtures)
    - No new comparator-gate detector class (Blasius is not a
      canonical-band-shortcut hazard; G2 territory doesn't apply)
    - simpleFoam laminar is the most-used solver in the harness;
      no novel solver framework registry concerns
  Lower than 0.55 because:
    - Multi-x extraction is net-new code; aliasing/tol risk
    - Blasius invariant is a tight metric (5% std/mean)
    - V61-059 R2 F3 P1 (verdict-engine wiring TOOTHLESS) class of
      bug remains a real risk; new HARD_GATED concerns must be in
      _HARD_FAIL_CONCERNS

