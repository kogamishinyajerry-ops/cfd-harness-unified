# ============================================================================
# §7 Acceptance criteria (definition of done — F1-M2 two-tier close gate)
# ============================================================================
acceptance_criteria:
  i_codex_arc_complete: |
    Final Codex round returns APPROVE OR APPROVE_WITH_COMMENTS, OR
    CHANGES_REQUIRED with all findings closed verbatim per the 5-condition
    exception envelope (CLAUDE.md).
  ii_headline_validated_or_honestly_failed: |
    EITHER: live-run Nu_stagnation falls within ±30% of the chosen literature
    band — primary gate PASS; OR: Nu_stagnation falls outside the band and
    the DEC documents the physics-fidelity gap explicitly (V61-063 / V61-066
    / V61-060 closeout pattern: METHODOLOGY_COMPLETE_PHYSICS_FIDELITY_GAP_DOCUMENTED).
  iii_profile_shape_validated: |
    Nu(r/D) profile across r/D ∈ {0, 0.5, 1.0, 1.5, 2.0} matches Cooper-style
    monotonic decay; the conservation invariant gate must pass UNLESS the
    physics-fidelity gap explanation explicitly accounts for non-monotonic
    behaviour (e.g. high-Re secondary peak from vortex breakdown).
  iv_invariant_count_excluded_from_pass_fraction: |
    Per V61-060 Stage C.2 comparator semantics: NON_TYPE_HARD_INVARIANT
    blocks verdict on violation but is excluded from primary_gate_count
    denominator. UI must surface the invariant card with the appropriate
    "守恒不变量" badge (rose/emerald state-aware per V61-060 R6 fix).
  v_alias_map_atomic_with_case_name_rename: |
    Per RETRO-V61-060 addendum: any A.0 case_name rename MUST be in the
    same commit as both `_TASK_NAME_TO_CASE_ID_ALIASES` map updates.

# ============================================================================
# §8 Out of scope (will not be addressed in this DEC)
# ============================================================================
out_of_scope:
  - Cross-jet-array configurations (single-jet-only)
  - Compressible jet effects (Ma < 0.3 assumed)
  - Confined-jet vs free-jet variants (free-jet only per existing whitelist
    geometry h_over_d=2)
  - Heat-transfer-coefficient measurement at the nozzle exit (only plate
    Nu is in scope)
  - Multi-Re sweep (single Re=10000 OR Re=23000 after §3 audit; no profile
    over Re — that would be a follow-up DEC)
