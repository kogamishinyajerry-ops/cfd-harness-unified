# ============================================================================
# §2 Reference papers (F4 specificity: paper + table/figure + Mach + transition + α row)
# ============================================================================
reference_paper:
  primary:
    citation: "Ladson, C.L. (1988). Effects of Independent Variation of Mach and Reynolds Numbers on the Low-Speed Aerodynamic Characteristics of the NACA 0012 Airfoil Section. NASA Technical Memorandum 4074."
    archive_id: "NASA-TM-4074 / NTRS 19880019495"
    url: "https://ntrs.nasa.gov/api/citations/19880019495/downloads/19880019495.pdf"
    pinned_anchors:
      - quantity: Cl_at_alpha_eight
        location: "§3.2 Table 1, Re=3.0e6 grit-roughness FIXED-TRANSITION row, M=0.15, α=8.00° column"
        gold_value: 0.815
        gold_uncertainty: 0.010  # ±0.010 from tunnel repeatability stated in §3.4
      - quantity: Cl_at_alpha_four
        location: "§3.2 Table 1, Re=3.0e6 grit-roughness fixed-transition row, M=0.15, α=4.00° column"
        gold_value: 0.434  # used to compute slope; not a HARD gate itself
        gold_uncertainty: 0.008
      - quantity: Cd_at_alpha_zero
        location: "§3.2 Table 1, Re=3.0e6 grit-roughness fixed-transition row, M=0.15, α=0.00° column"
        gold_value: 0.0080
        gold_uncertainty: 0.0010
      - quantity: dCl_dalpha_linear_regime
        location: "§3.2 Table 1, Re=3.0e6 grit-roughness fixed-transition row, M=0.15, α∈[0°,8°] linear-fit slope"
        gold_value: 0.105  # /deg; from 3-point fit through tabulated α=0,4,8
        gold_uncertainty: 0.005
  secondary:
    - citation: "Abbott, I.H., & von Doenhoff, A.E. (1959). Theory of Wing Sections, Including a Summary of Airfoil Data. Dover Publications."
      pinned_anchors:
        - quantity: Cp_distribution_alpha_zero
          location: "Fig. 4-7 (NACA0012 chordwise pressure distribution at α=0°, Re≈6e6 free-transition); USED ONLY FOR PROFILE-SHAPE qualitative match (not absolute magnitudes — Re differs)"
          providing: profile_shape_kutta_te_constraint
    - citation: "Gregory, N., & O'Reilly, C.L. (1970). Low-Speed Aerodynamic Characteristics of NACA 0012 Aerofoil Section, Including the Effects of Upper-Surface Roughness Simulating Hoar Frost. ARC R&M 3726."
      url: "https://naca.central.cranfield.ac.uk/bitstream/handle/1826.2/3003/arc-rm-3726.pdf?sequence=1"
      pinned_anchors:
        - quantity: Cp_distribution_alpha_zero
          location: "Fig. 7 (Cp vs x/c at α=0°, Re=2.88e6 ≈ 3e6, M=0.16, transition free per §2.3); CROSS-CHECK against Abbott Fig. 4-7"
          providing: cp_distribution_alpha_zero_cross_check_re_3e6

# ============================================================================
# §3 Observable scope (hardens against breadth drift / scope creep)
# ============================================================================
observable_scope:
  in_scope:
    - quantity: lift_coefficient_alpha_eight
      tolerance_pct: 5.0  # tight — load-bearing benchmark; Ladson 1988 tunnel uncertainty ±1.2%
      extraction_method: "forceCoeffs FO writes coefficient.dat per-timestep on aerofoil patch; extractor reads final-time row's Cl column. Aref = chord × thin_span = 1.0 × 0.002 = 0.002 m² (verified Codex Q3a). lRef = chord = 1.0 m (forceCoeffs convention; only affects Cm, not Cl/Cd — Codex Q3b). magUInf = U_inf = 1.0 m/s. rhoInf = 1.0 (incompressible kinematic, Codex Q3c). liftDir = (-sin(α_rad), 0, cos(α_rad)); dragDir = (cos(α_rad), 0, sin(α_rad)). Run at α=8°, freestream-rotation convention U_inf_vec = U·(cos α, 0, sin α)."
      status_pre_DEC: "NOT_IMPLEMENTED — adapter currently α=0° hardcoded; no forceCoeffs FO on aerofoil patch."
      role: HEADLINE_PRIMARY_SCALAR
    - quantity: Cp_distribution_alpha_zero
      tolerance_pct: 20.0  # profile-mode, inherits existing whitelist band
      extraction_method: "Existing sampleDict at gold-anchored upper-surface points (DEC-V61-044 path); Cp profile = list of (x/c, Cp) tuples. Comparator profile-alignment per DEC-V61-036c. α=0° run only."
      status_pre_DEC: "EXTRACTOR_EXISTS — sampleDict + airfoil_surface_sampler.compute_cp emit profile (DEC-V61-044). Batch A may refine gold YAML provenance + TE point."
      role: PROFILE_GATE
    - quantity: Cl_alpha_linear_regime_slope
      tolerance_pct: 10.0  # qualitative-shape gate; linearity check across 3 α
      extraction_method: "Three separate runs at α∈{0°,4°,8°}, each forceCoeffs FO emit Cl. Slope = (Cl(8°) - Cl(0°)) / 8° from least-squares 3-point fit. Linearity check: |Cl(4°) - 0.5·(Cl(0°)+Cl(8°))| / |Cl(8°)| < 0.05."
      status_pre_DEC: "NOT_IMPLEMENTED — depends on α-routing extension (Batch B1)."
      role: QUALITATIVE_GATE
    - quantity: drag_coefficient_alpha_zero
      tolerance_pct: 15.0  # loose — Cd0 small, wall-function discretization noise
      extraction_method: "Same forceCoeffs FO; α=0° run (existing mesh path + new FO). Cd column of coefficient.dat final-time row. SAME PHYSICAL RUN as Cp profile — labeled SAME_RUN_CROSS_CHECK to honor Codex F1."
      status_pre_DEC: "NOT_IMPLEMENTED — forceCoeffs FO not currently emitted for naca0012."
      role: SAME_RUN_CROSS_CHECK
    - quantity: y_plus_max_on_aerofoil
      tolerance_pct: null  # threshold-mode advisory, not value-mode
      extraction_method: "yPlus FO writes y+ field on aerofoil wall; postProcessing/yPlus/<t>/yPlus.dat row matched by patch=aerofoil. Read max column. Threshold band: PROVISIONAL pending live-run measurement (Batch B3); if y+ in [11, 500] → ADVISORY_PASS, else → ADVISORY_FLAG (does NOT fail the case)."
      status_pre_DEC: "NOT_IMPLEMENTED — yPlus FO not currently emitted; mesh quality silent."
      role: PROVISIONAL_ADVISORY  # NOT promoted to HARD_GATED in this DEC (Codex F5)
  sanity_checks:  # NOT gates — passive sub-status surfaces only
    - quantity: lift_coefficient_alpha_zero
      expected_behaviour: "|Cl| < 0.005 confirms symmetric-airfoil zero-AoA solve symmetry"
      role: SANITY_CHECK
      gate: false  # explicit not-a-gate
      excluded_reason: "gold = 0 EXACTLY by symmetry; numerical_noise_snr trap (RETRO-V61-050 instance)"
  explicitly_out_of_scope:
    - item: "Stall onset α≈16-18°"
      reason: "Outside linear regime; thin-span 2D mesh + steady RANS not credible past α≈10° where flow separates and unsteady. Flagged for follow-up DEC."
    - item: "Re sweep (Re=2e6, 6e6, 9e6)"
      reason: "Whitelist locks Re=3e6; Re sensitivity is a separate validation axis."
    - item: "Transition modeling (γ-Re_θt or LES)"
      reason: "Out of scope for kOmegaSST RANS baseline."
    - item: "Lower-surface Cp full profile"
      reason: "α=0° upper = lower by symmetry; α=4°/8° lower-surface Cp would be a NEW family but adapter currently samples upper only — out-of-scope for this DEC."
    - item: "Pitching moment Cm"
      reason: "Cm at α=0° = 0 by symmetry (numerical_noise_snr trap, same exclusion logic as Cl@α=0)."

