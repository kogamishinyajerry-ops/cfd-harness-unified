estimated_pass_rate_rationale: |
  Five biggest risk drivers lowering rate from 1.0:

    1. flag-angle_of_attack_implementation (HIGH): adapter currently
       α=0° hardcoded. Multi-α requires architectural extension
       (rotated freestream + per-α forceCoeffs FO orientation +
       likely whitelist multi-entry). Codex round 1 likely 1 HIGH
       finding on rotation convention or boundary-field consistency.

    2. flag-forceCoeffs_aref_2d_thin_span (MED): same trap as V61-041
       cylinder Aref=0.01→0.001 BLOCKER. Codex round 1 likely 1 MED
       finding. Pre-empted by explicit Aref = chord × thin_span comment
       but Codex may demand stronger annotation.

    3. flag-lift_signal_at_alpha_zero_snr_trap (MED): comparator
       integration with gold=0 zero-divisor. Codex round 1 likely 1
