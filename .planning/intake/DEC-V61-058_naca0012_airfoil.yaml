# ============================================================================
# §1 Classification (F5-M1 hard gate, §3b — NO mid-arc Type change allowed)
# ============================================================================
case_type: II  # DOWNGRADED v1→v2 per Codex F1: Type I requires ≥3 PHYSICALLY-
               # independent families; same-run cross-check pairs and mesh-quality
               # probes do not satisfy this. Type II = 1 primary scalar gate +
               # ≥2 qualitative/profile gates.
case_type_rationale: |
  PRIMARY SCALAR GATE (1) + PROFILE/QUALITATIVE GATES (≥2):

  PRIMARY SCALAR · FORCE-COEFFICIENT (forceCoeffs FO; surface-integral
  pressure + viscous on aerofoil patch; α=8° run):
    1. Cl_at_alpha_eight  — HEADLINE GATE — lift coefficient at α=8°,
                            Ladson 1988 NASA TM-4074 §3.2 Table 1
                            Re=3.0e6 grit-roughness fixed-transition row,
                            α=8° column, Cl ≈ 0.815 ± 0.010.

  PROFILE/QUALITATIVE GATES:
    2. Cp_distribution_alpha_zero — Cp(x/c) profile shape match at α=0°
                                    upper surface, gold-anchored 5+ stations
                                    (existing sampleDict path, DEC-V61-044).
                                    Reference: Abbott & von Doenhoff 1959
                                    Fig. 4-7 (NACA0012 α=0°) cross-checked
                                    against Gregory & O'Reilly 1970 ARC R&M
                                    3726 Fig. 7 α=0° column. Profile-mode
                                    comparator: per-station tolerance 20%
                                    (inherits whitelist gold band).
    3. Cl_alpha_linear_regime_slope — Cl(α) curve shape across α∈{0°,4°,8°}.
                                      Three-point extraction from forceCoeffs
                                      across 3 separate runs gives slope
                                      dCl/dα. Ladson 1988 Re=3.0e6 linear-
                                      regime slope ≈ 0.105/deg ± 0.005.
                                      QUALITATIVE_GATE: linearity check
                                      (|Cl(8°)-Cl(0°)|/8 ≈ |Cl(4°)-Cl(0°)|/4
                                      within 5%). PASS = linear regime
                                      preserved; FAIL = unphysical curvature
                                      indicates solver instability or stall
                                      onset before α=8°.

  SUPPLEMENTARY SCALAR (advisory, supports primary):
    4. Cd_at_alpha_zero  — drag coefficient at α=0°, Ladson 1988 Table 1
                           grit-roughness fixed-transition Re=3.0e6 ≈ 0.0080
                           ± 0.0010. Same physical run as the Cp profile;
                           SAME-RUN cross-check probe, not an independent
                           family — labeled CROSS_CHECK to honor Codex F1.

  PROVISIONAL_ADVISORY (mesh quality, NOT a physics gate):
    5. y_plus_max_on_aerofoil — wall-resolution diagnostic from yPlus FO at
                                α=0° run. Threshold band: PROVISIONAL pending
                                live-run measurement. y+_min derivation
                                (corrected per Codex F3): u_τ = U·sqrt(Cf/2),
                                Cf ≈ 0.0040 → u_τ ≈ 0.0447 → y+_min ≈
                                0.0447·6.25e-4/3.33e-7 ≈ 84. y+_max in
                                adverse-pressure-gradient region α=8° upper
                                may exceed 300; that's why Batch B3 keeps
                                this PROVISIONAL_ADVISORY (mesh-validity
                                annotator on the run, not a HARD gate).

  Cl_at_alpha_zero EXPLICITLY EXCLUDED from gate set (gold = 0 by symmetry,
  numerical_noise_snr trap). Surfaced as SANITY_CHECK sub-status only:
  "|Cl| < 0.005 confirms symmetric solve" — PASS expected, but not a HARD gate.

  Cl_at_alpha_four — RUN PERFORMED to enable Cl_alpha_linear_regime_slope
  gate (3-point extraction); Cl@4° value itself is reported but NOT a
  separate HARD gate (avoids Codex F1 same-extraction-path objection).

  Independence count: 1 PRIMARY scalar + 2 PROFILE/QUALITATIVE gates + 1
  CROSS_CHECK + 1 PROVISIONAL_ADVISORY = Type II requirement (1 + ≥2)
  satisfied with healthy margin.

  HEADLINE = Cl_at_alpha_eight (load-bearing canonical lift benchmark; Ladson
  1988 cited in >50 RANS validation studies within ±1%).

primary_gate_count: 1  # primary scalar; profile/qualitative gates count in case_type but not primary_gate_count
profile_qualitative_gate_count: 2  # Cp_distribution + Cl_linear_regime_slope
supplementary_scalar_gate_count: 1  # Cd@α=0 (CROSS_CHECK with profile)
provisional_advisory_count: 1  # y+_max (mesh diagnostic)
case_type_hard_gate_signed: true
