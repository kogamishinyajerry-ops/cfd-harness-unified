  # --- case-specific ---
  - flag: angle_of_attack_implementation_canonical_routing  # F2 retitled
    severity: high
    codex_flagged: true  # explicitly raised in F2
    description: |
      Current _generate_airfoil_flow at src/foam_agent_adapter.py:6407 is
      HARDCODED to α=0° (symmetric flow). The adapter does NOT honor
      task_spec.boundary_conditions["alpha_deg"] or task_spec.parameters.
      angle_of_attack (whitelist already declares this parameter at
      knowledge/whitelist.yaml line ~261 but adapter ignores it).

      Codex F2 LOCKED architecture (v2): SINGLE canonical case_id
      `naca0012_airfoil`. Multi-α delivered via per-run task_spec parameter
      override. NO `_alpha_4 / _alpha_8` whitelist multi-entry branch.
      Routing keys preserved at:
        - src/knowledge_db.py:66 CASE_ID_TO_GOLD_FILE
        - src/auto_verifier/config.py:55 (per Codex F2 cite)

      Implementation per Codex Q2(a)/(b)/(c): freestream rotation in 0/U
      (mesh stays geometry-locked to x-z plane). U_inf_vec = U·(cos α, 0,
      sin α). forceCoeffs liftDir/dragDir rotated to match. OF tutorial
      precedent: incompressible/simpleFoam/airFoil2D/0/U.

      Sign convention pinned: α positive = upper-suction (matches OF
      airFoil2D); α=+8° → Cl > 0 strict assertion in Stage E smoke.
    mitigation_in_batch: B1 — adapter reads `alpha_deg` (default 0.0) from
      task_spec.boundary_conditions OR task_spec.parameters.angle_of_attack
      with task_spec field as primary source. Comment block in adapter
      documents sign convention + cites OF airFoil2D precedent + asserts
      `Aref = chord × thin_span`. Whitelist remains single-entry with
      angle_of_attack as a parameter dimension; harness invokes 3 runs
      (α=0,4,8) for Cl_alpha_linear_regime_slope extraction.

  - flag: forceCoeffs_aref_2d_thin_span
    severity: med
    codex_flagged: false  # not raised by Codex (acknowledged via Q3a)
    description: |
      DEC-V61-041 (cylinder forceCoeffs FO) had a Codex round-1 BLOCKER
      where Aref was 0.01 instead of 0.001 (10x error). Same trap exists
      here: thin-span y is [-0.001, 0.001] = 0.002 m, chord = 1.0 m →
      Aref = chord·span = 0.002 m² (Codex Q3a verified). lRef = chord
      = 1.0 m (Codex Q3b: lRef only affects Cm, not Cl/Cd). rhoInf = 1.0
      (Codex Q3c). The forceCoeffs FO definition MUST comment the Aref
      derivation explicitly so reviewers can verify.
    mitigation_in_batch: B1 — Aref = chord × thin_span. Comment in the
      FO block must show: Aref = chord · (y_hi - y_lo) = 1.0 · 0.002 =
      0.002. lRef = chord = 1.0. rhoInf = 1.0.

  - flag: lift_signal_at_alpha_zero_snr_trap
    severity: med
    codex_flagged: false  # implicit acknowledgement Q4
    description: |
      RETRO-V61-050 numerical_noise_snr instance specific to NACA0012:
      gold Cl(α=0°, symmetric airfoil) = 0 EXACTLY. Comparator zero-
      reference handling already exists (gold_standard_comparator.py:68 +
      result_comparator.py:203, Codex Q4(a) confirmed) — comparator
      auto-flips to absolute-error mode when |gold| < 1e-6. So core
      divide-by-zero is hardened.

      What remains is DOMAIN-SPECIFIC SEMANTICS (Codex Q4(b)): include
      Cl@α=0 as SANITY_CHECK sub-status with absolute band |Cl| < 0.005,
      NOT as a HARD gate. v2 does this in §3 sanity_checks block.
    mitigation_in_batch: B3 — regression test in TestNACA0012MultiDim that
      gate set (HARD or qualitative) does NOT contain Cl_at_alpha_zero;
      sanity_checks list DOES contain it; UI renders SANITY_CHECK
      sub-status with absolute band.

  - flag: wall_function_validity_at_re_3e6
    severity: med
    codex_flagged: true  # F3 — y+ math correction
    description: |
      kqRWallFunction / omegaWallFunction / nutkWallFunction (current
      adapter at lines 6982, 7017, 7052) require y+ in [11, 300] for
      the high-Re branch (or y+<5 for low-Re via blended).

      Codex F3 corrected y+ derivation: u_τ = U_inf · sqrt(Cf/2), NOT
      U_inf · sqrt(Cf). Cf at Re_L=3e6 (Schlichting flat-plate 0.0592·
      Re^(-1/5) ≈ 0.0040 corrected for finite chord). u_τ = 1.0 · sqrt
      (0.0040/2) = sqrt(0.0020) ≈ 0.0447. dz_min = z_far / (n_z ·
      expansion) = 2.0 / (80 · 40) = 6.25e-4. y+_min = 0.0447 ·
      6.25e-4 / 3.33e-7 ≈ 84 (NOT 118 as in v1).

      INSIDE wall-function range at α=0°. y+_max in adverse-pressure-
      gradient region α=8° upper may exceed 300, possibly 500 — needs
      live-run measurement (Codex Q6(b) confirms).

      y+_min at stagnation line (x/c=0) collapses: u_τ → 0 → y+ → 0,
      which under-resolves the low-Re wall-function blended branch.
      The yPlus FO surfaces this; Batch B3 extracts y+_min/max as
      a measured-and-reported quantity.
    mitigation_in_batch: B3 — yPlus FO emits y+ field; extractor reads
      patch min/max; PROVISIONAL_ADVISORY band [11, 500] (NOT [11, 300]
      per Codex Q6b); HARD-GATING deferred per Codex F5.

  - flag: trailing_edge_singularity_te_cp_provenance  # F4 retitled
    severity: med  # raised low→med per Codex F4 provenance concerns
    codex_flagged: true  # F4
    description: |
      Current gold YAML at knowledge/gold_standards/naca0012_airfoil.yaml:3
      cites "Thomas 1979 / Lada & Gostling 2007" with DOI
      10.1017/S0001924000001169 (Aeronautical Quarterly — Codex F4 flagged
      as unreliable provenance). Trailing-edge anchor (x=1.0, Cp=0.2) is
      inconsistent with Kutta condition for symmetric airfoil at α=0°
      (Codex Q5a: TE Cp should be ≈ 0).

      Batch A doc-only repair:
        - Replace source field with "Ladson 1988 NASA TM-4074 + Abbott
          & von Doenhoff 1959 Fig. 4-7 + Gregory & O'Reilly 1970 ARC R&M
          3726 Fig. 7" (multi-source per pinned_anchors above).
        - Replace x=1.0 anchor: option (a) drop the TE point entirely
          (sampler degenerates anyway); option (b) replace with
          0.0 ± 0.05 absolute band per Kutta condition.
          Codex Q5(b) leaning toward source re-digitization in Stage A;
          v2 picks option (a) dropping the TE point unless Codex round 2
          objects.
        - Add x/c=0.5 row with Abbott Fig. 4-7 cross-check value.
    mitigation_in_batch: A — gold YAML rewrite with multi-source provenance
      block + remove/replace TE singularity row + add x/c=0.5 anchor;
      validation-artifact lineage (3-way invariant per V61-057 A.4): gold
      YAML ↔ auto_verify_report.yaml ↔ report.md/html.

  - flag: codex_residual_attestor_naca_threshold_inheritance
    severity: low
    codex_flagged: false
    description: |
      DEC-V61-038 convergence attestor uses per-case YAML thresholds.
      Current naca0012 thresholds (p=1e-6, U=1e-5) may be too loose for
      forceCoeffs FO time-averaging — if p residual is at 1e-6 but Cl
      is still drifting at the final timestep, the gate reports converged
      but Cl is unstable.
    mitigation_in_batch: C — extend per-case attestor thresholds for
      naca0012 with `cl_last_window_drift_pct < 1.0` over the last 100
      timesteps. Borrow pattern from cylinder (DEC-V61-041 St stationarity
      check).

  # --- mandatory v2.0+ slots ---

  - flag: python_version_parity
    severity: med
    codex_flagged: false
    description: |
      Python 3.9 (CI / Codex shim default) vs 3.12 (project .venv) have
      different f-string parsers (PEP-701). Adapter additions for AoA
      rotation will introduce new f-string blocks in 0/U; nested multi-
      line f-strings can crash 3.9 with SyntaxError.
    mitigation_in_batch: B1+B2 — `python3 -m py_compile` on every edited
      .py before commit. Hoist nested f-strings to plain .format() or
      string concat where the inner expression is itself a multi-line
      f-string.

  - flag: mesh_density_on_domain_change
    severity: med
    codex_flagged: false
    description: |
      Current domain x_min=-5·chord, x_max=5·chord, z_far=2·chord (line
      6442-6444). NACA0012 multi-α validation studies typically use
      x_far ≥ 12·chord, z_far ≥ 12·chord to suppress far-field blockage;
      current 5·chord/2·chord domain has known wake/upwash truncation
      that could bias Cl at α=8°. v2 keeps existing domain (no growth)
