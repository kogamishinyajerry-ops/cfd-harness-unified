       AdverseP-gradient. Mitigation: B1 borrow OF airFoil2D tutorial
       fvSolution.

    5. flag-trailing_edge_singularity + codex_residual_attestor_naca_
       threshold_inheritance (LOW + LOW): gold YAML cross-check + Cl
       drift convergence threshold. 2 LOW findings expected.

  Sum of likely findings: ≈ 2 HIGH + 2 MED + 2 LOW. RETRO-V61-001 rate
  bands: 2H+2M+2L → ≈ 30% round-1-clean rate. Honest 0.30 prediction.

