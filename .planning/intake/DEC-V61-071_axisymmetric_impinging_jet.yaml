stage_preview:
  # v2 (per Codex F2): Stage A.0 split into A.0a (citation+context audit)
  # and A.0b (gold YAML rewrite). A.0a MUST close all four entangled
  # questions — citation, free/confined, Re/H/D, wall-BC family — BEFORE
  # any gold/extractor/comparator work touches the codebase. This prevents
  # the V61-060 Stage A.0 trap where a citation pivot wasn't atomic with
  # the alias map update.
  A_0a_pre_pivot_context_audit:
    purpose: |
      Resolve the four entangled context questions atomically:
        (1) Citation — try the §3 thermal_gold_anchor_priority_chain DOIs
            in order; record which paper, which Re row, which Table/Figure.
        (2) Confinement — confirm whether the chosen anchor reports
            FREE-jet (recommended, matches whitelist geometry) or
            CONFINED-jet (would require a physics_contract.note caveat).
        (3) Re/H/D match — confirm the gold's Re vs whitelist Re=10000
            and h/D vs whitelist h_over_d=2.0 alignment.
        (4) Wall-BC family — confirm constant-T (Dirichlet) vs uniform-q
