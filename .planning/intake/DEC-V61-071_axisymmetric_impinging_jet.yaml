citation_audit:
  whitelist_claim:
    label: "Cooper et al. 1984 / Behnad et al. 2013"
    doi: "10.1016/j.ijheatfluidflow.2013.03.003"
    audit_status: VERIFIED_WRONG_PAPER  # v2 per Codex F1: Crossref query
                                        # confirms this DOI resolves to a
                                        # turbine-LES paper, NOT impinging
                                        # jet (V61-060 pattern repeated).
    doi_resolves_to: "Turbine LES paper (NOT impinging jet) — VERIFIED 2026-04-26 via Codex Crossref query"
    audit_reason: |
      Whitelist label "Cooper 1984" does not match any well-known
      impinging-jet author/date. Whitelist DOI 10.1016/j.ijheatfluidflow.2013.03.003
      VERIFIED to resolve to an unrelated turbine-LES paper (Codex
      Crossref query, 2026-04-26). "Behnad 2013" is most likely a
      corruption of "Behnia 1998/1999".

  # v2 (per Codex F1): Stage A.0 MUST try the following resolveable DOIs
  # in priority order. The list distinguishes THERMAL gold anchor
  # (primary; what the headline Nu_stag will be compared against) from
  # HYDRODYNAMIC support (provides flow-field references but NOT Nu).
  thermal_gold_anchor_priority_chain:
    1_baughn_shimizu_1989:
      authors: "Baughn, J.W., Shimizu, S."
      year: 1989
      title: "Heat transfer measurements from a surface with uniform heat flux and an impinging jet"
      journal: "ASME J. Heat Transfer 111(4), 1096-1098"
      doi: "10.1115/1.3250776"
      reason_promoted: |
        PRIMARY THERMAL ANCHOR CANDIDATE (Codex F1 recommendation).
        Direct heat-transfer measurement from an axisymmetric jet
        impinging on a uniform-heat-flux plate. Re ≈ 23700, h/D ∈ {2, 6, 10}.
        Reports Nu(r/D) profile + stagnation Nu. Critical caveat: the
        measurement uses uniform-heat-flux boundary condition (q=const),
        NOT constant-temperature plate (T=const) which is what the
        adapter currently emits at foam_agent_adapter.py:6204. This
        BC mismatch must be reflected in the gold YAML §physics_contract.note
        like V61-060 did for Pandey & Schumacher's free-slip vs no-slip mismatch.
      stage_a_0_action: |
        (a) Try DOI 10.1115/1.3250776; verify resolves to the right paper.
        (b) If accessible, extract Nu_stag and Nu(r/D) at r/D ∈ {0, 0.5, 1, 1.5, 2}
            from the published Table or Figure with explicit locator.
        (c) If h/D=2 row exists, use it. Otherwise pivot to h/D=6 and
            update whitelist.parameters.h_over_d to match.
        (d) Re mismatch: paper reports Re ≈ 23700; whitelist sets Re=10000.
            Stage A.0 MUST either (i) bump whitelist Re to 23700 OR
            (ii) document this gap as a known physics-fidelity risk
            in §physics_contract.note (V61-060 pattern).

    2_behnia_1998_axisymmetric_jet:
      authors: "Behnia, M., Parneix, S., Durbin, P.A."
      year: 1998
      title: "Prediction of heat transfer in an axisymmetric turbulent jet impinging on a flat plate"
      journal: "Int. J. Heat Mass Transfer 41(12), 1845-1855"
      doi: "10.1016/S0017-9310(97)00254-8"
      reason_promoted: |
        SECONDARY THERMAL ANCHOR (RANS-validation paper).
        Re ∈ {15000, 23000} per the v2 paper; uses k-ε-v2-f turbulence
        model and validates against Baughn 1989 + Yan 1991. Useful as
        a CROSS-CHECK because it provides explicit RANS-CFD vs
        experiment Nu(r/D) profiles, calibrating what "good agreement"
        actually looks like for our k-omega SST stack.
      stage_a_0_action: |
        Try if Baughn 1989 is paywalled or unavailable. Use Behnia 1998
        only if (a) it includes a Re=10000 row OR (b) the Behnia/Baughn
        comparison table justifies a CFD-to-CFD anchor (less honest;
        V61-060 explicitly avoided this kind of self-comparison).

    3_behnia_1999_unconfined_confined:
      authors: "Behnia, M., Parneix, S., Shabany, Y., Durbin, P.A."
      year: 1999
      title: "Numerical study of turbulent heat transfer in confined and unconfined impinging jets"
      journal: "Int. J. Heat Fluid Flow 20(1), 1-9"
      doi: "10.1016/S0142-727X(98)10040-1"
      reason_promoted: |
        TERTIARY ANCHOR — addresses §4 R-confinement (free-jet vs
        confined-jet) by reporting BOTH configurations.
      stage_a_0_action: Use only if R-confinement audit at §4 surfaces a confinement mismatch.

  hydrodynamic_support_only:
    cooper_1993:
      authors: "Cooper, D., Jackson, D.C., Launder, B.E., Liao, G.X."
      year: 1993
      title: "Impinging jet studies for turbulence model assessment — I. Flow-field experiments"
      journal: "Int. J. Heat Mass Transfer 36(10), 2675-2684"
      doi: "10.1016/S0017-9310(05)80204-2"
      reason_demoted: |
        v2 per Codex F1: Cooper 1993 PART I is HYDRODYNAMIC ONLY (mean
        velocity + Reynolds stresses). Heat transfer is in Part II (Cooper
        et al. 1993 companion paper, different DOI). v1 listed Cooper 1993
        as interchangeable with Baughn 1989 — that conflated flow-field
        and heat-transfer datasets. Cooper 1993 Part I is reusable for
        hydrodynamic SANITY_CHECK (e.g. axial velocity decay along the
        centerline) but does NOT supply Nu_stag.
      stage_a_0_action: |
        Optional — use as cross-check for the hydrodynamic field if a
        future v2 sub-batch adds a velocity-profile observable. Out of
        scope for the headline Nu_stag gate.

  closure_action_required: |
    Stage A.0 MUST attempt the THREE thermal_gold_anchor_priority_chain
    DOIs in order, RECORDING in §physics_contract.note:
      (i) which DOI was tried,
      (ii) whether it resolved to the expected paper,
      (iii) which Re row was used (with table/figure locator),
      (iv) any BC / Re / h-D mismatch that must be acknowledged in
           §physics_contract.note as a known fidelity-gap.
    PASS CRITERIA: at least ONE thermal anchor with explicit locator
    landed; whitelist DOI replaced; gold YAML §source/literature_doi
    updated; if BC mismatch present (constant-T vs uniform-q), it MUST
    appear in physics_contract.note (V61-060 acknowledgement pattern).

# ============================================================================
# §4 Risk register (pre-Stage-A, surfaced for Codex review)
# ============================================================================
risk_register:
  R1_re_mismatch:
    severity: HIGH
    description: |
      Whitelist Re=10000 is unusual for impinging-jet benchmarks. Cooper
      1993 ran Re=23000. Behnad 2013 may have multiple Re values. If the
      gold YAML's ref_value was correlated from Re=23000 data and applied
      blindly to Re=10000 simulation, deviation will be unbounded. Stage
      A.0 must confirm Re consistency between gold ref + whitelist task_spec.
    mitigation: |
      (a) Verify Cooper 1993 has a Re=10000 row, OR
      (b) Bump whitelist Re=10000 → 23000 to match the correlation, OR
      (c) Use a Re-agnostic Nu correlation (Schlichting Nu/Re^0.5 = const
          near stagnation) and document the assumption.
  R2_h_over_d_mismatch:
    severity: MED
    description: |
      Whitelist h/d=2 is a common stand-off. Cooper 1993 and Baughn/Shimizu
      1989 both used h/d=2 OR h/d=6; verify alignment. h/d=2 puts the
      stagnation in the potential core (Nu peaks); h/d=6 is post-core
      (different Nu(r) shape). Stage A.0 must confirm.
    mitigation: |
      Lock h/d to whatever the chosen citation uses; if no overlap, hold
      Stage A on a follow-up.
  R3_turbulence_model_choice:
    severity: MED
    description: |
      Whitelist sets `turbulence_model: k-omega SST`. For impinging jets
      this is reasonable (k-ε notoriously over-predicts Nu near stagnation
      due to round-jet stagnation anomaly). Adapter must actually emit
      k-omega SST, not silently fall back to k-ε. Verify at Stage A.
    mitigation: |
      Stage A.5 alias-parity test (V61-060 lesson) must include a
      turbulence-model-emitted-vs-declared check.
  R4_buoyantFoam_dispatch_overlap:
    severity: LOW
    description: |
      Adapter at src/foam_agent_adapter.py:676 hardcodes `solver_name =
      "buoyantFoam"` for IMPINGING_JET, overriding the whitelist's
      `simpleFoam` declaration. This is intentional (impinging jet needs
      thermal) but contradicts whitelist; CASE_ID_TO_SOLVER in
      src/auto_verifier/config.py:69 also hardcodes simpleFoam, creating
      a 2-source-of-truth ambiguity.
    mitigation: |
      Stage A clean-up: align both the whitelist and CASE_ID_TO_SOLVER to
      buoyantFoam, OR document the override path explicitly in the gold
      YAML §physics_contract.note.
  R5_alias_map_staleness_post_v61_060:
    severity: HIGH
    description: |
      RETRO-V61-060 addendum: alias-map staleness was the #1 post-R3
      defect. Any case_name change at Stage A.0 (e.g. citation suffix
      added) MUST atomically update both `_TASK_NAME_TO_CASE_ID_ALIASES`
      maps (src/foam_agent_adapter.py:247 + src/auto_verifier/config.py:30).
      A.0 + A.3 should be ONE commit.
    mitigation: |
      Pre-commit check: if intake §3 demands a case_name rename, the same
      commit MUST touch both alias maps. Codex pre-Stage-A review must
      enforce this.

  # v2 (per Codex F3-LOW): three risks already visible in the code that
  # were missed in v1.
  R6_unphysical_magnitude_hazard_flag_exists:
    severity: MED
    description: |
      `_extract_jet_nusselt` already emits a HAZARD flag
      `nusselt_number_unphysical_magnitude=True` when extracted Nu_stag
      falls outside [0, 500] (foam_agent_adapter.py:9717-9719). DEC-V61-042
      round 1 explicitly noted "previous code silently clamped Nu to
      [0, 500]" — a diverged solver could mask runaway gradients as
      benign 500 values. Stage E live run + Stage D UI MUST surface this
      flag (similar to V61-060's NON_TYPE_HARD_INVARIANT card pattern).
      If the flag fires post-Stage-E, that is a HARD-FAIL signal even
      if the headline Nu falls within tolerance.
    mitigation: |
      §7 acceptance criterion vi explicitly requires "hazard flag absent
      OR explicitly excused in DEC closeout" before headline-PASS verdict
      can land. (R2-LOW fix: pointer corrected v → vi after R6/R7/R8
      shifted §7 numbering.)
  R7_plate_bc_constant_temperature_vs_uniform_heat_flux:
    severity: HIGH
    description: |
      Adapter at foam_agent_adapter.py:6204 emits the plate as
      `type fixedValue; value uniform {T_plate};` — that is a
      CONSTANT-TEMPERATURE Dirichlet BC (T = const).
      Many literature impinging-jet correlations (Baughn & Shimizu 1989
      explicitly; Yan 1991; ERCOFTAC IJ benchmarks) use UNIFORM HEAT FLUX
      (q = const, Neumann ∂T/∂n = const) instead. The Nu-Re-Pr correlation
      coefficients differ between the two BC families: at the same Re,
      uniform-q yields a DIFFERENT Nu(r/D) profile than constant-T.
      If §3 lands Baughn 1989 as primary anchor, this BC mismatch is a
      direct fidelity-gap risk that may produce a 30-50% deviation
      independently of Re/h/D.
    mitigation: |
      Stage A.0 closure must EXPLICITLY note BC family in the gold YAML
      §physics_contract.note. Stage E acceptance widened to include
      "either headline within ±30% OR DEC closeout as
      METHODOLOGY_COMPLETE_PHYSICS_FIDELITY_GAP_DOCUMENTED with BC
      mismatch as primary cause" (V61-063/V61-066 honest-FAIL pattern).
      Optional Stage A sub-batch: add fixedGradient T plate BC variant
      to the adapter (~30 LOC, separate DEC).
      Acceptance pointer: §7 criterion vii (vii_bc_family_documented_in_gold_yaml).
  R8_pseudo_2d_slab_geometry_vs_true_axisymmetric:
    severity: MED
    description: |
      Adapter at foam_agent_adapter.py:5632-5687 emits a pseudo-2D slab
      with `front`/`back` faces as `empty` patches (Cartesian r-z slab,
      depth 0.1 m). This is NEITHER:
        (a) a true 3D axisymmetric mesh (cyclic AMI / wedge), NOR
        (b) a 2.5D wedge with `wedge` boundary type
      The OpenFOAM `empty` BC tells the solver to treat the third
      direction as 1 cell with no gradient — equivalent to a Cartesian
      2D slab, NOT an axisymmetric solve. Cooper-style correlations
      assume true axisymmetric flow (3D rotation about the axis); a
      Cartesian slab forces the radial direction to be a 1D line
      instead of a 2D r-θ surface, which DOUBLES the actual cross-
      sectional area sampled per unit r and changes the integrated
      Nu measurement by O(1).
    mitigation: |
      Stage A.0 closure must verify whether the slab approximation is
      tolerable: (a) if Nu is computed as a LOCAL gradient (the current
      extractor at line 9698 uses local |∂T/∂n| at each radial bin),
      slab vs axisymmetric does NOT affect the local value, so this is
      LOW IMPACT for nusselt_stagnation_at_r_d_zero; BUT
      (b) any INTEGRATED quantity (e.g. total heat transfer rate over
      the plate) WILL differ. §1 gates 1+2+3 are all LOCAL, so R8
      stays MED severity (not HIGH) — but Stage E DEC must mention
      the slab approximation as a known limitation.
      Acceptance pointer: §7 criterion viii (viii_pseudo_2d_slab_geometry_acknowledgement).

