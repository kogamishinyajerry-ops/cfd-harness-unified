# ============================================================================
# §0 Why this case is being re-iterated (pre-existing state honesty)
# ============================================================================
preexisting_state_honesty: |
  The current `knowledge/gold_standards/axisymmetric_impinging_jet.yaml` carries
  a self-confessed broken contract:

    contract_status: "INCOMPATIBLE_WITH_LITERATURE_DISGUISED_AS_COMPATIBLE
       — the observable is called nusselt_number but stores a cf_skin_friction
       value (0.0042). No solver change is required to PASS, and no solver
       change will make it agree with the literature Nu=25 either without a
       different thermal setup."

  The note: field still claims "simpleFoam isothermal run; cf_skin_friction
  extracted (Nu=0.0042 is Cf, not Nu)", but the adapter dispatch path was
  upgraded post-EX-1-005 (2026-04-18): `_generate_impinging_jet` now writes
  a buoyantFoam-path case (src/foam_agent_adapter.py:674-676), AND
  `_extract_jet_nusselt` (src/foam_agent_adapter.py:9613-9721) computes a
  TRUE wall-normal temperature gradient via the 3-point one-sided stencil
  (DEC-V61-042 fix), returning Nu_stagnation + Nu(r/D) profile + r-coords.

  In other words: the EXTRACTOR is correct, but the GOLD YAML still encodes
  the stale Cf=0.0042 sentinel from before DEC-V61-042 landed. The current
  "PASS" verdict is therefore meaningless self-comparison — the comparator
  matches a number against itself, not against literature physics.

  V61-071 will:
    1. Citation re-anchor the gold YAML to the actual Cooper et al. 1993
       impinging-jet measurement (NOT Cooper 1984 — see §3 Cooper-citation
       audit; the whitelist's "Cooper et al. 1984" label is itself suspect)
       OR a publicly-archived equivalent (Behnad et al. 2013 OR Baughn &
       Shimizu 1989, both publicly accessible per JFE-style archives).
    2. Promote the existing Nu(r/D) profile output to a Type II observable
       family (one HARD_GATED stagnation Nu + one HARD_GATED profile shape
       gate + ≥1 conservation invariant + ≥1 advisory).
    3. Verify that the buoyantFoam dispatch + wall-gradient stencil actually
       deliver Nu_stagnation in the Cooper-correlation band (likely needs
       a Re mismatch audit: whitelist sets Re=10000, but most published
       impinging-jet correlations use Re=23000 or higher).
    4. Document the Re/h-over-d/Pr mismatches honestly in the gold YAML
       §physics_contract.note like V61-060 did for the Pandey & Schumacher
       benchmark.

# ============================================================================
# §1 Classification (F5-M1 hard gate, §3b — NO mid-arc Type change allowed)
# ============================================================================
case_type: II  # v2 (per Codex F2): keep Type II — stations are ONE profile
               # family, NOT independent physics families. 1 PRIMARY SCALAR
               # + 2 PROFILE_QUALITATIVE_GATES + 1 PROVISIONAL_ADVISORY.
               # The monotonicity check is RELABELED from
               # NON_TYPE_HARD_INVARIANT to QUALITATIVE_GATE so the
               # profile_qualitative_gate_count = 2 cleanly (mirrors
               # V61-058's qualitative-gate accounting). A second distinct
               # shape gate (secondary_peak_presence_or_absence) replaces
               # the prior over-count of "the profile" as 2 separate gates.
case_type_rationale: |
  PRIMARY SCALAR GATE (1):
    1. nusselt_stagnation_at_r_d_zero — HEADLINE — Nu at the radial bin
       closest to r=0 (axisymmetric stagnation point), extracted by the
       existing `_extract_jet_nusselt` 3-point wall-normal stencil.
       Reference value pending §3 citation audit (will be either Baughn
       & Shimizu 1989 thermal anchor OR Behnia et al. 1998 RANS-validation
       value, NOT Cooper 1993 which is hydrodynamic-only).

  PROFILE/QUALITATIVE GATES (2):
    2. nusselt_profile_r_over_d — QUALITATIVE_GATE — Nu(r/D) shape match
       at 5+ radial stations (r/D ∈ {0, 0.5, 1.0, 1.5, 2.0}). Reuses the
       existing `nusselt_number_profile` + `nusselt_number_profile_r`
       adapter outputs. Profile-mode comparator: per-station tolerance
       25-30%. The SHAPE is the gate, not the per-point values. The
       DEC-V61-044 NACA Cp pattern is the reference implementation.

    3. secondary_peak_presence_or_absence — QUALITATIVE_GATE — the canonical
       impinging-jet Nu(r/D) profile at h/D ≈ 2 has a SECONDARY PEAK around
       r/D ≈ 2 caused by transition-to-turbulence in the wall jet (Cooper
       1993 + Baughn & Shimizu 1989 both report this for Re ≥ ~20000).
       At Re = 10000 the secondary peak may be absent or weak (transitional
       flow regime). The gate's PASS condition depends on §3 citation audit:
         - If gold anchor measures Re=10000 → gate = "secondary peak ABSENT"
           (boolean, no tolerance)
         - If gold anchor measures Re ≥ 20000 (mismatch case) → gate is
           DOWNGRADED to PROVISIONAL_ADVISORY in v3 with explicit
           §physics_contract.note acknowledgement
       This gate is DISTINCT from the profile-shape gate above: it tests
       a topological feature (number of local maxima ≥ 1.5 D outward),
       not the per-station magnitudes.

  PROVISIONAL_ADVISORY (NOT a physics gate):
    4. y_plus_first_cell_at_plate — PROVISIONAL — wall-resolution diagnostic
       at the impingement plate. Threshold band: y+ < 5 desired (low-Re
       wall-resolved); y+ < 30 acceptable (wall-function regime). Pure
       diagnostic, not enforced.

  RETIRED FROM v1 (per Codex F2):
    - nu_monotonic_decay_from_stagnation as NON_TYPE_HARD_INVARIANT was
      MIS-CLASSIFIED. The "should monotonically decay" claim is itself the
      content of gate #3 (secondary peak absent ⇔ no second local max),
      so v1 was double-counting the same physics. Folded into gate #3.
      The per-station shape-match in gate #2 already provides the only
      independent physics signal.

