# ============================================================================
# §7 Acceptance criteria (definition of done — F1-M2 two-tier close gate)
# ============================================================================
acceptance_criteria:
  i_codex_arc_complete: |
    Final Codex round returns APPROVE OR APPROVE_WITH_COMMENTS, OR
    CHANGES_REQUIRED with all findings closed verbatim per the 5-condition
    exception envelope (CLAUDE.md).
  ii_headline_validated_or_honestly_failed: |
    EITHER: live-run nusselt_stagnation_at_r_d_zero falls within ±30%
    (relative tolerance) of the gold ref_value resolved at A.0a — primary
    gate PASS; OR: it falls outside the band and the DEC documents the
    physics-fidelity gap explicitly with R7 BC-mismatch and/or R1 Re-mismatch
    cited as primary cause (V61-063 / V61-066 / V61-060 honest-FAIL pattern:
    METHODOLOGY_COMPLETE_PHYSICS_FIDELITY_GAP_DOCUMENTED).
  iii_profile_shape_validated_with_explicit_locators: |
    v2 per Codex F3: tighten "matches Cooper-style" to verifiable form:
    Nu(r/D) profile MUST be measured at exactly r/D ∈ {0.0, 0.5, 1.0, 1.5, 2.0}
    using the existing `_extract_jet_nusselt` `nusselt_number_profile_r`
    output. PASS:
      - per-station relative tolerance ≤30% vs gold values resolved at
        A.0a from explicit Table/Figure locator (NOT a generic "Cooper-style"
        reference)
      - tolerance.mode = relative for all 5 stations
      - if A.0a anchor lacks one or more stations, explicitly mark them
        ADVISORY with a per-station gap reason in the gold YAML.
  iv_secondary_peak_qualitative_gate: |
    v2 per Codex F2: gate #3 (secondary_peak_presence_or_absence) PASS:
      - if Re ≤ 15000: secondary peak ABSENT (Nu(r/D) is monotonically
        non-increasing for r/D ∈ [0, 2]) — boolean gate, no tolerance
      - if Re ≥ 20000: secondary peak PRESENT at r/D ∈ [1.5, 2.5] (one
        local maximum after the stagnation peak) — boolean gate
      - if 15000 < Re < 20000: gate is ADVISORY (transitional regime)
  v_alias_map_atomic_with_case_name_rename: |
    Per RETRO-V61-060 addendum: any A.0b case_name rename MUST be in the
    same commit as both `_TASK_NAME_TO_CASE_ID_ALIASES` map updates
    (foam_agent_adapter.py:247 + auto_verifier/config.py:30).
  vi_unphysical_magnitude_hazard_flag_absent: |
    v2 per Codex F3: Stage E live run must produce
    `nusselt_number_unphysical_magnitude=False` (or unset). If the flag
    fires, the DEC closeout MUST explicitly excuse it with a root-cause
    explanation (e.g. "diverged solver despite headline within tolerance"
    is NOT an acceptable PASS regardless of comparator verdict).
  vii_bc_family_documented_in_gold_yaml: |
    v2 per Codex F3 + R7: the chosen gold ref's wall BC family
    (constant-T vs uniform-q) MUST appear in
    knowledge/gold_standards/axisymmetric_impinging_jet.yaml
    §physics_contract.note with explicit acknowledgement of mismatch
    against the adapter's current `fixedValue T_plate` BC.
  viii_pseudo_2d_slab_geometry_acknowledgement: |
    v2 per Codex F3 + R8: the gold YAML §physics_contract.note MUST
    acknowledge that the adapter emits a pseudo-2D Cartesian r-z slab
    with `empty` patches (not a true 3D axisymmetric or wedge mesh).
    The DEC closeout MUST state whether this matters for the chosen
    observables (the current §1 gates are all LOCAL gradients, so the
    impact is expected to be LOW; future integrated-quantity DECs would
    need a different mesh topology).

# ============================================================================
# §8 Out of scope (will not be addressed in this DEC)
# ============================================================================
out_of_scope:
  - Cross-jet-array configurations (single-jet-only)
  - Compressible jet effects (Ma < 0.3 assumed)
  - Confined-jet vs free-jet variants (free-jet only per existing whitelist
    geometry h_over_d=2)
  - Heat-transfer-coefficient measurement at the nozzle exit (only plate
    Nu is in scope)
  - Multi-Re sweep (single Re=10000 OR Re=23000 after §3 audit; no profile
    over Re — that would be a follow-up DEC)
