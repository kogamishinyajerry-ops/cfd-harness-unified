# ============================================================================
# Classification (F5-M1 hard gate, §3b)
# ============================================================================
case_type: I
case_type_rationale: |
  Four scalar gates declared in knowledge/gold_standards/circular_cylinder_wake.yaml:
   1. strouhal_number (St)        — HEADLINE GATE — Williamson 1996 St=0.164 at Re=100
   2. cd_mean                     — 1.33 at Re=100 (shares forceCoeffs windowing with St)
   3. cl_rms                      — 0.048 at Re=100 (shares forceCoeffs windowing with St)
   4. u_mean_centerline @ 4 x/D   — INDEPENDENT from forceCoeffs path (sampleDict-based)

  Codex plan-review clarification: St/Cd/Cl share implementation surface
  (forceCoeffs time-history FFT), so they are NOT independent implementation
  gates, but they ARE independent physical gates. u_mean_centerline is a
  truly independent fourth gate (sampleDict probe, not forceCoeffs).

  Type I requires ≥3 independent scalar gates — satisfied. St remains the
  HEADLINE gate (per Williamson §2); the others are load-bearing cross-checks,
  not ornamental.
primary_gate_count: 4
case_type_hard_gate_signed: true  # per §3b, no mid-arc Type change allowed
headline_gate: strouhal_number

# ============================================================================
# Reference papers
# ============================================================================
reference_paper:
  primary:
    citation: "Williamson, C.H.K. (1996). Vortex dynamics in the cylinder wake. Annu. Rev. Fluid Mech. 28, 477-539"
    doi: "10.1146/annurev.fl.28.010196.002421"
    providing: [St, Cd_mean, Cl_rms, u_mean_centerline_x_over_D]
  secondary:
    - citation: "Park, Kwon & Choi (1998). Numerical solutions of flow past a circular cylinder. KSME Int J. 12, 1200"
      providing: [cross_check_cd_cl]
    - citation: "Henderson (1995). Details of the drag curve near the onset of vortex shedding. Phys Fluids 7, 2102"
      providing: [cross_check_strouhal_re_range]
    - citation: "Zdravkovich (1997). Flow Around Circular Cylinders, Vol 1. Oxford UP — Ch.6 blockage corrections"
      providing: [blockage_correction_context_for_domain_hazard]

# ============================================================================
# Observable scope (F1-M1 § hardens against breadth drift / scope creep)
# ============================================================================
observable_scope:
  in_scope:
    - quantity: strouhal_number
      tolerance_pct: 5.0
      extraction_method: "FFT on Cl(t) from forceCoeffs FO · existing in src.cylinder_strouhal_fft (DEC-V61-041)"
      status_pre_v61_053: "EXTRACTOR_EXISTS · emits via key_quantities, but not surfaced as measurement.value"
      role: HEADLINE_GATE
    - quantity: cd_mean
      tolerance_pct: 5.0
      extraction_method: "time-averaged Cd(t) over stationary window from forceCoeffs FO"
      status_pre_v61_053: "EXTRACTOR_EXISTS · same path as strouhal_number"
      role: CROSS_CHECK
    - quantity: cl_rms
      tolerance_pct: 5.0
      extraction_method: "RMS of Cl(t) over stationary window (same window as St FFT)"
      status_pre_v61_053: "EXTRACTOR_EXISTS · same path"
      role: CROSS_CHECK
    - quantity: u_mean_centerline
      tolerance_pct: 5.0
      extraction_method: "sampleDict probe at (x/D, 0, 0) for x/D ∈ {1, 2, 3, 5}, time-averaged over stationary window"
      status_pre_v61_053: "NOT_IMPLEMENTED · requires new sampleDict emit + extractor"
      role: INDEPENDENT_CROSS_CHECK
      semantics_OPEN_QUESTION: |
        Gold values at x/D ∈ {1,2,3,5} are {0.83, 0.64, 0.55, 0.35}. These are
        NOT physically consistent with raw u_mean/U_inf (which at x/D=1 in the
        near-wake recirculation is small/negative and INCREASES with x/D).
        They ARE consistent with wake-deficit = (U_inf - u_mean)/U_inf
        (decreasing with x/D as wake recovers). Gold YAML keys say
        "u_Uinf: 0.83" which is ambiguous — literal reading says raw, value
        profile says deficit. Batch B2 MUST resolve this by re-checking
        Williamson 1996 Fig.19 / wherever the 4 points were sourced, and
        either (a) rename gold keys to "deficit" and invert, or (b) keep
        "u_Uinf" name and confirm raw values (likely wrong numbers, need
        re-sourcing). NOT resolving pre-Stage-A because it requires Williamson
        1996 PDF access.

  explicitly_out_of_scope:
    - item: "3D span-wise instability / oblique shedding"
      reason: "Williamson 1996 §3 — only relevant at Re > 180; whitelist pins Re=100 in laminar regime; adapter emits 1-cell z with empty front/back (verified)"
    - item: "Blockage correction retroactive to gold values"
      reason: "Williamson 1996 anchors are unconfined; our 20% domain blockage is a RISK (see risk flags) that Batch A must decide: shrink cylinder (unchanged adapter) or grow domain (adapter rewrite). NOT a Re-sweep / blockage-parameter study."
    - item: "Mesh refinement study (GCI)"
      reason: "40k-cell fixture is whitelist canonical; Phase 5 GCI protocol is a separate DEC"
    - item: "Inlet turbulence intensity sweep"
      reason: "laminar regime; not a physical driver at Re=100"
    - item: "Re range sweep (Re 40-200 transition curve)"
      reason: "teaching figure (flowFields.ts strouhal_curve.png) already shows this analytically; not a solver gate"
    - item: "Base pressure coefficient / separation angle / recirculation length"
      reason: "Codex plan-review explicit: do NOT add as additional in-scope observables; belong to a future DEC if ever wanted"

# ============================================================================
# Risk flags (F1-M1 requires ≥1 subjective risk annotation)
# ============================================================================
risk_flags:
  - flag: domain_blockage_mismatch
    severity: high
    codex_flagged: true
    detail: |
      Adapter `_generate_body_in_channel` (src/foam_agent_adapter.py:4462-4467)
      uses L_inlet=2D, L_outlet=8D, H=2.5D per side → blockage = D / (2·2.5D)
      = 20%. Williamson 1996 anchors assume UNCONFINED flow. 20% blockage is
      known to bias Cd HIGH (+8-12% typical, Zdravkovich Ch.6) and shift St
      by +2-5%. Likely to trigger Codex round 1 CHANGES_REQUIRED on Cd/St
      tolerance if not addressed.
    decision_required_before_batch_a: |
      Pick one:
      (a) Accept bias: document in physics_contract, widen tolerance to 10%
          on Cd/St for this fixture.
      (b) Grow domain: adapter rewrite to L_up=10D, L_down=20D, H=6D → ~8%
          blockage. Larger mesh (~100k cells vs 40k).
      (c) Apply analytical correction: Maskell or Mercker for bluff-body
          blockage. Non-trivial, not standard in pimpleFoam fixtures.
      RECOMMENDATION: (b) — cleanest; matches Williamson context. But Codex
      round 1 will still see whether 100k cells stays within runtime budget.
    mitigation_pre: "Decision committed as part of Batch A gold-YAML work (precondition entry documenting domain extents + chosen regime)"

  - flag: laminar_contract_vs_RAS_default
    severity: high
    codex_flagged: true
    detail: |
      Whitelist (knowledge/whitelist.yaml:83) declares `turbulence_model:
      laminar` per DEC-V61-005 A-class correction. Adapter dispatch at
      src/foam_agent_adapter.py:515-518 calls `_turbulence_model_for_solver`
      which returns `kOmegaSST` for BODY_IN_CHANNEL (line 668). The whitelist
      field is SILENTLY IGNORED.

      Impact: whitelist documents laminar; audit fixture actually runs RAS.
      kOmegaSST over-dissipates the wake at Re=100 → under-predicts St by
      10-20% and under-predicts Cl_rms by 30-50% (classic over-damped wake
      signature). Likely a hidden contributor to the current
      `measurement.value = 4.93502e-06 U_max_approx` fallback fixture: the
      FFT extractor may be legitimately failing on a steady-by-damping wake.
    decision_required_before_batch_b: |
      Pick one:
      (a) Honor whitelist: thread `task_spec.turbulence_model` through
          `_turbulence_model_for_solver` so the whitelist override wins.
          Generate cylinder with `laminar` solver. Likely recovers St.
      (b) Update whitelist to `kOmegaSST`: documents what's actually running.
          Widens all 4 tolerances; may need gold-value audit.
      RECOMMENDATION: (a) — honors DEC-V61-005 A-class decision. But
      pimpleFoam + laminar at Re=100 is the physics everyone teaches.
    mitigation_pre: "Decision committed in Batch B1 (adapter work); any laminar solver fixture needs fvSchemes adjustment (no k/omega fields)"

  - flag: u_mean_centerline_deficit_semantics
    severity: high
    codex_flagged: true
    detail: "See observable_scope.in_scope[u_mean_centerline].semantics_OPEN_QUESTION. Values 0.83→0.35 are inconsistent with raw u_mean/U_inf but consistent with wake-deficit. Either gold keys mislabeled, or gold values wrong, or both. Affects extractor implementation, Compare-tab card label, and figure captions."
    mitigation_pre: "Re-check Williamson 1996 Fig.19 in Batch B2 before writing extractor. If deficit, rename key u_Uinf → u_deficit AND update all downstream code. If raw, the current gold numbers are simply wrong and Batch B2 must re-source them."

  - flag: forceCoeffs_axis_convention
    severity: medium
    codex_flagged: true
    detail: "Current generator writes explicit `(drag x, lift y, pitch z)` axes which IS correct for this mesh (freestream in +x, lift perpendicular in +y, 2D normal in z). But OpenFOAM defaults are different and regressions here are silent. Any adapter edit in Batch B1 that touches forceCoeffs block must preserve these axes."
    mitigation_pre: "Add unit-test asserting generated forceCoeffs1 dict contains `dragDir (1 0 0); liftDir (0 1 0); pitchAxis (0 0 1);` explicitly. Add to Batch B1."

  - flag: sampleDict_interpolation_and_scaling
    severity: medium
    codex_flagged: true
    detail: "New u_mean_centerline extractor needs sampleDict with explicit (interpolationScheme=cellPoint, setFormat=raw, field=U). Coordinates MUST be D-scaled (x = (x/D) · D). A coordinate-system bug here → sample point inside cylinder body → garbage or NaN. Compounds with `domain_blockage_mismatch` if L_outlet changes in Batch A."
    mitigation_pre: "Batch B1 generates sampleDict block with explicit D-scaling; Batch B2 extractor reads set files, asserts non-zero U at all 4 stations before time-averaging. Unit-test on mocked sample output."

  - flag: stale_contract_status
    severity: medium                         # raised from LOW per Codex plan-review (preflight hard-fails on hazard)
    codex_flagged: true
    detail: |
      knowledge/gold_standards/circular_cylinder_wake.yaml declares
      `contract_status: COMPATIBLE_WITH_SILENT_PASS_HAZARD` with evidence
      citing the canonical_st=0.165 hardcode. That hardcode was retired in
      DEC-V61-041 (src/cylinder_strouhal_fft.py + adapter). The gold YAML
      is documentation debt. `knowledge/gold_standards/cylinder_crossflow.yaml`
      is a LEGACY ALIAS DUPLICATE of the same case with the same stale
      status — any gold-scanner hitting both will double-report.
      scripts/preflight_case_visual.py hard-fails on "hazard" substring match.
    mitigation_pre: "Batch A must: (a) flip circular_cylinder_wake.yaml to SATISFIED with precondition refresh; (b) decide cylinder_crossflow.yaml fate (delete, alias-redirect, or same-flip); (c) audit for other gold-scanners."

  - flag: ldc_style_breadth_drift
    severity: medium
    detail: "V61-053 is a Type I DEC. LDC V61-050 is the precedent — 4 batches, 5 Codex rounds, 8 MED findings. Breadth-drift risk: tempting to add cp_rms_surface or near-wake vorticity scalar → scope creep. Codex plan-review explicitly listed base pressure / separation angle / recirculation length as NOT in-scope."
    mitigation_pre: "any mid-arc observable addition MUST open a new DEC per §3b hard gate; enumerate in explicitly_out_of_scope (done)"

  - flag: u_mean_centerline_new_extractor
    severity: high
    detail: "4th observable has no extractor at all. Most novel code in this DEC. LDC ψ extractor (V61-050) took 3 rounds to stabilize; realistic expectation same here."
    mitigation_pre: "Unit-test extractor on mocked sampleDict output before integration (Batch B2 opens with test scaffolding)"

  - flag: parameter_envelope_precision_ceiling
    severity: medium
    codex_flagged: false
    retroactive: true
    retroactive_authority: "Opus 4.7 P1-arc verdict 2026-04-25 (RETRO-V61-004 addendum · candidate C adjudication)"
    triggered: true
    triggered_by: "endTime=10s (CYLINDER_ENDTIME_S constant in foam_agent_adapter.py)"
    expected_deviation_envelope: "strouhal_number: 0.13–0.14 observed vs gold 0.165 (ΔSt ~16–20%); FFT Δf-limited at 10s sampling window; attempt-6 St=0.138, attempt-7 St=0.1378 — reproducible, not a new defect"
    unblock_path: "Follow-up DEC (V61-058) bumps CYLINDER_ENDTIME_S 10s → 60s (~16h wall overnight) for 3–5% St precision; re-runs as attempt-8; tightens case_profile tolerance_policy.strouhal_number back to 5–10%. Pure parameter bump + re-run; NO code path change. BLOCKED until V61-057 lands (MetricsRegistry wired into task_runner via load_tolerance_policy). V61-057 itself blocked until W2 G-9 + CFDJerry G-1 + DEC-POLICY-VCP-001 close."
    detail: |
      Attempt-6/7 live runs reproduced St=0.138/0.1378 within 0.14% of each
      other. Solver ran successfully; all 4 gates extract (post-fdfa98a fix).
      Deviation is a mechanically-predictable consequence of the pre-declared
      10s endTime budget (DEC-V61-040 R2: ≥8 shedding periods for FFT
      confidence; 10s gives ~2 periods at St=0.165 · D/U=1.0 — below threshold,
      so SpectralMetric would demote PASS→WARN under P1-T1c once wired).
    mitigation_pre: "(retroactive) Pre-declare this as precision ceiling, not defect. Surface via SpectralMetric WARN + case_profile tolerance_policy.strouhal_number=0.25. RETRO-V61-004 candidate C adjudicated as Opus-verdict ADD (medium, not high — no code path change required)."
    mitigation_post: "V61-058 (endTime bump + re-run) — serial after V61-057 unblock."

