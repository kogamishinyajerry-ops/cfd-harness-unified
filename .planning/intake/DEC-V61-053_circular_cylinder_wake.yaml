# ============================================================================
# Budget and halt criteria (F6-M1, §1b)
# ============================================================================
codex_budget_rounds: 4                      # soft target raised 3 → 4 per Codex review (Type I + multi-batch split)
round_4_health_check_required: true
round_6_force_abandon_hard_gate: true

estimated_pass_rate_round1: 0.30            # Codex held at 0.30 (not raising to 0.35 until B split + plan-edits land)
pass_rate_rationale: |
  Held at 0.30 per Codex plan-review. The 7 plan edits resolve intake-level
  defects but don't reduce implementation uncertainty:
   - u_mean_centerline semantics (raw vs deficit) is still OPEN
   - domain_blockage_mismatch decision pending (options a/b/c each have
     different round-1 failure modes)
   - laminar_vs_RAS decision pending (could invalidate existing forceCoeffs
     fixtures if we flip to laminar)
   - 4 separate extractor paths + multi-dim UI = 4× the BFS round-1
     surface area
  0.35 is defensible only AFTER Batch A lands with decisions A-a/b/c and
  B-a/b signed off. 0.25 is where we'd be if the u_mean_centerline semantics
  doesn't resolve cleanly.

