# ============================================================================
# §1 Background
# ============================================================================
background: |
  BFS is whitelist case 3 of 10. The current state is asymmetric vs the V61-066
  duct_flow predecessor:

    - Gold YAML ALREADY exists in schema_version=2 form at
      `knowledge/gold_standards/backward_facing_step_steady.yaml` with 4
      observables defined: reattachment_length, cd_mean, pressure_recovery,
      velocity_profile_reattachment. (DEC-V61-046 + DEC-V61-052 work.)
    - But the schema_v2 YAML does NOT carry Type II metadata
      (gate_status / family / extractor / role / source_table) — it predates
      the V61-058 Type II convention.
    - The adapter extractor `_extract_bfs_reattachment` (foam_agent_adapter.py:
      9066+) emits ONLY `reattachment_length` from wallShearStress tau_x sign-
      change. Three of the four gold observables (cd_mean, pressure_recovery,
      velocity_profile_reattachment) have NO extractor wiring.
    - The legacy multi-doc `backward_facing_step.yaml` is still used by some
      reporting paths (phase5_audit_run, contract_dashboard, render_case_report).
      OUT OF SCOPE for V61-067 — the comparator's canonical path is already on
      the schema_v2 file (`src/auto_verifier/config.py:18,32,49,62`).

  V61-067 closes the asymmetry: add Type II metadata to all 4 observables in
  the schema_v2 YAML, add 3 missing extractors (cd_mean + pressure_recovery
  + velocity_profile_reattachment), wire them in the adapter, alias-parity
  test, Codex R1, Stage B live OpenFOAM.

# ============================================================================
# §2 Acceptance signal
# ============================================================================
