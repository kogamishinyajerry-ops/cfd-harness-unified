    surface: src/bfs_extractors.py (NEW), src/foam_agent_adapter.py BFS dispatch
    constraint: |
      Existing _extract_bfs_reattachment stays untouched. New extractors
      slotted ALONGSIDE the existing call. The dispatch site already filters
      on `geom == GeometryType.BACKWARD_FACING_STEP` (foam_agent_adapter.py:
      8281). Add new method calls in the same elif block, fold each result
      into key_quantities, fold each error into a `bfs_*_error` audit key.

  - plane: Evaluation
    surface: src/auto_verifier/gold_standard_comparator.py (no changes)
    constraint: |
      Comparator already handles list-of-dicts ref_value (cylinder centerline
      profile pattern, DHC u_max profile pattern) and dict ref_value
      (V61-066 already established for nested observables). pressure_recovery
      uses dict-ref shape; velocity_profile_reattachment uses list-of-dicts
      shape. Both match existing comparator branches.

  - plane: Knowledge
    surface: knowledge/gold_standards/backward_facing_step_steady.yaml
    constraint: |
      schema_version stays at 2. legacy_case_id alias stays at
      "backward_facing_step". Type II metadata added IN-PLACE to the
      observables[] entries — no rename, no ref_value change, no
      tolerance change.

  - plane: Observation
    surface: reports/phase5_audit/, reports/codex_tool_reports/
    constraint: |
      No new reporting infrastructure required. Live run logs at
      reports/phase5_audit/dec_v61_067_stage_b_live_run_v{1,2,...}.log

