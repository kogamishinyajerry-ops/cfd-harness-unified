# ============================================================================
# §7 Self-pass-rate
# ============================================================================
self_estimated_pass_rate: 0.65
self_estimated_pass_rate_rationale: |
  Higher than V61-066 pre-R1 estimate (0.55) because:
    - The schema_v2 gold YAML already exists; no new file creation needed.
    - reattachment_length extractor already works (DEC-V61-052 stable).
    - The Type II metadata addition is mechanical.
    - V61-066 R1 lessons learned: dy-weighting issues don't apply here
      (BFS uses tau_x sign-change, not bulk-velocity averaging).

  Risks that hold the estimate below 0.80:
    - 3 NEW extractors mean 3 new methodology surfaces → at least one
      likely to surface a Codex finding on input validation or audit-key
      visibility.
    - cd_mean integration over the step face might surface a Cd-sign-
      convention issue (reverse flow region contributes pos vs neg to
      the integral).
    - velocity_profile_reattachment routes through the dict-list-shape
      comparator branch which may surface alias-key issues.

  Per V61-066 lesson: Codex's R1 recalibration target is more accurate
  than self-estimate. Will defer to Codex's R1 number for R2 estimate.

# ============================================================================
# §8 Risk flags
# ============================================================================
risk_flags:
  - id: cd_mean_sign_convention
    severity: MEDIUM
    description: |
      Integrating tau_x over the step face for Cd_mean is sensitive to
      the OpenFOAM wallShearStress sign convention (pos = fluid moves
      forward on a bottom floor, neg = reverse flow). Wrong sign on
      EITHER the step face or the recirculation zone will give Cd values
      off by 2× or sign-flipped. Mitigation: borrow the sign-convention
      reasoning from `_extract_bfs_reattachment` (foam_agent_adapter.py:
      8332-8354 — explicit sign documentation).

  - id: velocity_profile_dict_shape_alias
    severity: LOW-MEDIUM
    description: |
      Gold YAML uses list-of-dicts ref_value with keys {x_H, y_H, u_Ubulk}.
      Adapter must emit the SAME dict structure (not separate scalars,
      not a flat list). V61-058 NACA airfoil + V61-063 flat plate already
      established the pattern; cross-check during alias-parity test.

  - id: kOmegaSST_wall_function_extraction
    severity: HIGH-INHERITED-V61-066
    description: |
      V61-066 post-R3 defect #2 — cell-centre (ν+ν_t)·du/dy doesn't work
      with k-ε / k-ω SST wall functions. BFS uses kOmegaSST default per
      DEC-V61-052 round 2c. NEW extractors that require wall-shear
      derivatives MUST use the wallShearStress field (already staged) or
      turbulence-model-aware formulas, NOT cell-centre du/dy. Mitigation:
      cd_mean uses the wallShearStress field directly (matches reattachment
      extractor's path).

  - id: x_tol_aliasing_duplicate_columns
    severity: LOW-INHERITED-V61-066
    description: |
      V61-066 post-R3 defect #1 — x_tol = 0.6·dx caught duplicate columns
      when x_target sat between cell centres. velocity_profile extractor
      MUST snap to single nearest unique x column (mirror V61-066 fix
      cb1a9b9). Extractor unit tests should include a non-uniform x grid
      synthetic to exercise this.

  - id: executable_smoke_test
    severity: STANDARD
    description: |
      Per RETRO-V61-053, every Type II Stage A SHALL be followed by an
      executable smoke test (Stage B live OpenFOAM run). V61-067 is no
      exception. Live run on dec-v61-067-bfs branch using the existing
      V61-052 7360-cell mesh.

  - id: solver_stability_on_novel_geometry
    severity: STANDARD
    description: |
      Per RETRO-V61-053. BFS is NOT novel geometry (DEC-V61-052 stabilized
      the 3-block mesh + kOmegaSST + Spalding wall function), so this
      flag is RESOLVED-INHERITED. Stage B should converge on the existing
      V61-052 schedule (1500 iters, ~38s on Docker).

# ============================================================================
# Stage B acceptance
# ============================================================================
stage_b_acceptance: |
  - Live OpenFOAM run produces solver_success=True (V61-052 baseline)
  - reattachment_length within 10% tolerance (back-compat anchor, was
    PASS at Xr/H=5.647 in V61-052 round 2d)
  - At least 1 of {pressure_recovery, velocity_profile_reattachment}
    HARD_GATED siblings within tolerance
  - cd_mean reported (PROVISIONAL_ADVISORY, not counted in pass-fraction)
  - Audit fixture regenerated; bfs_extractor_path stamped
  - Per V61-066 R3 precedent, FAIL_PHYSICS_BORDERLINE acceptable IF the
    methodology is sound but a kOmegaSST + 7360-cell mesh limitation
    causes one HARD_GATED to drift outside tolerance — document and
    queue follow-up DEC.
