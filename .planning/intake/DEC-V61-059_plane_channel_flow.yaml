# ============================================================================
# §6 Self-estimated pass rate (F1-M1 honesty clause)
# ============================================================================
estimated_pass_rate_round1: 0.40
estimated_pass_rate_rationale: |
  Honest 0.40. Drivers (in expected-finding order):
    - u_plus_unit_canonicalization (HIGH, ~30% Codex-finding hit) — new G2
      gate is defense-in-depth code on the Evaluation plane. Codex
      historically pessimistic on new gate definitions (DEC-036b
      Codex_independent_pass_rate=0.42 vs claude-estimated 0.60). Likely
      surface: threshold calibration (what counts as "within canonical
      band"?), tolerance interaction with existing tolerance_pct on
      profile gate, test coverage gaps (laminar-shortcut MUST fire,
      RANS-honest MUST NOT fire on near-canonical values).
    - turbulence_model_emit_vs_whitelist_mismatch (HIGH, ~25%
      Codex-finding hit) — adapter dispatch + whitelist + gold YAML
      three-way coordination. Stage A.4 has multiple coupled changes
      (4 files: foam_agent_adapter.py + whitelist.yaml +
      fully_developed_plane_channel_flow.yaml + tests). Plus risk of
      breaking the existing icoFoam path used by other tests.
    - yplus_extraction_first_cell_dependency (HIGH, ~20% Codex-finding hit)
      — mesh grading details on RETRO-V61-053 territory. Likely surface:
      grading expression syntax in blockMeshDict, dy_wall numerical
      assertion phrasing, smoke-check grep regex.
    - executable_smoke_test (HIGH but RETRO-mandated, ~10%
      Codex-finding hit) — actually running the live OpenFOAM Docker
      smoke typically uncovers PCG+DIC fallback need or
      first-time-step divergence. Pre-emptive fallback prep should
      catch this.
    - reynolds_stress_dns_alignment / numerical_noise_snr (MED, ~10%
      combined hit) — tolerance_pct=8 calibration may need adjustment;
      SNR reporting surface may need to extend to all 4 gates not just
      profile.
  Honest 0.40 means I expect CHANGES_REQUIRED at round 1 with 2-3 HIGH
  + 1-2 MED findings; clean APPROVE_WITH_COMMENTS at round 3 (matching
  V61-053 R3 clean precedent and V61-057 expected R3 close target).
  Per RETRO-V61-001: ≤0.70 → pre-merge Codex review mandatory.

