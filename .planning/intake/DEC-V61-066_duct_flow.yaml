  reason: |
    Methodology stack inherited verbatim from V61-063 (A.1-A.5 pattern).
    Pre-Stage-A review optional (intake §3 gate set is well-justified
    pre-emptively). R1 reviews A.1-A.4 + Stage B; R2 confirms fixes;
    R3 reserve for Stage B disposition (post-R3 RETRO-V61-053 protocol
    if a structural defect surfaces — analogous to V61-063 A.6/A.7).
