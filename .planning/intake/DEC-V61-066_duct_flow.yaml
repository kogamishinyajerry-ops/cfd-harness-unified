    If Stage B fails by >20% on friction_factor, halt and investigate
    whether the turbulence_model_canonicalization_inheritance risk
    has elevated to BLOCKING. That would mean kOmegaSST vs kEpsilon
    differs more than the Jones 1976 ±10% band allows, escalating to
    the separate canonicalization DEC.

