# ============================================================================
# §6 Risk register
# ============================================================================
risk_flags:
  - id: turbulence_model_canonicalization_inheritance
    severity: HIGH
    description: |
      Whitelist `turbulence_model: k-epsilon` (with hyphen) doesn't
      match the canonical `kEpsilon` spelling. `_load_whitelist_turbulence_model`
      returns "k-epsilon" but the dispatch guard
      `if whitelist_turb in ("laminar", "kOmegaSST", "kEpsilon")`
      fails, falling through to the Re-based heuristic which returns
      kOmegaSST. Net effect: case-gen runs kOmegaSST not kEpsilon.
      DOES NOT BLOCK V61-066 because the friction_factor extraction
      is turbulence-model-agnostic on the wall layer; but Stage B
      verdict tolerance budget tightens because kOmegaSST + log-law
      residual is on average 5-10% wider than kEpsilon's
      (Wilcox 2008).
    mitigation: |
      Document the inheritance and accept the tighter Stage B budget.
      If Stage B fails the log_law gate by 10-15%, escalate to a
      separate methodology DEC for turbulence-model canonicalization
      (whitelist normalization + dispatch). Do NOT scope-creep.

  - id: extractor_wall_face_aggregation_method
    severity: MED
    description: |
      For a square duct with 4 walls, τ_w is direction-dependent
      (top/bottom vs left/right are equivalent by symmetry, but the
      magnitudes still need consistent extraction). If the extractor
      averages |τ_w| over arbitrary cell faces it will pick up
      side-wall contributions that aren't on the streamwise gradient
      path, biasing f high.
    mitigation: |
      A.1 must use the wall-shear stress projected onto the
      streamwise direction (τ_w · ê_x), not magnitude. Validate via
      a unit test with synthetic uniform U_bulk and known τ_w
      per-wall.

  - id: log_law_band_selection_sensitivity
    severity: MED
    description: |
      The log-law residual is sensitive to the (y+_min, y+_max)
      band selection. Too low a y+_min hits the buffer-layer
      transition; too high a y+_max hits the wake region.
      Standard band [30, 200] requires u_tau to be known a priori
      (chicken-and-egg with the friction_velocity_u_tau gate).
    mitigation: |
      A.1 implements a 2-pass extraction: pass 1 estimates u_tau
      from the wall-cell gradient (same as friction_factor); pass 2
      uses that u_tau to convert the y-profile to (y+, u+) and
      apply the log-law fit on the [30, 200] band. Document the
      circular dependency in the docstring.

  - id: u_max_centroid_mesh_alignment
    severity: LOW
    description: |
      Cell centroids do not exactly land on (y=0, z=0) unless the
      mesh has odd-numbered ncy/ncz. For even-numbered meshes,
      u_max must be interpolated from the 4 nearest cells.
    mitigation: |
      A.1 uses bilinear interpolation if no cell is within
      max(0.5·dy, 1e-3) of the centroid. Document expectation.

  - id: stage_b_runtime_budget
    severity: LOW
    description: |
      simpleFoam kOmegaSST steady at Re=50000 on existing duct mesh
      converges in 200-500 iterations. Estimated 3-5 min wall.
    mitigation: |
      Existing controlDict caps ensure bounded runtime.

