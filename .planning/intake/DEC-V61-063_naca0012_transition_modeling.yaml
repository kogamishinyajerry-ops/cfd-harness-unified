# §6 Risk flags (incorporates RETRO-V61-062 v2.1 new flags)
risk_flags:
  - id: solver_stability_on_novel_geometry
    note: "OPEN from V61-053/V61-058. New turbulence model = new convergence behavior. kOmegaSSTLM has stiffer ReThetat equation than kOmegaSST."
    mitigation: "URF guardrails: gammaInt 0.7, ReThetat 0.7 (default OF tutorial T3A); fall back to 0.5 each if divergence; endTime budget +50% if needed."
  - id: executable_smoke_test
    note: "OPEN from V61-061+V61-062. Live-run driver cloned from V61-061; same Docker container path."
  - id: tu_inf_initialization_sensitivity  # NEW for V61-063
    note: "Langtry-Menter ReThetat empirical formula has different branches at Tu=1.3%. NACA0012 LTPT Tu≈0.18% → low-Tu branch (ReThetat = 1173.51 - 589.428·Tu + 0.2196/Tu²). Tu_inf bump may shift transition onset."
    mitigation: "Pre-pin Tu_inf=0.0018 (0.18%) per Ladson 1988 LTPT facility characterization. If transition not detected (gammaInt stays ≈1 throughout BL), fall back to default tutorial Tu=3.3% to verify model-stack health."
  - id: gammaInt_rethetat_field_initialization  # NEW for V61-063
    note: "Field BCs at the aerofoil patch (zeroGradient per OF tutorial T3A) and freestream (fixedValue inletOutlet)."
    mitigation: "Pin to T3A tutorial pattern verbatim. Aerofoil noSlip patch gets zeroGradient on both gammaInt and ReThetat (no surface model)."
  - id: kOmegaSSTLM_solver_convergence_in_OF10  # NEW for V61-063
    note: "OF10 has kOmegaSSTLM in RAS module (verified at /opt/openfoam10/src/MomentumTransportModels/momentumTransportModels/RAS/kOmegaSSTLM); should be ABI-stable with simpleFoam."
    mitigation: "blockMesh + simpleFoam invocation unchanged from V61-061; only constant/turbulenceProperties + 0/gammaInt + 0/ReThetat change."
  - id: post_r3_executable_smoke_test  # from V61-061+V61-062 lineage
    note: "Pure code change: only convergence + Cl/Cd extraction needs live-run validation. Test fixtures synthetic; mesh + extractor pipeline unchanged."
  - id: transition_at_high_alpha  # NEW for V61-063
    note: "At α=8°, NACA0012 LE laminar BL is much shorter (transition near x/c≈0.05 on suction side). γ-Re_θt's improvement may concentrate at α=0°/α=4° rather than α=8°."
    mitigation: "Pre-register expected per-α improvements: Cd@α=0° biggest gain; Cl@α=8° smallest gain. If Cl@α=8° improves > Cd@α=0°, model is mis-tuned."
  - id: regression_on_v61_058_test_class
    note: "TestNACA0012MultiDim's 40 unit tests must continue to pass — they test extractor + α-routing logic, not turbulence model. Synthetic fixtures don't depend on real mesh or model."

