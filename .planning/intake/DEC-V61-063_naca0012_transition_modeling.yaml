# §3 Technical hypothesis
hypothesis: |
  V61-058 → V61-061 → V61-062 progression isolated TWO ceilings:
  (1) Mesh density / wall resolution (V61-058→V61-061 closed 23 pp on Cl@α=8°
      via 16k→96k cells refinement; remaining 17 pp gap)
  (2) Topology + wall-function regime (V61-062 C-grid with both LowRe and high-Re
      wall functions diverged; ceiling = topology change INCOMPATIBLE with
      steady RANS k-ω SST on this geometry)

  RETRO-V61-062 L1: "Mesh quality gates ≠ solver convergence" — even passing
  checkMesh, 158 severe non-orthogonal faces drove k production to NaN.

  RETRO-V61-062 followup PRIMARY: γ-Re_θt SST transition modeling on V61-061's
  H-grid (THIS DEC). Rationale: NACA0012 at Re=3e6 has natural transition near
  x/c ≈ 0.3-0.5 (Ladson exp.); fully-turbulent kOmegaSST treats the entire BL
  as turbulent → over-predicts Cd and under-predicts Cl. Activating γ-Re_θt
  transition modeling (Langtry-Menter 2009 4-equation formulation) lets the
  solver detect the laminar-to-turbulent transition front, correctly modeling
  pressure-side suction over the LE laminar region.

  Expected improvement direction (single-axis change vs V61-061):
  - Cl@α=8°: under-prediction reduces (extended laminar BL → less momentum loss)
  - Cd@α=0°: over-prediction reduces (laminar Cf < turbulent Cf over leading 30%)
  - dCl/dα: closer to 0.105 (Cl@α=8° improvement dominates over Cl@α=0°≈0)

  Risk: kOmegaSSTLM has 4 transport equations vs kOmegaSST's 2; convergence
  budget may need bumping. Tu_inf must be set carefully — Tu too high suppresses
  transition (model converges to fully-turbulent kOmegaSST limit); Tu too low
  may cause numerical issues with ReThetat init. Ladson 1988 wind-tunnel had
  Tu ≈ 0.18% per documented LTPT facility characterization.

