    scope: "Single-commit atomic change to `_generate_airfoil_flow`: turbulence model + 2 new initial fields. Preserves V61-061 mesh/wall-function/URF stack."
    commit_count_estimate: 1-2  # may need test sentinel updates
    iteration_ceiling: 1  # code-only, not iterating
  - id: E
    scope: "Live OpenFOAM sweep at α∈{0,4,8}° using cloned scripts/dec_v61_063_live_runs.py. Iterate if any HARD gate FAILs OR solver diverges: Tu_inf tuning, URF tightening, endTime extension. Each iteration: single-axis change, single Stage E sweep."
    commit_count_estimate: 2-4  # depends on iteration depth
    iteration_ceiling: 4  # per RETRO-V61-062 L5 validated
    early_termination: "k bounding event with k_max > 1e6 → hard early-termination per RETRO-V61-062 v2.1 amendment 3"

