  - check: "Smoke + sanity assertions are robust against the mesh change (won't pass-wash via mesh artifact)"
    verdict: PASS
    evidence: "α=0° |Cl|<0.005 is an absolute SNR floor — passing via mesh artifact would require systemic α-routing bug, which V61-058 R1 fixed (a00ff88) and re-verified at 3 independent α values."
  - check: "Pass rate self-estimate (0.55) is calibrated"
