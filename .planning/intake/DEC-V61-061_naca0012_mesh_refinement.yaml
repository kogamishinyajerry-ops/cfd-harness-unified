# DEC-V61-061 · NACA0012 mesh refinement (followup to V61-058)
# Intake v1 · Stage 0 · 2026-04-25
# Target: close the V61-058 physics-fidelity gap by refining
# `_generate_airfoil_flow` mesh template only. Reuses V61-058
# methodology stack verbatim (gold YAML, extractors, Stage E driver).

dec_id: DEC-V61-061
title: NACA0012 mesh refinement · close V61-058 physics-fidelity gap
case_id: naca0012_airfoil  # SAME canonical case_id as V61-058
predecessor: DEC-V61-058
methodology_version: "v2.0 (fourth-apply, post-V61-053+057+058)"
case_type: II  # inherited from V61-058
autonomous_governance: true

# §1 Scope (in/out)
scope:
  in:
    - "Mesh refinement in `src/foam_agent_adapter.py::_generate_airfoil_flow`"
    - "Targets: airfoil surface 120→240+ pts; y+_max 139→~50; domain ±5→±10 chord"
    - "Re-run Stage E sweep at α∈{0,4,8}° using existing scripts/dec_v61_058_live_runs.py (single-line dec_id rebrand only)"
    - "Verify V61-058 hard gates: Cl@α=8°≈0.815 (5%), Cd@α=0°≈0.008 (15%), dCl/dα≈0.105/deg (10%)"
    - "Re-verify smoke + sanity: |Cl@α=0°|<0.005, sign convention Cl@α=8°>0"
  out:
    - "Gold YAML changes (locked by V61-058 A1)"
    - "Extractor logic changes (locked by V61-058 B2)"
    - "Stage D audit fixture format (V61-058 D regenerates automatically)"
    - "New gates / new observables"
    - "Stall regime / finite-AR / compressibility / transition modeling"
    - "Other case meshes (cylinder, BFS, channel, etc.) — V61-061 touches only `_generate_airfoil_flow`"

# §2 Hard gates (inherited verbatim from V61-058 §3)
hard_gates:
  - id: lift_coefficient_alpha_eight
    role: HEADLINE_PRIMARY_SCALAR
    target: 0.815
    tolerance: 0.05
    source: "Ladson 1988 NASA TM-4074 §3.2 Tab.1 Re=3e6"
    v61_058_actual: 0.491  # 40% under
  - id: drag_coefficient_alpha_zero
    role: SAME_RUN_CROSS_CHECK
    target: 0.0080
    tolerance: 0.15
    source: "Ladson 1988 same"
    v61_058_actual: 0.0201  # 151% over
  - id: lift_slope_dCl_dalpha_linear_regime
    role: QUALITATIVE_GATE
    target: 0.105
    tolerance: 0.10
    source: "Ladson 1988 + Abbott 1959 cross-check"
    v61_058_actual: 0.061  # 42% under

smoke_assertions:  # SANITY_CHECK + sign convention (intake §9 inherited)
  - "α=+8° → Cl > 0 strictly"
  - "α=0° → |Cl| < 0.005 (numerical noise floor)"

advisory:
  y_plus_max:
    band: [11, 500]
    target: ~30  # log-layer wall-function sweet spot

# §3 Technical hypothesis (root cause from V61-058 defect_addendum)
hypothesis: |
  V61-058 Stage E ran at 16k cells, 120 airfoil surface faces, y+_max=139,
  domain ±5 chord. All three failing gates trace to the same root cause:
  under-resolved boundary layer + wake. With 120 surface faces and y+ in
  the upper log-layer, kOmegaSST + wall functions systematically
  under-predicts pressure-side suction peak (→ Cl@α=8° low) and
  over-predicts skin friction (→ Cd@α=0° high). dCl/dα is the linear
  combination of the first two effects.

  Refinement plan (single-axis change, monotone improvement expected):
  - Surface points 120→240 (double in nx on each of 4 aerofoil blocks: 30→60)
  - z-direction nz: 80→120 cells, simpleGrading 40→200 → first cell ~5e-4 → y+~30-50
  - Domain x: ±5→±10 chord; z: ±2→±4 chord
  - Wake blocks nx: 40→60 (better wake resolution)

  Estimated cell count: 4×60×120 + 2×60×120 = 43,200 (~2.7x V61-058)
  Estimated runtime: 31s × 2.7 × 1.3 (matrix cond) ≈ 2 min per α
  Domain doubling factor: x range from 10c→20c, z from 4c→8c.
  But cell count is set by nx, nz directly, so domain change adjusts
  block sizes (less mesh in wake, more spatial coverage at same resolution).

# §4 Wall-clock budget (intake §4 executable_smoke_test)
runtime_budget:
  per_alpha_target_s: 600   # 10 min (V61-058 was 17-31s)
  per_alpha_max_s: 900      # 15 min hard ceiling
  total_sweep_target_s: 1800  # 30 min for 3-α sweep

# §5 Codex budget
codex_budget_rounds: 2  # narrower than V61-058 — pure mesh-template change
                        # No new extractor logic, no new schemas, no UI changes
external_gate_self_estimated_pass_rate: 0.55
# Reasoning: this is a focused mesh-only DEC. Risk surface is bounded by:
#   (a) blockMesh syntax (well-tested in V61-058 + V61-044)
#   (b) Solver stability on refined mesh (kOmegaSST may need URF tuning at
#       higher cell-count + finer y+)
#   (c) Convergence at endTime budget (current default; may need bump)
# The fundamental methodology + extractor stack is locked.

# §6 Risk flags
risk_flags:
  - id: solver_stability_on_novel_geometry
    note: "OPEN from V61-058 — this DEC's primary target. Mesh refinement may surface new convergence challenges."
    mitigation: "Single-axis refinement, monotone improvement. URF defaults from V61-058 retained; if divergence, fall back to relaxation factors p=0.3, U=0.7, k=0.7, omega=0.7."
  - id: mesh_density_on_domain_change
    note: "OPEN from V61-058 — this DEC's secondary target. Domain extent doubling tested independently from cell-count increase via separate experimental runs if needed."
  - id: executable_smoke_test
    note: "Reuses V61-058 driver scripts/dec_v61_058_live_runs.py (will rebrand single-line dec_id reference). Same Docker container path."
  - id: numerical_noise_snr
    note: "RESOLVED in V61-058 — sanity_cl_at_alpha_zero is robust against mesh changes (the test is |Cl|<0.005 absolute, not relative)."
  - id: regression_on_v61_058_test_class
    note: "TestNACA0012MultiDim's 40 unit tests must continue to pass — they test extractor + α-routing logic, not mesh geometry. Synthetic fixtures don't depend on real mesh."

# §7 Stages
stages:
  - id: A
    scope: "Mesh-template parameter changes in _generate_airfoil_flow. Single-commit atomic change."
    commit_count_estimate: 1
  - id: E
    scope: "Live OpenFOAM sweep at α∈{0,4,8}° using rebranded scripts/dec_v61_061_live_runs.py (or reuse 058 driver verbatim with --dec arg). Iterate if any HARD gate FAILs: tighten mesh further (refine nx, nz, or grading) until gates pass OR reach 4-iteration ceiling. Each iteration: single mesh-param change, single Stage E sweep."
    commit_count_estimate: 2-4  # depends on iteration depth
    iteration_ceiling: 4  # if >4 iterations, escalate to retro

# §8 Stage-E close conditions
stage_e_close_checklist:
  - item: "Cl@α=8° within 5% of 0.815 (HEADLINE)"
    required: true
  - item: "Cd@α=0° within 15% of 0.0080 (CROSS_CHECK)"
    required: true
  - item: "dCl/dα within 10% of 0.105 (QUALITATIVE)"
    required: true
  - item: "|Cl@α=0°| < 0.005 (SANITY)"
    required: true
  - item: "Cl@α=8° > 0 strictly (sign convention smoke)"
    required: true
  - item: "y+_max in [11, 500] (advisory PASS band)"
    required: false  # advisory
  - item: "All 3 α cases solver-converge (residuals < 1e-5)"
    required: true
  - item: "TestNACA0012MultiDim continues to pass (40+ tests)"
    required: true
  - item: "Per-α wall clock ≤ 15 min (intake §4 budget ceiling)"
    required: true

