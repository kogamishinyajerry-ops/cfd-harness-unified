# ============================================================================
# §3 Technical hypothesis
# ============================================================================
hypothesis: |
  V61-061's topology_ceiling_reached defect (Cl@α=8°≈0.675 vs gold 0.815,
  diminishing returns 23pp→5pp across 16k→43k→96k mesh refinements) traces
  to two coupled architectural limitations:

  1. H-grid corner singularities at LE/TE — the existing 6-hex H-grid has
     hard-corner block junctions exactly at the leading and trailing edges,
     where flow physics demands maximally resolved curvature. Wall functions
     cannot fully resolve these regardless of cell count.

  2. Wall-function blending regime — V61-061 ran y+_max=84 at α=8°, mid-log-
     layer where wall functions become unreliable for adverse-pressure-
     gradient flows (NACA0012 upper-surface at α=8° has Cp peak around x/c=0.05
     where the BL is thin and pressure gradient is steep).

  V61-062 attacks both:

  (a) C-grid topology — concentric block shells around airfoil with curved
      polyLine edges, eliminating the LE/TE corner singularities. Curve
      naturally follows airfoil camber-line normal direction.
  (b) BL block split — separate inner (BL) and outer (far-field) blocks,
      so the radial expansion 5e-6 m → ~5 m doesn't have to fit in one
      block (V61-061 iter2-first-attempt at grading=1000 diverged with
      NaN — 2000:1 aspect-ratio cells. Block split avoids this.)
  (c) LowRe wall treatment — y+~1 first cell with nutLowReWallFunction
      bypasses the wall-function regime entirely. k=fixed 0 at wall is
      the canonical LowRe k-ω SST boundary condition (Menter 1994). Retain
      omegaWallFunction (auto-blends LowRe per OpenFOAM impl).

  Expected outcome: Cl@α=8° within 5% of 0.815 first sweep ~30-60% likely;
  ≤4-iteration ~60-80% likely (URF tuning, nNOC adjustment, BL grading
  refinement may take 1-3 iters).

