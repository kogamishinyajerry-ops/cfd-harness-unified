external_gate_self_estimated_pass_rate_rationale: |
  V61-061 calibration: 0.55 first-sweep estimate vs 0% ACTUAL gate clear,
  but with monotone improvement. V61-062 is HARDER than V61-061 because:
    - Architectural refactor (new vertex layout, new block topology, new
      curved edges) is much higher-risk than V61-061's parametric mesh
      refinement on existing topology.
    - LowRe convergence is stiffer (smaller first cells, larger nu·grad²U
      diffusion stiffness, slower SIMPLE pressure correction).
    - Cell aspect ratio at first cell is ~5000:1 (chord/(5e-6) ≈ 200,000
      tangential vs radial; bounded by tangential cell count and BL
      expansion). Even with BL block split, this is at the edge of what
      kOmegaSST can tolerate.

  Honest first-sweep estimate: 0.30 (most likely to need ≥1 iteration on
  URF, nNOC, or BL grading). ≤4-iteration ceiling estimate: 0.60.

  V61-058: estimate 0.40 / actual 0% (Codex F1 forced I→II downgrade)
