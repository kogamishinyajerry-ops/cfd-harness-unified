# ============================================================================
# §6 Risk flags (pre-registered honestly)
# ============================================================================
risk_flags:
  - id: topology_refactor_first_apply
    severity: high
    note: |
      First time touching `_generate_airfoil_flow` block topology since the
      V61-044 6-hex H-grid origin. Expected divergence cascade: blockMesh
      vertex ordering errors (inside-out blocks), edge projection failures
      on curved polyLines, checkMesh max-skewness >4 at C-shape outer
      boundary singular points. V61-061 iter2 first-attempt divergence
      (NaN at grading=1000) is the precedent for new-mesh divergence risk.
    mitigation: |
      Stage A.iter1: write a small Python helper that programmatically
      computes vertex coordinates from chord + BL offset + far-field
      radius. Validate with checkMesh BEFORE any solver run. Reject any
      mesh with max non-orth >75° OR max skewness >4 OR max aspect
      ratio >10000.
      Iteration ceiling: 4 mesh-tweak iterations.
  - id: lowre_convergence_slowness
    severity: high
    note: |
      LowRe simulations converge 2-3× slower than wall-function for the
      same residual target (smaller first cells → larger viscous-diffusion
      stiffness → smaller SIMPLE under-relaxation effective step).
      Expected endTime: bump from V61-061's 8000 → 15000-20000 iterations.
      Risk of oscillation in p/U residual at coarse URFs.
    mitigation: |
      Starting URFs: p=0.3, U=0.5, k=0.5, omega=0.5 (V61-061 baseline).
      If residual oscillates: tighten p=0.2 or U=0.4. Add nNOC=2 if
      checkMesh non-orth >70°.
      endTime budget: 20000 iterations + writeInterval 2000.
  - id: aspect_ratio_at_first_cell
    severity: med
    note: |
      y+~1 with chord-resolution n_tang ~ 200 along airfoil + first-cell
      radial 5e-6 m → cell aspect ratio ~5000:1 in BL block. kOmegaSST
      with nutLowReWallFunction is documented stable up to ~10000:1
      (Menter 1994; OpenFOAM AMI tutorials use 1000-3000:1 routinely).
      Risk: omega gradient stiffness at first cell may oscillate.
    mitigation: |
      BL block expansion ratio 1.15-1.2 (smooth, not 1.4+ that V61-061
      iter2 used). nz_BL ~ 30 cells → outer BL cell ~ 5e-6 × 1.18^30 ≈
      9e-4 m, smooth match to outer block first cell.
  - id: cgrid_outlet_singularity
    severity: med
    note: |
      C-grid wake closure can create high-skew cells at the downstream
      outlet where the C-shape closes onto the rectangular wake block.
      Standard mitigation: extend wake block N chord lengths downstream
      so that C-grid outlet is far from airfoil influence region.
    mitigation: |
      Wake block streamwise extent: ≥10 chord (V61-061 had ±10c domain).
      Verify checkMesh max skewness <4 at C-shape outlet vertices.
      If high skew persists: switch to "full O-grid + rectangular wake"
      hybrid (drop the C-shape on the upstream half).
  - id: executable_smoke_test
    severity: high
    note: |
      Inherited from V61-058/V61-061. 3-α live sweep at ≤30 min per α
      = 90 min total fits §4 budget but tight. Mandate §4 explicitly
      sets 30 min/α ceiling.
    mitigation: |
      Stage A includes a checkMesh-only dry run BEFORE any α=0 solver
      run — if checkMesh fails, iterate on mesh without burning solver
      time. Stage E only runs after checkMesh PASS.

