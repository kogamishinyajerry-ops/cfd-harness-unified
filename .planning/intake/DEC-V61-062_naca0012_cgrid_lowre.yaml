  - id: B
    scope: "LowRe wall BCs — nutLowReWallFunction on aerofoil patch in 0/nut,
            fixedValue uniform 0 in 0/k aerofoil, retain omegaWallFunction.
            Update endTime + fvSolution URFs + nNOC for LowRe convergence."
    commit_count_estimate: 1
  - id: C
    scope: "Update mesh sentinels in tests/test_foam_agent_adapter.py
            (test_generate_airfoil_flow_creates_real_surface_files only —
            the 40 TestNACA0012MultiDim tests should be unchanged since
            they test α-routing and extractor logic, not mesh geometry).
            Run pytest to confirm 40+ tests pass."
    commit_count_estimate: 1
  - id: D
    scope: "Audit fixture regen — phase5_audit_run.py re-emits ui/backend/
            tests/fixtures/runs/naca0012_airfoil/audit_real_run_measurement.yaml
            (deterministic; should auto-regenerate without manual edit)."
    commit_count_estimate: 1
  - id: E
    scope: "Live OpenFOAM sweep at α∈{0,4,8}° using rebranded
            scripts/dec_v61_062_live_runs.py (single-line dec_id rebrand from
            V61-061 driver). Iterate up to 4× if HARD gates miss: parametric
            tweaks (nz_BL, expansion ratio, URF, nNOC) only — no further
            architectural changes. Each iteration: 1 commit."
    commit_count_estimate: 2-5  # depends on iteration depth
    iteration_ceiling: 4

