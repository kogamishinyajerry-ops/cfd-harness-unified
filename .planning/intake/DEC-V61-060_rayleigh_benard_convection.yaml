# ============================================================================
# §1 Classification (F5-M1 hard gate, §3b — NO mid-arc Type change allowed)
# ============================================================================
case_type: II
case_type_rationale: |
  ONE scalar HARD_GATED literature gate at Ra=1e6, Pr=0.71, AR=2:1
  (canonical 2D RBC setup in Goldhirsch 1989). Per repo Type-II semantics
  (§3b): close on ONE headline scalar literature gate plus
  non-Type-count conservation/profile cross-checks. v3 reduces
  primary_gate_count to 1 to match.

  HARD_GATED LITERATURE OBSERVABLE (counts toward Type):
    1. Nu_avg (bottom hot wall) — HEADLINE GATE — wall-averaged Nusselt
       at the bottom hot wall. Family: WALL-GRADIENT-DERIVED.
       Reference value pending Stage A.0 (Goldhirsch locator + numeric).

  CONSERVATION INVARIANT (NOT counted toward Type — derived physics
  requirement, not literature gate):
    2. nusselt_top_asymmetry — defined as |Nu_top - Nu_bottom| /
       |Nu_bottom|, target ≤ 0.05 (5 %). Asymmetry above the threshold
       indicates BL under-resolution or solver imbalance. role:
       CONSERVATION_INVARIANT, gate_status: NON_TYPE_HARD_INVARIANT —
       enforced (run is rejected if violated) but does NOT count toward
       primary_gate_count because it carries no literature ref_value.

  PROVISIONAL_ADVISORY OBSERVABLES (rendered for user, NOT counted
  toward verdict):
    3. w_max_nondim — peak |u_y| nondim by U_ff = sqrt(g·β·ΔT·H);
       Werne 1993 Fig. 4 + Goldhirsch 1989 §4 indicate u_max ~
       0.18-0.22·U_ff at Ra=1e6, but no single exact (figure, panel,
       x-coordinate) locator — pending Stage A.0 lookup with explicit
       two-branch outcome (see A.0 checklist).
    4. roll_count_x — number of counter-rotating rolls along the bottom
       hot wall. Canonical 2:1 cavity at Ra=1e6 → 2 rolls; sensitive to
       initial conditions and side-wall BCs in steady SIMPLE.

  Type-II rationale: Type-I requires ≥3 strict independent literature
  families per §3b. Type-II requires exactly 1 strict literature
  scalar gate. RBC has exactly 1 (Nu_avg). The conservation invariant
  is enforcement scaffolding, NOT a literature gate, so it does not
  inflate the Type count. The advisory observables surface for user
  inspection but do not affect the pass-fail verdict.

  PATH TO TYPE-I PROMOTION (post-DEC, NEW intake version): if Stage A.0
  produces a clean exact (paper, figure, panel, x-coord) locator for
  w_max_nondim AND a separate independent literature surface (e.g.
  centerline temperature profile from Goldhirsch 1989 Fig. X), write a
  follow-on intake (DEC-V61-061 or equivalent) with case_type=I.
  NO MID-ARC RECLASSIFICATION per §3b strict.

  HEADLINE = Nu_avg (bottom). Gold ref pending A.0 commit.

primary_gate_count: 1  # F1-HIGH v2: ONLY nusselt_number is a literature HARD_GATE; nusselt_top_asymmetry is non-Type conservation invariant
case_type_hard_gate_signed: true
headline_gate: nusselt_number  # quantity_id matches gold YAML observables[].name

