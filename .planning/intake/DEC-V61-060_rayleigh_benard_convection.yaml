# ============================================================================
# §3 Observable scope (HARD_GATED + NON_TYPE_HARD_INVARIANT + PROVISIONAL_ADVISORY split)
# ============================================================================
observable_scope:
  in_scope:
    - name: nusselt_number
      role: HEADLINE
      family: wall_gradient_derived
      extractor: src.foam_agent_adapter._extract_nc_nusselt (existing; Stage A.2 adds y-axis branch + wall_orientation BC plumb so the same stencil works on a horizontal wall)
      ref_value: 17.7  # Stage A.0 BRANCH-A: Pandey & Schumacher 2018 TU Ilmenau benchmark Table 1 p.6
      ref_value_pending: false  # resolved at A.0
      tolerance: { mode: relative, value: 0.25 }  # widened from 0.15 → 0.25 to absorb steady-vs-turbulent regime mismatch + no-slip vs free-slip BC deviation; see whitelist comment
      gate_status: HARD_GATED
      counts_toward_primary_gate_count: true
      source_table: "Pandey & Schumacher 2018 TU Ilmenau DFG SPP 1881 Benchmark Case 1, Table 1 p.6 (URL in §2 reference_paper.primary)"

    - name: nusselt_top_asymmetry
      role: CONSERVATION_INVARIANT  # v3 F1-HIGH: NOT a literature gate
      family: wall_gradient_derived
      extractor: src.rbc_extractors.extract_nu_asymmetry  # Stage B B.1
      ref_value: 0.0  # by mass + energy conservation, asymmetry should be 0
      ref_value_pending: false
      tolerance: { mode: absolute, value: 0.05 }  # 5 % relative imbalance band
      gate_status: NON_TYPE_HARD_INVARIANT  # v3: enforced but does NOT count toward primary_gate_count
      counts_toward_primary_gate_count: false  # v3 F1-HIGH explicit
      source_table: "conservation invariant: |Nu_top - Nu_bottom| / |Nu_bottom| ≤ 0.05"
      rationale: |
        v3 F1-HIGH redefinition: NOT a literature value — defined as a
        derived physics invariant. Asymmetry > 5 % indicates BL under-
        resolution or solver imbalance, both of which would also
        degrade the headline Nu. Run is rejected if violated, but it
        does NOT count toward primary_gate_count because it carries no
        literature ref_value (Type-II = exactly 1 literature gate).

    - name: w_max_nondim
      role: ADVISORY_INTERIOR_VELOCITY
      family: interior_velocity_field
      extractor: src.rbc_extractors.extract_w_max  # Stage B B.2
      ref_value: ADVISORY_NO_LITERATURE_LOCATOR  # Stage A.0 BRANCH-B: no exact (paper, figure, panel, x-coord) locator extractable within budget
      ref_value_pending: false  # resolved at A.0 (BRANCH-B = permanently advisory in this DEC)
      tolerance: { mode: relative, value: 0.20 }
      gate_status: PROVISIONAL_ADVISORY
      counts_toward_primary_gate_count: false
      advisory_rationale: |
        Werne 1993 Fig. 4 + Goldhirsch 1989 §4 indicate u_max ~
        0.18-0.22·U_ff for 2D RBC at Ra=1e6 in the soft-turbulence
        band. Stage A.0 explicit two-branch rule:
          BRANCH-A: A.0 finds an exact (paper, figure, panel,
            x-coordinate) locator with a single point-value AND
            tolerance band → record locator + value in v3-addendum,
            BUT do NOT promote to HARD_GATED in this DEC (promotion
            requires a NEW intake version; see PATH TO TYPE-I).
          BRANCH-B: A.0 cannot find such a locator → permanently
            advisory in this DEC; record A.0 search trail in commit
            body so future intakes don't repeat the search.
        Either branch closes A.0 cleanly. Default landing: BRANCH-B
        (advisory remains advisory).

    - name: roll_count_x
      role: ADVISORY_STRUCTURAL
      family: structural
      extractor: src.rbc_extractors.extract_roll_count_x  # Stage B B.3
      ref_value: 2  # canonical 2:1 cavity at Ra=1e6 → 2 counter-rotating rolls
      ref_value_pending: false
      tolerance: { mode: absolute, value: 0 }  # exact match required when gated
      gate_status: PROVISIONAL_ADVISORY
      counts_toward_primary_gate_count: false
      advisory_rationale: |
        Roll count is sensitive to initial conditions + side-wall BCs in
        steady SIMPLE. Multiple metastable solutions exist (1 stretched
        roll, 2 rolls, 3 rolls of unequal width). Not a hard gate;
        rendered for user inspection only. Stays advisory in this DEC.

  explicitly_out_of_scope:
    - "Periodic-side-wall RBC variant. RBC with periodic side-walls is a
       different canonical setup (infinite horizontal extent) and is
       deliberately NOT covered by DEC-V61-060. Insulated side-walls only."
    - "Type-I promotion path (case_type promoted to I). Even if Stage A.0
       finds an exact locator for w_max_nondim, promotion requires a new
       intake version (DEC-V61-061 or equivalent), NOT mid-arc retitling."
    - "Any additional HARD_GATED literature observable beyond Nu_avg.
       Examples deliberately excluded from this DEC: centerline
       temperature profile, vertical heat-flux profile, Reynolds
       number scaling, Nusselt(Ra) regression. Each would require a
       separate independent literature family (Type-I path)."
    - "Time-dependent / unsteady RBC observables (RMS velocity, Nu
       fluctuations, plume statistics). steady-SIMPLE solver only."
    - "Non-Boussinesq RBC (compressible, large ΔT)."
    - "3D RBC. 2D-cavity (extruded 1-cell deep) only."
    - "Promotion of nusselt_top_asymmetry to a literature HARD_GATE.
       It is permanently a NON_TYPE_HARD_INVARIANT in this DEC."

# ============================================================================
# §4 Risk flags (F1-M1 requires ≥1 subjective risk annotation)
# ============================================================================
risk_flags:
  # --- case-specific flags ---

  - flag: rbc_geometry_lx_eq_ly_bug
    severity: high
    codex_flagged: false  # discovered by author during intake
    description: |
      src/foam_agent_adapter.py:2298 emits blockMesh vertices with
      Lx=L Ly=L where L=aspect_ratio. For RBC with aspect_ratio=2.0 this
      produces a 2×2 cavity, NOT the 2:1 rectangle declared in
      knowledge/whitelist.yaml:175 ("aspect_ratio: 2.0" with intended
      semantic = 2:1 rectangle). Result: solver runs a 2L×2L domain
      scaled by 2 (so Ra evaluated at L=2 is wrong by factor 8 from the
      L^3 term in the Ra definition).
    mitigation_in_batch: |
      Stage A.1: introduce explicit Lx, Ly variables in the natural-
      convection generator. For DHC: Lx=Ly=1.0 (square per de Vahl Davis).
      For RBC: Lx=2·H, Ly=H where H=1 is the cavity height (the canonical
      Goldhirsch 1989 setup uses H=1, Lx=2). Update Ra = g·β·ΔT·H^3 / (ν·α)
      to use H not L. Update blockMesh vertices + grading + nL_x / nL_y
      independently. Add unit test asserting RBC mesh is 2×1, not 2×2,
      and that Ra is computed against H not L.

  - flag: rbc_topology_side_heated_vs_bottom_heated
    severity: high
    codex_flagged: false
    description: |
      src/foam_agent_adapter.py:2300+ writes hot_wall at x=0 and cold_wall
      at x=L for ALL natural-convection cases including RBC. Canonical
      Rayleigh-Bénard configuration heats from BELOW (y=0) and cools from
      ABOVE (y=H), with insulated side walls (zero-flux temperature BC).
      Gravity also acts in the wrong direction relative to the temperature
      gradient.
    mitigation_in_batch: |
      Stage A.3: branch the boundary topology emit on case_id. For RBC:
        - hot_wall at y=0 (bottom), cold_wall at y=Ly (top), both
          fixedValue T (T_hot, T_cold).
        - left_wall + right_wall: INSULATED — patch type `zeroGradient`
          on T (matches OF10 hotRoom tutorial verbatim:
          tutorials/heatTransfer/buoyantBoussinesqSimpleFoam/hotRoom/
          0.orig/T). Periodic option REJECTED at intake to avoid
          two-variant solver-tuning surface.
        - gravity vector = (0, -9.81, 0) instead of (-9.81, 0, 0).
      Solver: `buoyantFoam` (OF10 unified buoyancy solver), NOT legacy
      `buoyantSimpleFoam` (this repo emits OF10 path).
      Wall_orientation BC plumb already lands in A.2 so this commit only
      flips the topology + gravity, not the extractor.

  - flag: nu_extractor_wall_orientation_mismatch
    severity: high
    codex_flagged: false  # follow-on of rbc_topology_*
    description: |
      _extract_nc_nusselt currently reads x-direction temperature gradient
      at hot wall x=0 (the DHC wall). After Stage A.3 topology fix, the
      RBC hot wall is at y=0, requiring y-direction gradient extraction.
      task_spec.boundary_conditions.wall_coord_hot is plumbed but the
      extractor's y-layer grouping logic assumes the wall is x-oriented.
      Without this fix landing BEFORE the topology flip (per F5-MED
      reorder), post-A.3 unit tests would break.
    mitigation_in_batch: |
      Stage A.2 (BEFORE topology flip per F5-MED reorder): extend BC
      plumbing to carry wall_orientation ('x' or 'y'). Branch
      _extract_nc_nusselt to swap x/y axes when wall_orientation='y'.
      Add unit test asserting RBC + bottom-wall topology (synthesized
      cell-center field) produces nusselt_number > 5.0 (sanity check;
      gold pending Stage A.0).

  - flag: ref_value_chaivat_correlation_pointed_to_wrong_paper
    severity: high  # bumped from med per Codex F2-HIGH
    codex_flagged: true  # F2-HIGH cited in plan-review
    description: |
      whitelist.yaml:175-194 cites "Chaivat et al. 2006" + DOI
      10.1016/j.ijheatmasstransfer.2005.07.039. Codex pre-Stage-A
      review verified the DOI resolves to a rectangular-jets impingement
      cooling paper, NOT a Rayleigh-Bénard study. The historical
      0.229·Ra^0.269 correlation comment is unattributed and the gold
      Nu=10.5 value cannot be defended against this broken citation.
    mitigation_in_batch: |
      Stage A.0 (mandatory pre-code commit): re-source Goldhirsch 1989
      §3 Tables I-III for Nu(Ra=1e6, AR=2:1) AND/OR Werne 1993 Fig. 4
      for w_max scaling. Commit knowledge/whitelist.yaml citation
      correction (remove broken DOI; add Goldhirsch DOI as primary).
      Commit knowledge/gold_standards/rayleigh_benard_convection.yaml
      ref_value update with documented locator (table/figure/equation).
      If Goldhirsch 1989 lookup fails OR contradicts the prior 10.5 by
      > 30 %, escalate to a sub-batch retro and refit gold + tolerance
      band BEFORE Stage A.1 starts.

  # --- mandatory v2.0+ template slots ---

  - flag: python_version_parity
    severity: med
    codex_flagged: false
    description: |
      Python 3.9 (Codex shim) vs 3.12 (.venv) f-string parser differ.
      RBC extractors (Stage B) will involve nested f-strings for
      sampleDict generation — high risk surface.
    mitigation_in_batch: |
      Run `python3 -m py_compile` before each Stage A+ commit. Hoist
      nested f-string parts into separate variables.

  - flag: mesh_density_on_domain_change
    severity: med
    codex_flagged: false
    description: |
      Stage A topology fix changes the cavity from 2L×2L to 2H×H
      (factor-2 reduction in y-direction). Cell count must update so
      Δy_wall stays consistent or improves. Lesson from RETRO-V61-053 P1:
      domain shrink without cell count adjustment can over-resolve, and
      domain grow without cell count adjustment loses BL resolution.
    mitigation_in_batch: |
      Stage A.4 blockMesh emit: nL_x = 2·base_nL, nL_y = base_nL where
      base_nL is the per-side cell count (default 80). At Ra=1e6 with
      δ_T/H ≈ Ra^(-1/4) = 0.032·H, uniform 80 cells in y gives
      Δy=H/80 → 2.56 BL cells; needs 4:1 wall grading on top + bottom
      walls (mirroring V61-057 DHC fix) for ≥5 BL cells. Document the
      numerical values in adapter comments.

  - flag: executable_smoke_test
    severity: high
    codex_flagged: false  # implicit per RETRO-V61-053 P0
    description: |
      Per RETRO-V61-053 P0: unit tests via direct generator call bypass
      dispatch. Stage A.5 must run the dispatch path
      (FoamAgentExecutor.execute(...) all the way to blockMesh) on a
      synthesized RBC TaskSpec — but NOT a full live solver run, which
      remains Stage E. Past F4-HIGH refactor: live-run is not part of
      Stage A acceptance.
    mitigation_in_batch: |
      Stage A.5 commits: a pytest that constructs FoamAgentExecutor +
      a minimal RBC TaskSpec and runs .execute(...) at least through
      blockMesh in a tmp_path; asserts case_dir contains expected
      blockMeshDict + 0/T + system/g (no full solver). Stage E remains
      the live OpenFOAM run via scripts/phase5_audit_run.py.

  - flag: solver_stability_on_novel_geometry
    severity: high  # bumped from med — RBC bottom-heated is a topologically novel branch
    codex_flagged: false
    description: |
      buoyantFoam laminar bottom-heated is established in OF tutorials
      (heatTransfer/buoyantSimpleFoam/hotRoom is bottom-heated). But the
      adapter's specific side-wall insulated BC + gravity vector +
      scheme combination is NEW to this codebase's natural-convection
      branch. SIMPLE may not converge on a clean roll pattern; may
      oscillate between 2-roll and 3-roll basins.
    mitigation_in_batch: |
      Stage E executable_smoke_test catches divergence. Pre-emptive
      fallbacks with MEASURABLE TRIGGERS:
        - Trigger A: continuity_residual > 1e-3 after 500 SIMPLE iters
          → action: swap p solver GAMG → PCG+DIC.
        - Trigger B: std(Nu_bottom_per_x) > 30 % between iters 200-500
          (oscillation between roll-count basins)
          → action: re-init T field with explicit 2-roll perturbation seed.
        - Trigger C: solver returns success=False after 5000 iters
          → action: log + escalate to retro; do NOT silently switch
          turbulence model.
      All three triggers + actions encoded as fallback metadata in the
      Stage A generator emit so phase5_audit_run.py can apply them
      deterministically.

  - flag: numerical_noise_snr
    severity: med
    codex_flagged: false
    description: |
      Per RETRO-V61-050: extraction methods can have noise floor that
      makes argmax/extremum coincide with noise rather than physics.
      For RBC: w_max_nondim is sensitive to where in the roll the sample
      lands; roll_count_x argmax over wall heat-flux signal can pick up
      sub-grid noise as a "roll".
    mitigation_in_batch: |
      Stage B: each extractor returns {value, profile_spread,
      peak_to_profile_spread} non-gating diagnostics (V61-057 Codex R2
