    locator: "Table 1, p.6 — Pr=10, Ra=10^6, Lx=4, H=1, Nx=512, Nz=128, Nu=17.7, Re=95.5, t_eta=0.77, eta_K=0.0495, l_min=0.0078; time-averaged over t/t_f ∈ [2000, 2500] window. Fig 4b + Fig 5 confirm 2-roll structure."
