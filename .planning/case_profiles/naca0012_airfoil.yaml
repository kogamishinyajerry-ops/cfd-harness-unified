tolerance_policy:
  pressure_coefficient:
    tolerance: 0.20  # 20% — PROFILE_GATE shape-match (alias "Cp"/"cp" per CANONICAL_ALIASES)
  lift_coefficient_alpha_eight:
    tolerance: 0.05  # 5% — HEADLINE_PRIMARY_SCALAR (Ladson 1988 ±1.2% tunnel uncertainty)
  drag_coefficient_alpha_zero:
    tolerance: 0.15  # 15% — SAME_RUN_CROSS_CHECK (Cd0 small, wall-function discretization noise)
  lift_slope_dCl_dalpha_linear_regime:
    tolerance: 0.10  # 10% — QUALITATIVE_GATE (linearity check)
