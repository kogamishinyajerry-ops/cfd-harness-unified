# Registered risk-flag entries (registry-bound).
risk_flags:
  - flag_id: executable_smoke_test
    triggered: true  # was false (G-6 backfill); V61-058 introduces α-rotation
                     # dispatch path that must be exercised end-to-end before close
    triggered_by: DEC-V61-058
    triggered_date: "2026-04-25"
    justification: |
      DEC-V61-058 introduces α-routing through task_spec.alpha_deg parameter
      consumed by _generate_airfoil_flow at src/foam_agent_adapter.py:6407.
      Multi-α runs (α∈{0°,4°,8°}) require dispatch-chain validation —
      task_spec mutation between dispatch and generator is invisible to
      static Codex review. Stage E close gate: Docker OpenFOAM live runs
      at all 3 α (per intake §9 stage_e_close_checklist).
    mitigation_owner: DEC-V61-058 Stage E

  - flag_id: solver_stability_on_novel_geometry
    triggered: true  # was false (G-6 backfill); V61-058 α=8° on rotated-
                     # freestream is a NEW solver+BC combination not yet exercised
    triggered_by: DEC-V61-058
    triggered_date: "2026-04-25"
    justification: |
      simpleFoam + kOmegaSST stability on rotated-freestream NACA0012 at
      α=8° is runtime-emergent. The current α=0° fvSolution at
      src/foam_agent_adapter.py:6811-6856 (p GAMG/GaussSeidel relTol=0.05,
      URF p=0.3, U/k/omega=0.5) is tuned for symmetric flow. At α=8° the
      upper surface adverse-pressure-gradient peaks may require tighter
      URF (p=0.2) or PCG+DIC fallback for p. OF tutorial precedent:
      incompressible/simpleFoam/airFoil2D fvSolution.
    mitigation_owner: DEC-V61-058 Batch B1 + Stage E executable_smoke_test

  - flag_id: python_version_parity
    triggered: true  # V61-058 introduces new f-string blocks in 0/U for α-rotation
    triggered_by: DEC-V61-058
    triggered_date: "2026-04-25"
    justification: |
      DEC-V61-058 Batch B1 will add α-aware f-string blocks in 0/U
      (U_inf_vec computed via cos/sin of alpha_deg) AND new forceCoeffs FO
      block with rotated liftDir/dragDir. Nested multi-line f-strings can
      crash Python 3.9 (CI default) while parsing fine on 3.12 (.venv).
    mitigation_owner: DEC-V61-058 Batch B1+B2 — `python3 -m py_compile` on
      every edited .py before commit; hoist nested f-strings to plain
      .format() or string concat where the inner expression is itself a
      multi-line f-string.

  - flag_id: mesh_density_on_domain_change
    triggered: false
    justification: |
      DEC-V61-058 v2 keeps existing 5×chord domain (no growth) per Codex F2
      "no mesh changes" architectural lock. Freestream rotation in 0/U is
      mesh-invariant. If Codex round 2 demands domain growth, this flag
      flips to triggered=true and Batch B1 must add cell-count proportionality
      computation + dz_min/dx_min comments at the airfoil.
    mitigation_owner: deferred — re-evaluate at DEC-V61-058 Codex round 2

  - flag_id: numerical_noise_snr
    triggered: true
    triggered_by: DEC-V61-058
    triggered_date: "2026-04-25"
    justification: |
      DEC-V61-058 introduces 4 new HARD scalar/profile gates with varying
      SNR ratios (computed in intake §4 numerical_noise_snr block):
        Cl@α=8°: gold 0.815, ratio ≈ 8e5 (ample SNR)
        Cl@α=4°: gold 0.434, ratio ≈ 4e5 (helper, slope-fit only, ample)
        Cd@α=0°: gold 0.0080, ratio ≈ 8e3 (adequate)
        Cp@x/c=0.5: gold ≈ -0.40, ratio ≈ 2e5 (ample)
        dCl/dα slope: gold 0.105, ratio ≈ 2e4 (ample)
        Cl@α=0°: gold = 0 EXACTLY → SANITY_CHECK only (excluded from gate set
                  per RETRO-V61-050 numerical_noise_snr trap, see intake risk
                  flag lift_signal_at_alpha_zero_snr_trap).
      All HARD gates have SNR ≥ 8e3, well above the 10× safety floor.
      Cl@α=0° is the explicit exclusion case — handled via SANITY_CHECK
      sub-status with absolute band |Cl| < 0.005, NOT a gate.
    mitigation_owner: DEC-V61-058 Batch B3 — SNR table in airfoil_extractors
      module-level docstring; UI renders signal_above_noise flag per gate.

