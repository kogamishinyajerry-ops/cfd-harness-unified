# Source: §5d Part-2 acceptance batch (2026-04-20). The solver ran
# simpleFoam with `turbulenceProperties laminar` — matching the declared
# contract — but the extractor triggered the Spalding fallback because
# y+ wasn't low enough and the wall-cell value wasn't trustworthy. The
# Spalding engineering correlation is parameter-coupled to Re only; at
# Re=50000 it returns 0.0576 / (0.5*50000)^0.2 = 0.00760365566 regardless
# of regime.
