# Wrong-model run for rayleigh_benard_convection at Ra=1e7.
# Using a fully laminar solver at Ra=10⁷ (onset of turbulence is
# Ra~1.5e4 in RB; by 10⁷ the rolls have fully transitioned to
# soft turbulence). Laminar model suppresses the turbulent heat
# transport → Nu collapses to ~Ra^(1/4)/3 ≈ 6.0, a ~43% underprediction.
# Gold 10.5 ± 15% → FAIL.
