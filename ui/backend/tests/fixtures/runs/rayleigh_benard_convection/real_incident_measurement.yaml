# Real-incident run for rayleigh_benard_convection.
#
# At Ra=10^7, a typical first-attempt run using Boussinesq + moderate
# mesh gives Nu around 14.5 against Grossmann-Lohse's ~16.5 — 12% low.
# Root cause: the thermal boundary layer at the hot plate is thinner
# than 5 cells in a default mesh, so the wall temperature gradient is
# truncated.
