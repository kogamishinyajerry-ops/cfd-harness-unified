    忽略这件事 → BL 保持层流附着 → Cp 前缘过尖到 1.3（物理应为 1.0，
    湍流位移厚度钝化了 peak）。gold 1.0 ± 20% → FAIL。学生教训：外流
    Re > 10⁵ 就必须带转捩/湍流模型。
