# Wrong-model run for naca0012_airfoil at Re=3e6, α=0°.
# Using fully-laminar solver at Re=3×10⁶ (transition onset at x/c≈0.02
# for smooth NACA 0012). Laminar BL stays attached artificially, Cp
# distribution collapses to thin-airfoil theory, and the stagnation
# peak is over-sharpened to Cp≈1.3 (versus physical 1.0 with proper
# turbulent BL displacement effect).
# Gold Cp_leading_edge=1.0 ± 20% → Cp=1.3 is outside (+30%) → FAIL.
