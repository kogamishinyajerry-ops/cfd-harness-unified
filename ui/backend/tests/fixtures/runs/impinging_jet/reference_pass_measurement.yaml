# stagnation-TKE limiter) lands peak Nu within 2% of Cooper 1984 gold
# 25.0. This is the reference behavior one should expect from a
# properly-chosen turbulence model — not a fluke, not a lucky tolerance
# hit, but a principled model choice reproducing the literature anchor.
